  const [detailGame, setDetailGame] = useState(null);
  const [gradeMsg, setGradeMsg] = useState("");
  const [grading, setGrading] = useState(false);

  // Every board is archived under its own date. Nothing a day produced is ever
  // overwritten by the next day — that record is what makes hindsight possible.
  const saveSlate = async (next) => {
    setSlate(next);
    if (next.date === todayKey) await store.set("ingenuity:slate:day", next);
    const arch = await store.get("ingenuity:slate:archive", {});
    arch[next.date] = next;
    const keys = Object.keys(arch).sort();
    while (keys.length > SLATE_ARCHIVE_DAYS) delete arch[keys.shift()];
    await store.set("ingenuity:slate:archive", arch);
    setArchDates(Object.keys(arch).sort().reverse());
  };

  useEffect(() => {
    (async () => {
      const raw = await store.get("ingenuity:teams", []);
      const migrated = raw.map((x) => ({ ...EMPTY_TEAM, ...x, players: x.players || [], rotation: x.rotation || [] }));
      const { merged, changed } = mergeSeedRosters(migrated, false);
      if (changed) await store.set("ingenuity:teams", merged);
      setTeams(merged);
      setApiKey(await store.get("ingenuity:oddsapi:key", ""));
      const arch = await store.get("ingenuity:slate:archive", {});
      const day = await store.get("ingenuity:slate:day", null);
      // rescue any pre-archive board still sitting in the old single-slot key
      if (day && day.date && !arch[day.date]) {
        arch[day.date] = day;
        await store.set("ingenuity:slate:archive", arch);
      }
      setArchDates(Object.keys(arch).sort().reverse());
      let cur = arch[todayKey] || (day && day.date === todayKey ? day : null);
      // merge any odds forwarded from a Terminal screenshot import
      const stash = await store.get("ingenuity:slate:odds", "");
      if (stash) {
        cur = mergeOdds(cur, parseOddsLines(stash), todayKey);
        await store.set("ingenuity:slate:odds", "");
        await saveSlate(cur);
        setMsg("Odds from your screenshot import were merged into today's slate.");
      } else if (cur) setSlate(cur);
      const scan = await store.get("ingenuity:brain:slateScan", null);
      if (scan && scan.date === todayKey && scan.lean) setLean({ call: null, saved: scan });
      setAcc(computeAccuracy(arch, await store.get("ingenuity:results:log", {})));
      gradeArchive(true); // settle up quietly on open — the closest thing to "always working"
    })();
  }, []);

  // The first real number this board ever saw is kept as the opener and never
  // touched again; `line` tracks the current market. The gap between them is
  // where the money went — the raw material for actually measuring CLV.
  function mergeOdds(cur, parsed, dateKey) {
    // If the board we're merging into is for a DIFFERENT day than these odds,
    // start clean. A three-game series is the same two teams on three nights;
    // matching by name across days would carry yesterday's probable starter
    // (and its opener) onto today's game. Pitchers belong to a date, not a
    // matchup. When dateKey differs from the board's date, don't reuse it.
    const sameDay = !cur || !dateKey || cur.date === dateKey;
    const games = sameDay && cur ? [...cur.games] : [];
    const stamp = new Date().toISOString().slice(11, 16);
    const has = (v) => v !== "" && v != null && !isNaN(parseFloat(v));
    // First pitch passed = anything the market says now is a LIVE number.
    // Belt and braces alongside commenceTimeFrom: freeze started games at their
    // last pregame line rather than letting a live total masquerade as one.
    const started = (iso) => (iso ? new Date(iso).getTime() <= Date.now() : false);
    for (const o of parsed) {
      if (o.err) continue;
      const gi = games.findIndex((g) => {
        const a = normName(g.away), h = normName(g.home), oa = normName(o.away), oh = normName(o.home);
        return (a.includes(oa) || oa.includes(a)) && (h.includes(oh) || oh.includes(h));
      });
      if (gi >= 0) {
        const g0 = games[gi];
        if (started(g0.start || o.start)) {
          // underway: keep the pregame number exactly as it was
          games[gi] = { ...g0, inPlay: true, start: g0.start || o.start || null, awayP: o.awayP || g0.awayP, homeP: o.homeP || g0.homeP };
          continue;
        }
        const line = has(o.line) ? o.line : g0.line;
        const over = has(o.over) ? o.over : g0.over;
        const under = has(o.under) ? o.under : g0.under;
        const openingNow = !has(g0.openLine) && has(line); // first time this game got a number
        games[gi] = { ...g0, line, over, under,
          awayP: o.awayP || g0.awayP, homeP: o.homeP || g0.homeP,
          openLine: openingNow ? line : g0.openLine,
          openOver: openingNow ? over : g0.openOver,
          openUnder: openingNow ? under : g0.openUnder,
          openTs: openingNow ? stamp : g0.openTs,
          lastTs: stamp };
      } else {
        // A game we've never seen that has ALREADY started can only give us a
        // live line. There's no pregame number to recover, and a pregame model
        // can't research a game in progress — leave it off the board entirely.
        if (started(o.start)) continue;
        const fresh = has(o.line);
        games.push({ away: o.away, home: o.home, awayP: o.awayP || "", homeP: o.homeP || "",
          line: o.line, over: o.over, under: o.under, start: o.start || null,
          openLine: fresh ? o.line : "", openOver: fresh ? o.over : "", openUnder: fresh ? o.under : "",
          openTs: fresh ? stamp : "", lastTs: stamp });
      }
    }
    return { date: dateKey || (cur && cur.date) || todayKey, games };
  }

  const fetchMatchups = async () => {
    setBusy("fetch"); setMsg("");
    try {
      let r;
      try {
        r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${todayKey}&hydrate=probablePitcher`);
      } catch (netErr) {
        setMsg("BLOCKED: this app can't reach the MLB stats API from here right now — the sandbox decides which domains are allowed and it can change. The paste box below is the reliable path: shorthand, game lines, or a whole copied board all work."); setBusy(""); return;
      }
      const j = await r.json();
      const api = (j.dates?.[0]?.games || []);
      if (!api.length) {
        // Probe forward — All-Star break or an off-day. Tell the user when play resumes.
        let nextDate = null, nextCount = 0;
        for (let k = 1; k <= 10 && !nextDate; k++) {
          const d = etDayKey(new Date(Date.now() + k * 86400000));
          try {
            const rr = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${d}`);
            const jj = await rr.json();
            const g = jj.dates?.[0]?.games || [];
            if (g.length) { nextDate = d; nextCount = g.length; }
          } catch { break; }
        }
        setMsg(nextDate
          ? `No MLB games today — looks like an off-day or the All-Star break. Next slate: ${nextCount} games on ${nextDate}. The perfect window to refine the model.`
          : "No MLB games today and none found in the next 10 days — the API answered but the schedule is empty. If that seems wrong, use the paste box.");
        setBusy(""); return;
      }
      const prev = slate?.games || [];
      const games = api.map((g) => {
        const away = g.teams.away.team.name, home = g.teams.home.team.name;
        const old = prev.find((x) => normName(x.away).includes(normName(matchTeamDb(away, teams)?.name || away)) || normName(away).includes(normName(x.away)));
        return {
          away, home,
          awayP: g.teams.away.probablePitcher?.fullName || "",

          line: old?.line ?? "", over: old?.over ?? "", under: old?.under ?? "",
        };
      });

      setMsg(`${games.length} matchups loaded with probable pitchers. Add the market — screenshot, paste, or type the numbers inline.`);
    } catch { setMsg("Couldn't reach the MLB API. Add games via odds import instead — pitchers can be typed per game."); }
    setBusy("");
  };

  const stageFile = async (f) => {
    if (!f) return; setMsg("");
    const isImage = (f.type || "").startsWith("image/") || /\.(png|jpe?g|webp|gif|heic)$/i.test(f.name);
    let url = null;
    if (isImage) { try { url = await readFileDataUrl(f); } catch {} }
    setStaged({ file: f, name: f.name, isImage, url });
  };
  const removeStaged = () => { setStaged(null); setInputKey((k) => k + 1); setMsg("File removed — nothing was imported."); };

  const importStaged = async () => {
    if (!staged) return;
    setBusy("vision"); setMsg(staged.isImage ? "Reading the screenshot…" : "Reading the file…");
    try {
      let parsed;
      if (staged.isImage) {
        const { b64, mediaType } = await prepImageForAI(staged.file);
        const out = await callVisionJSON([
          { type: "image", source: { type: "base64", media_type: mediaType, data: b64 } },
          { type: "text", text: `This is a screenshot from a sportsbook showing one or more baseball games (a full slate board or a single game card). The away team is listed first or on top; "@" or "AT" means away at home. Extract every game visible. Respond ONLY with JSON, no fences:
{"games":[{"away":"PHI Phillies","home":"DET Tigers","total":7.5,"over":102,"under":-122,"awayPitcher":"Zack Wheeler","homePitcher":"Tarik Skubal"}]}
Rules: total = the O/U number. over/under = American prices for Over and Under (positive numbers like +102 are 102). Include pitcher names ONLY if shown next to the teams, else "". If no totals are visible: {"games":[]}` },
        ]);
        parsed = (out.games || []).map((g) => ({
          away: g.away, home: g.home, line: parseFloat(g.total),
          over: typeof g.over === "number" ? g.over : -110, under: typeof g.under === "number" ? g.under : -110,
          awayP: g.awayPitcher || "", homeP: g.homePitcher || "",
        })).filter((g) => g.away && g.home && !isNaN(g.line) && g.line >= 4 && g.line <= 20);
        if (!parsed.length) parsed = [{ err: "no games with totals recognized in the screenshot" }];
      } else {
        parsed = parseOddsLines(await staged.file.text());
      }
      const ok = parsed.filter((x) => !x.err);
      if (!ok.length) { setMsg("No games with totals found in that file."); logInterp("slate-import", false, "no games recognized"); }
      else { await saveSlate(mergeOdds(slate, parsed, slate?.date || todayKey)); setMsg(`${ok.length} games merged into the ${slate?.date === todayKey || !slate ? "today's" : slate.date} board.`); logInterp("slate-import", true, ok.length + " games"); }
      removeStaged();
    } catch (e) { setMsg(`Import failed: ${e.message}.`); logInterp("slate-import", false, e.message); }
    setBusy("");
  };

  const applyPaste = async () => {
    const short = parseShorthand(pasteText, teams);
    const { games, mode } = short ? { games: [short], mode: "shorthand" } : parseSlateText(pasteText);
    const withTotals = games.filter((g) => g.line !== "" && g.line != null);
    const noTotal = games.length - withTotals.length;
    if (!games.length) { setMsg("Couldn't find any games in that paste. It needs at least the two team names per game; totals and prices are picked up when present. Team names, city names, or codes (PHI, NYY) all work."); logInterp("slate-paste", false, "no games found"); return; }
    await saveSlate(mergeOdds(slate, games, slate?.date || todayKey));
    setPasteText(""); setPasteOpen(false);
    const pitchers = games.filter((g) => g.awayP || g.homeP).length;
    setMsg(`${games.length} game${games.length === 1 ? "" : "s"} read (${mode === "lines" ? "clean format" : mode === "shorthand" ? "pitcher shorthand" : "smart scan of pasted board"})${withTotals.length ? `, ${withTotals.length} with totals` : ""}${pitchers ? `, ${pitchers} with pitchers` : ""}.${noTotal ? ` ${noTotal} still need a total typed in — edit them below.` : ""}`);
    logInterp("slate-paste", true, `${games.length} games (${mode})`);
  };

  // After odds land, fetch MLB's probable starters for each pulled day and
  // merge them in — the odds feed is totals-market data and never carries
  // pitchers, but MLB's schedule API does. Chaining the two makes one tap do
  // the whole job. Quiet on failure: the paste path and the fetch button remain.
  const attachPitchers = async (days) => {
    let attached = 0;
    const arch = await store.get("ingenuity:slate:archive", {});
    for (const d of days) {
      if (!arch[d]) continue;
      try {
        const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${d}&hydrate=probablePitcher`);
        if (!r.ok) continue;
        const j = await r.json();
        const api = (j.dates?.[0]?.games || []);
        if (!api.length) continue;
        arch[d] = { ...arch[d], games: arch[d].games.map((g) => {
          const hit = api.find((x) => {
            const a = normName(x.teams.away.team.name), h = normName(x.teams.home.team.name);
            const ga = normName(g.away), gh = normName(g.home);
            return (a.includes(ga) || ga.includes(a)) && (h.includes(gh) || gh.includes(h));
          });
          if (!hit) return g;
          const ap = hit.teams.away.probablePitcher?.fullName || g.awayP;
          const hp = hit.teams.home.probablePitcher?.fullName || g.homeP;
          if ((ap && ap !== g.awayP) || (hp && hp !== g.homeP)) attached++;
          return { ...g, awayP: ap || g.awayP, homeP: hp || g.homeP };
        }) };
      } catch { /* blocked or offline — buttons and paste still work */ }
    }
    if (attached) {
      await store.set("ingenuity:slate:archive", arch);
      const fresh = arch[viewDate];
      if (fresh) setSlate(fresh);
    }
    return attached;
  };

  // Game-time weather per park, free and keyless (open-meteo). One request
  // covers every outdoor park on the pulled days; roofed parks get indoor
  // conditions without a call. Quiet on failure — weather is a refinement,
  // and the Terminal's manual temp/wind boxes always work.
  const attachWeather = async (days) => {
    let attached = 0, reachErr = null, tried = 0;
    const arch = await store.get("ingenuity:slate:archive", {});
    for (const d of days) {
      const board = arch[d];
      if (!board) continue;
      const need = []; // [{i, meta, hourET}]
      board.games.forEach((g, i) => {
        const park = parkForTeam(g.home);
        const meta = PARK_META[park];
        if (!meta) return;
        if (meta.roof) {
          if (!g.wx) { board.games[i] = { ...g, wx: { temp: 72, windOut: 0, roof: true } }; attached++; }
          return;
        }
        const hourET = g.start
          ? parseInt(new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour: "numeric", hour12: false }).format(new Date(g.start)))
          : 19; // typical first pitch if unknown
        need.push({ i, meta, hourET });
      });
      if (need.length) {
        tried += need.length;
        try {
          const lats = need.map((n) => n.meta.lat).join(",");
          const lons = need.map((n) => n.meta.lon).join(",");
          const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&hourly=temperature_2m,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&start_date=${d}&end_date=${d}`);
          if (!r.ok) { reachErr = `weather service returned ${r.status}`; }
          if (r.ok) {
            const j = await r.json();
            const results = Array.isArray(j) ? j : [j];
            need.forEach((n, k) => {
              const h = results[k]?.hourly;
              if (!h || !h.time) return;
              const idx = Math.min(Math.max(n.hourET, 0), h.time.length - 1);
              const temp = h.temperature_2m?.[idx];
              const spd = h.wind_speed_10m?.[idx];
              const dir = h.wind_direction_10m?.[idx];
              if (temp == null) return;
              const g = board.games[n.i];
              board.games[n.i] = { ...g, wx: { temp: Math.round(temp), windOut: windOutComponent(spd, dir, n.meta.cf), spd: spd != null ? Math.round(spd) : null, dir: dir != null ? Math.round(dir) : null, roof: false } };
              attached++;
            });
          }
        } catch (e) { reachErr = "couldn't reach the weather service (open-meteo) from here"; }
      }
      arch[d] = { ...board, games: [...board.games] };
    }
    if (attached) {
      await store.set("ingenuity:slate:archive", arch);
      if (arch[viewDate]) setSlate(arch[viewDate]);
    }
    return { attached, tried, reachErr };
  };

  // Clear today's board and pull it fresh — removes any games that rolled off,
  // stale pitchers, or old lines, and rebuilds cleanly. Uses one odds credit.
  const refreshSlate = async () => {
    if (!isToday) { setMsg("Refresh applies to today's board. Use the day picker to return to today first."); return; }
    if (busy) return;
    setBusy("refresh"); setMsg("");
    const arch = await store.get("ingenuity:slate:archive", {});
    delete arch[todayKey];
    await store.set("ingenuity:slate:archive", arch);
    await store.set("ingenuity:slate:day", null);
    setSlate(null); setRows(null); setLean(null); setDetailGame(null);
    setBusy("");
    await pullLive(); // rebuild from scratch: odds → pitchers → weather
  };

  const refreshWeather = async () => {
    if (!isToday) { setMsg("Weather refresh applies to today's board."); return; }
    if (!slate?.games?.length) { setMsg("Build the slate first, then weather can attach."); return; }
    setBusy("wx"); setMsg("");
    const wx = await attachWeather([todayKey]);
    setBusy("");
    setMsg(wx.attached
      ? `Game-time weather updated for ${wx.attached} park${wx.attached === 1 ? "" : "s"}${wx.tried > wx.attached ? ` (${wx.tried - wx.attached} still pending)` : ""}.`
      : wx.reachErr
        ? `Weather didn't load — ${wx.reachErr}. On the hosted app this works; inside the Claude artifact the sandbox blocks outside weather calls. You can enter temp/wind by hand in the Terminal.`
        : "No outdoor parks on the board need weather (roofed games use indoor conditions).");
  };

  const pullLive = async () => {
    const key = apiKey.trim();
    if (!key) { setMsg("Paste your Odds API key first — free at the-odds-api.com."); return; }
    setBusy("live"); setMsg("");
    try {
      await store.set("ingenuity:oddsapi:key", key);
      let r;
      try {
        // commenceTimeFrom=now → pre-match games only. The feed also serves
        // IN-PLAY odds, and a live total (e.g. 5.5 with four innings left) is a
        // different animal from a pregame total. Letting one in would make the
        // 9-inning model "find" a huge edge against a number that isn't
        // describing a 9-inning game.
        const fromNow = new Date().toISOString().replace(/\.\d{3}Z$/, "Z");
        r = await fetch(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds?regions=us&markets=totals&oddsFormat=american&commenceTimeFrom=${fromNow}&apiKey=${encodeURIComponent(key)}`);
      } catch (netErr) {
        throw new Error("Network error reaching the-odds-api.com — check your connection and try again. The paste box below always works as a fallback.");
      }
      if (r.status === 401) throw new Error("key rejected (401) — check it's copied exactly, with no spaces");
      if (r.status === 429) throw new Error("rate limited (429) — the free tier quota may be used up for the month");
      if (!r.ok) throw new Error(`Odds API returned HTTP ${r.status}`);
      const events = await r.json();
      const parsed = consensusFromOddsApi(events);
      if (!parsed.length) { setMsg("The feed returned no MLB totals right now (off-day or all games started)."); }
      else {
        // Bucket by each game's own ET date. One pull can seed several boards —
        // tomorrow's lines land on tomorrow's board with their opener recorded,
        // which is exactly what makes line movement measurable later.
        const byDay = {};
        for (const g of parsed) { const d = g.date || todayKey; (byDay[d] = byDay[d] || []).push(g); }
        const arch = await store.get("ingenuity:slate:archive", {});
        const days = Object.keys(byDay).sort();
        for (const d of days) {
          const base = d === (slate?.date) ? slate : (arch[d] || null);
          await saveSlate(mergeOdds(base, byDay[d], d));
        }
        // leave the user looking at the day they were already on
        const back = arch[viewDate] || (viewDate === todayKey ? null : null);
        const fresh = await store.get("ingenuity:slate:archive", {});
        if (fresh[viewDate]) setSlate(fresh[viewDate]);
        const remaining = r.headers.get("x-requests-remaining");
        const spread = days.map((d) => `${byDay[d].length} on ${d}${d === todayKey ? " (today)" : ""}`).join(", ");
        const nArms = await attachPitchers(days);
        const wx = await attachWeather(days);
        setMsg(`Live market pulled: ${parsed.length} game${parsed.length === 1 ? "" : "s"} across ${days.length} day${days.length === 1 ? "" : "s"} — ${spread}. Each is saved to its own board.${nArms ? ` Probable starters attached automatically (${nArms} arm${nArms === 1 ? "" : "s"}).` : " Pitchers weren't reachable just now — tap Fetch matchups to attach them."}${wx.attached ? ` Game-time weather set for ${wx.attached} park${wx.attached === 1 ? "" : "s"}.` : wx.reachErr ? ` Weather didn't load (${wx.reachErr}) — enter temp/wind manually in the Terminal if you need it.` : ""}${remaining ? ` ${remaining} API requests left this month.` : ""}`);
      }
    } catch (e) { setMsg(`Live pull failed: ${e.message}`); }
    setBusy("");
  };

  const editGame = (i, field, v) => {
    const games = [...slate.games]; games[i] = { ...games[i], [field]: v };
    saveSlate({ ...slate, games });
  };
  const removeGame = (i) => saveSlate({ ...slate, games: slate.games.filter((_, j) => j !== i) });

  const buildSide = (t, pitcherName) => {
    const num = (v) => (v === "" || v == null ? null : parseFloat(v));
    let sp = num(t.sp) ?? 0.32, spBf = num(t.spBf) ?? 200, spIp = num(t.spIp) ?? 5, spEra = num(t.spEra);
    // resolved = this exact starter was found in the rotation AND has a real xwOBA.
    // Otherwise sp silently falls back to a team average. That isn't a weaker
    // projection — it's a projection of a different game. Callers must refuse it.
    let resolved = false;
    if (pitcherName && t.rotation) {
      const pn = normName(pitcherName);
      const hit = t.rotation.find((r) => normName(r.name) === pn) || t.rotation.find((r) => pn.includes(normName(r.name).split(" ").pop()));
      if (hit) { sp = num(hit.xwoba) ?? sp; spBf = num(hit.bf) ?? spBf; spIp = num(hit.ip) ?? spIp; spEra = num(hit.era) ?? spEra; resolved = num(hit.xwoba) != null; }
    }
    return { off: num(t.off) ?? CFG.LEAGUE_WOBA, xoff: num(t.xoff), pa: num(t.pa) ?? 600, recent: num(t.recent), recentPA: num(t.recentPA), recentBbk: num(t.recentBbk), sp, spBf, spIp, spEra, pen: num(t.pen) ?? 0.318, penBf: num(t.penBf) ?? 800, penBarrel: num(t.penBarrel), penHardHit: num(t.penHardHit), oaa: num(t.oaa), framing: num(t.framing), resolved };
  };

  const scan = async () => {
    setBusy("scan"); setMsg(""); setRows(null); setLean(null);
    await new Promise((res) => setTimeout(res, 30));
    const out = [];
    for (const g of slate.games) {
      const line = parseFloat(g.line);
      if (isNaN(line)) { out.push({ ...g, status: "skip", err: "no total set" }); continue; }
      const A = matchTeamDb(g.away, teams), H = matchTeamDb(g.home, teams);
      if (!A || !H) { out.push({ ...g, status: "skip", err: `no DB match for ${!A ? g.away : g.home}` }); continue; }
      if (g.inPlay || (g.start && new Date(g.start).getTime() <= Date.now())) {
        out.push({ ...g, status: "skip", err: "first pitch has passed — this model prices 9 innings, not a game in progress" });
        continue;
      }
      const a = buildSide(A, g.awayP), h = buildSide(H, g.homeP);
      if (!a.resolved || !h.resolved) {
        const why = (!g.awayP || !g.homeP) ? "probable starter not posted" : "starter not in your database";
        out.push({ ...g, status: "skip", err: why + " — the arm is the biggest input; won't guess it" });
        continue;
      }
      const over = parseFloat(g.over) || -110, under = parseFloat(g.under) || -110;
      const homePark = parkForTeam(H.name);
      const r = projectGame({
        park: homePark, line, temp: g.wx ? g.wx.temp : null, windOut: g.wx ? g.wx.windOut : null,
        awayOff: a.off, awayXoff: a.xoff, awayPA: a.pa, awayRecent: a.recent, awayRecentPA: a.recentPA, awayRecentBbk: a.recentBbk, awaySP: a.sp, awaySPbf: a.spBf, awaySPip: a.spIp, awaySPera: a.spEra, awayPen: a.pen, awayPenBf: a.penBf, awayPenBarrel: a.penBarrel, awayPenHardHit: a.penHardHit, awayOAA: a.oaa, awayFraming: a.framing,
        homeOff: h.off, homeXoff: h.xoff, homePA: h.pa, homeRecent: h.recent, homeRecentPA: h.recentPA, homeRecentBbk: h.recentBbk, homeSP: h.sp, homeSPbf: h.spBf, homeSPip: h.spIp, homeSPera: h.spEra, homePen: h.pen, homePenBf: h.penBf, homePenBarrel: h.penBarrel, homePenHardHit: h.penHardHit, homeOAA: h.oaa, homeFraming: h.framing,
      }, 8000);
      const pW = r.pOver / (r.pOver + r.pUnder);
      const dO = amToDec(over), dU = amToDec(under);
      const fairOver = (1 / dO) / ((1 / dO) + (1 / dU));
      const edge = (pW - fairOver) * 100;
      const evOver = r.pOver * (dO - 1) * 100 - r.pUnder * 100;
      const evUnder = r.pUnder * (dU - 1) * 100 - r.pOver * 100;
      out.push({ ...g, status: "ok", awayName: A.name, homeName: H.name, model: r.mean, pW, edge, evOver, evUnder });
    }
    const scored = out.filter((x) => x.status === "ok");
    let top = null;
    for (const x of scored) if (!top || Math.abs(x.edge) > Math.abs(top.edge)) top = x;
    const call = top && Math.abs(top.edge) >= 4 ? top : null;
    setRows(out); setLean({ call, scanned: scored.length, top });
    // Freeze what the model said onto the board itself, so the archived day stays
    // self-contained: the line it saw, the price it saw, and its own number.
    // Without this you can never honestly grade a past day.
    const stamp = new Date().toISOString().slice(11, 16);
    await saveSlate({ ...slate, games: slate.games.map((g) => {
      const r = out.find((x) => x.away === g.away && x.home === g.home && x.status === "ok");
      return r ? { ...g, proj: { model: +r.model.toFixed(2), edge: +r.edge.toFixed(1), pOver: +r.pW.toFixed(3), atLine: r.line, ts: stamp } } : g;
    }) });
    // A scan of a past board is research — it must not overwrite today's read.
    if (viewDate === todayKey) {
      await store.set("ingenuity:brain:slateScan", {
        date: todayKey, ts: new Date().toISOString().slice(0, 16).replace("T", " "), scanned: scored.length,
        lean: call ? { matchup: `${call.awayName} @ ${call.homeName}`, side: call.edge > 0 ? "Over" : "Under", line: call.line, edge: +call.edge.toFixed(1), model: +call.model.toFixed(2) } : null,
      });
    }
    setBusy("");
  };

  // How wrong was the model, measured against games that had already been
  // projected before they were played? Only counts boards carrying a frozen
  // proj — a number written down after the fact proves nothing.
  const computeAccuracy = (arch, permLog) => {
    const rows2 = [];
    const seen = new Set();
    // permanent log first — it outlives the 90-day boards
    for (const r of Object.values(permLog || {})) {
      if (r.model == null || r.final == null) continue;
      const k = r.date + "|" + normName(r.away) + "@" + normName(r.home);
      seen.add(k);
      rows2.push({ date: r.date, away: r.away, home: r.home, model: r.model, line: r.line, final: r.final, err: r.final - r.model });
    }
    // then any still-in-window boards not yet distilled
    for (const d of Object.keys(arch)) {
      for (const g of (arch[d].games || [])) {
        if (g.proj && g.final != null) {
          const k = d + "|" + normName(g.away) + "@" + normName(g.home);
          if (seen.has(k)) continue;
          rows2.push({ date: d, away: g.away, home: g.home, model: g.proj.model, line: g.proj.atLine, final: g.final, err: g.final - g.proj.model });
        }
      }
    }
    const n = rows2.length;
    if (!n) return { n: 0 };
    const bias = rows2.reduce((s, r) => s + r.err, 0) / n;
    const mae = rows2.reduce((s, r) => s + Math.abs(r.err), 0) / n;
    const big = rows2.filter((r) => Math.abs(r.err) > 3.5).length;
    return { n, bias, mae, big, rows: rows2.sort((a, b) => (a.date < b.date ? 1 : -1)) };
  };

  // Catch-up grading: a static page can't work while it's closed, so it settles
  // up the moment it opens. Fetches real finals for archived boards and scores
  // what the model said at the time.
  const gradeArchive = async (silent) => {
    if (!silent) { setGrading(true); setGradeMsg(""); }
    const arch = await store.get("ingenuity:slate:archive", {});
    const need = Object.keys(arch)
      .filter((d) => d < todayKey && (arch[d].games || []).some((g) => g.final == null))
      .sort().slice(-14); // don't hammer the API; two weeks of catch-up is plenty
    let got = 0, reached = false;
    for (const d of need) {
      try {
        const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${d}`);
        if (!r.ok) continue;
        const j = await r.json();
        reached = true;
        const finals = (j.dates?.[0]?.games || [])
          .filter((g) => g.status?.abstractGameState === "Final")
          .map((g) => ({ away: g.teams.away.team.name, home: g.teams.home.team.name,
                         total: (g.teams.away.score ?? 0) + (g.teams.home.score ?? 0) }));
        if (!finals.length) continue;
        arch[d] = { ...arch[d], games: (arch[d].games || []).map((g) => {
          if (g.final != null) return g;
          const f = finals.find((x) => {
            const a = normName(x.away), h = normName(x.home), ga = normName(g.away), gh = normName(g.home);
            return (a.includes(ga) || ga.includes(a)) && (h.includes(gh) || gh.includes(h));
          });
          if (!f) return g;
          got++;
          return { ...g, final: f.total };
        }) };
      } catch (e) { /* sandbox blocks statsapi; stay quiet and let the panel say so */ }
    }
    if (got) await store.set("ingenuity:slate:archive", arch);
    await recordFinals(arch); // distill graded games into the permanent, never-expiring log
    const a = computeAccuracy(arch, await store.get("ingenuity:results:log", {}));
    setAcc(a);
    if (a.n) await store.set("ingenuity:brain:slateAccuracy", { n: a.n, bias: +a.bias.toFixed(3), mae: +a.mae.toFixed(3), big: a.big, ts: new Date().toISOString().slice(0, 16).replace("T", " ") });
    // refresh the viewed board so any new finals show immediately
    if (got && arch[viewDate]) setSlate(arch[viewDate]);
    if (!silent) {
      setGradeMsg(!reached
        ? "Couldn't reach the MLB scores API from here. In the hosted app this works; inside the Claude artifact the sandbox blocks it."
        : got ? `Graded ${got} game${got === 1 ? "" : "s"} against final scores.`
              : need.length ? "No new finals available yet for the boards on file." : "Every archived board is already graded.");
      setGrading(false);
    }
  };

  const pickDay = async (d) => {
    setViewDate(d); setRows(null); setLean(null); setMsg("");
    const arch = await store.get("ingenuity:slate:archive", {});
    if (d === todayKey) {
      const day = await store.get("ingenuity:slate:day", null);
      setSlate(arch[todayKey] || (day && day.date === todayKey ? day : null));
      const scan = await store.get("ingenuity:brain:slateScan", null);
      if (scan && scan.date === todayKey && scan.lean) setLean({ call: null, saved: scan });
    } else {
      setSlate(arch[d] || null);
    }
  };

  const isToday = viewDate === todayKey;
  const games = slate?.games || [];
  const withOdds = games.filter((g) => g.line !== "" && g.line != null).length;
  const withP = games.filter((g) => g.awayP && g.homeP).length;
  const moved = games.filter((g) => g.openLine !== "" && g.openLine != null && g.line !== "" && parseFloat(g.openLine) !== parseFloat(g.line)).length;

  return (
    <section className="slate">
      <div className="slate-head">
        <h2>{isToday ? "Today's Slate — the 6th agent" : `Slate archive — ${viewDate}`}</h2>
        <span className="botd-sub">{viewDate} · the wide net: stores every game's odds + pitchers for the day, sweeps the board at 8k sims to flag candidates (4+ pt gaps). Confirm any lean in the Terminal, which runs 20k sims and only calls an edge at 7+ pts.</span>
      </div>

      {archDates.length > 1 && (
        <div className="slate-days">
          <span className="slate-days-label">Board</span>
          <select value={viewDate} onChange={(e) => pickDay(e.target.value)}>
            {!archDates.includes(todayKey) && <option value={todayKey}>{todayKey} · today</option>}
            {archDates.map((d) => <option key={d} value={d}>{d}{d === todayKey ? " · today" : ""}</option>)}
          </select>
          {!isToday && <button className="ing-ghost" onClick={() => pickDay(todayKey)}>↩ back to today</button>}
        </div>
      )}

      {!isToday && (
        <div className="slate-research">
          <strong>Research mode — viewing {viewDate}.</strong> This board is frozen as it was: its odds, its pitchers, and what the model said at the time. Scanning here is for study only; it won't touch today's read or the Brain's record.
        </div>
      )}

      <div className="grade">
        <div className="grade-head">
          <span className="bc-title">Model accuracy · graded against real finals</span>
          <button className="ing-ghost" onClick={() => gradeArchive(false)} disabled={grading}>{grading ? "Grading…" : "Grade past boards"}</button>
        </div>
        {acc && acc.n > 0 ? (
          <>
            <div className="grade-stats">
              <div><em>Graded</em><strong>{acc.n}</strong></div>
              <div><em>Mean error</em><strong className={Math.abs(acc.bias) > 0.5 ? "neg" : ""}>{acc.bias > 0 ? "+" : ""}{acc.bias.toFixed(2)} runs</strong></div>
              <div><em>Avg miss</em><strong>{acc.mae.toFixed(2)} runs</strong></div>
              <div><em>Big misses</em><strong className={acc.big ? "neg" : ""}>{acc.big}</strong></div>
            </div>
            <p className="grade-note">
              {acc.n < 30
                ? `Only ${acc.n} graded game${acc.n === 1 ? "" : "s"} — far too few to mean anything. At this sample a mean error of ${acc.bias > 0 ? "+" : ""}${acc.bias.toFixed(2)} is noise, not bias. Keep collecting before changing a single parameter.`
                : acc.bias > 0.4
                  ? `The model is running ${acc.bias.toFixed(2)} runs LOW across ${acc.n} games — the same under-projection your ledger caught on hot slates. Worth a calibration look now that the sample supports it.`
                  : acc.bias < -0.4
                    ? `The model is running ${Math.abs(acc.bias).toFixed(2)} runs HIGH across ${acc.n} games. Worth a calibration look.`
                    : `Mean error is ${acc.bias.toFixed(2)} runs across ${acc.n} games — no systematic bias worth chasing. The typical miss is still ${acc.mae.toFixed(2)} runs, which is the honest width of this model's uncertainty.`}
            </p>
          </>
        ) : (
          <p className="grade-note">
            Nothing graded yet. Each scan freezes its projection onto that day's board; once the games finish, this settles up against the real final scores
            and tracks how wrong the model actually was. It needs boards on file first — from Thursday, that starts accumulating on its own.
          </p>
        )}
        {gradeMsg && <p className="ing-hint">{gradeMsg}</p>}
      </div>

      {games.length > 0 && (rows || games.some((g) => g.proj)) && (
        <BoardChart games={games} rows={rows} onOpen={(g) => setDetailGame(g)} />
      )}

      {detailGame && (
        <GameDetail g={detailGame} teams={teams} dateKey={viewDate} isToday={isToday} onClose={() => setDetailGame(null)} />
      )}

      {games.length > 0 && (
        <div className="slate-chips">
          <span className="slate-chip">{games.length} games</span>
          <span className={"slate-chip " + (withP === games.length ? "good" : "")}>{withP}/{games.length} pitchers</span>
          <span className={"slate-chip " + (withOdds === games.length && games.length ? "good" : "")}>{withOdds}/{games.length} with market</span>
          {moved > 0 && <span className="slate-chip move">{moved} line{moved === 1 ? "" : "s"} moved</span>}
          <span className="slate-chip good">✓ saved for {viewDate}</span>
        </div>
      )}

      <div className="slate-controls">
        <button className="ing-run small" onClick={fetchMatchups} disabled={!!busy || !isToday} title={isToday ? "" : "Live fetch only applies to today's board"}>{busy === "fetch" ? "Fetching…" : games.length ? "Refresh matchups + pitchers" : "1 · Fetch matchups + pitchers"}</button>
        {games.length > 0 && isToday && (
          <button className="ing-run small ghosty" onClick={refreshWeather} disabled={!!busy} title="Re-fetch game-time weather without spending an odds credit">{busy === "wx" ? "Checking sky…" : "Refresh weather"}</button>
        )}
        {games.length > 0 && isToday && (
          <button className="ing-run small ghosty warn" onClick={refreshSlate} disabled={!!busy} title="Clear today's board and pull everything fresh (uses one odds credit)">{busy === "refresh" ? "Rebuilding…" : "↻ Refresh slate"}</button>
        )}
        <label className="slate-filebtn">
          {busy === "vision" ? "Reading…" : "2 · Import odds (screenshot / file)"}
          <input key={inputKey} type="file" accept=".csv,.txt,image/*" onChange={(e) => stageFile(e.target.files[0])} disabled={!!busy} hidden />
        </label>
        <button className="ing-ghost" onClick={() => setPasteOpen(!pasteOpen)}>{pasteOpen ? "hide paste" : "…or paste odds"}</button>
        <button className="ing-ghost" onClick={() => setLiveOpen(!liveOpen)}>{liveOpen ? "hide" : "⚡ live feed?"}</button>
        <button className="ing-run small" onClick={scan} disabled={!!busy || !withOdds}>{busy === "scan" ? "Scanning…" : "3 · Scan the slate"}</button>
      </div>

      {staged && (
        <div className="ing-staged">
          {staged.url && <img src={staged.url} alt="staged" className="ing-staged-thumb" />}
          <span className="ing-staged-name">{staged.name}</span>
          <button className="ing-run small" onClick={importStaged} disabled={!!busy}>Import this</button>
          <button className="ing-ghost" onClick={removeStaged} disabled={!!busy}>✕ Remove</button>
        </div>
      )}
      {liveOpen && (
        <div className="slate-live">
          <p className="ing-hint" style={{ margin: 0 }}>Live multi-book odds can't be pulled from inside this app — its sandbox blocks outside servers, and no subscription changes that. Use the companion <strong>pull-slate.html</strong> file (runs in your browser, reaches the odds servers fine): pull the slate there, copy the lines, paste them below. Free key at <strong>the-odds-api.com</strong>; one pull covers the whole board.</p>
          <button className="ing-run small" onClick={() => { setLiveOpen(false); setPasteOpen(true); }}>Open the paste box</button>
        </div>
      )}
      {pasteOpen && (
        <div className="slate-paste">
          <textarea rows={5} value={pasteText} onChange={(e) => setPasteText(e.target.value)} placeholder={"Paste a whole board from Covers/ESPN/DraftKings — teams, pitchers, totals & prices get read from the mess.\n\nShorthand also works: skenes wheeler 8.5 -104 -122\nOr clean lines: Phillies (Zack Wheeler) @ Tigers (Tarik Skubal) | 7.5 | +102 | -122"} />
          <button className="ing-run small" onClick={applyPaste}>Merge into slate</button>
        </div>
      )}
      {msg && <p className="ing-hint">{msg}</p>}

      {lean && lean.call !== undefined && lean.scanned != null && (
        <div className={"slate-lean " + (lean.call ? "hot" : "")}>
          {lean.call ? (
            <>
              <strong>Lean of the day: {lean.call.edge > 0 ? "OVER" : "UNDER"} {lean.call.line} — {lean.call.awayName} @ {lean.call.homeName}</strong>
              <span>model {lean.call.model.toFixed(2)} vs line {lean.call.line} · {Math.abs(lean.call.edge).toFixed(1)} pts past the no-vig book · win prob {(100 * (lean.call.edge > 0 ? lean.call.pW : 1 - lean.call.pW)).toFixed(1)}%</span>
              <span className="slate-caveat">This is a candidate flag, not a verdict — open it in the Terminal (20k sims, park + weather) to confirm. The scanner assumes a neutral park; one real input can erase a gap this size, and the ledger says the passes have been the edge.</span>
            </>
          ) : (
            <>
              <strong>No lean today — {lean.scanned} games scanned, nothing beats the no-vig book by 4+ points.</strong>
              <span>{lean.top ? `Closest: ${lean.top.awayName} @ ${lean.top.homeName} at ${Math.abs(lean.top.edge).toFixed(1)} pts — inside the noise.` : ""} The pass is the play, and that's the model working.</span>
            </>
          )}
        </div>
      )}

      {games.length > 0 && (
        <div className="slate-rows">
          {games.map((g, i) => {
            const scanned = rows?.find((r) => r.away === g.away && r.home === g.home && r.status === "ok");
            const skipped = rows?.find((r) => r.away === g.away && r.home === g.home && r.status === "skip");
            return (
              <div className="slate-game" key={i}>
                <div className="sg-header">
                  <div className="sg-teams">
                    <span className="sg-match">{g.away} @ {g.home}</span>
                    <span className="sg-pitchers">{g.awayP || "TBD"} vs {g.homeP || "TBD"}</span>
                    {g.wx && (
                      <span className="sg-wx">{g.wx.roof ? "⌂ roof" : `${g.wx.temp}° · ${Math.abs(g.wx.windOut)}mph ${g.wx.windOut > 1 ? "out ↗" : g.wx.windOut < -1 ? "in ↘" : "calm"}`}</span>
                    )}
                    {(g.inPlay || (g.start && new Date(g.start).getTime() <= Date.now())) && (
                      <span className="sg-inplay">● in play · line frozen at last pregame number</span>
                    )}
                    {g.openLine !== "" && g.openLine != null && g.line !== "" && parseFloat(g.openLine) !== parseFloat(g.line) && (
                      <span className={"sg-move " + (parseFloat(g.line) > parseFloat(g.openLine) ? "up" : "down")}>
                        opened {g.openLine} → {g.line} {parseFloat(g.line) > parseFloat(g.openLine) ? "▲" : "▼"}
                        {g.openTs ? ` · since ${g.openTs}` : ""}
                      </span>
                    )}
                  </div>
                  <button className="sg-open" onClick={() => setDetailGame(g)} aria-label="Full breakdown">⤢</button>
                  <button className="sg-remove" onClick={() => removeGame(i)} aria-label="Remove game">✕</button>
                </div>
                <div className="sg-market">
                  <div className="sg-field">
                    <label>Total</label>
                    <input className="sg-line" value={g.line ?? ""} onChange={(e) => editGame(i, "line", e.target.value)} placeholder="7.5" inputMode="decimal" />
                  </div>
                  <div className="sg-field">
                    <label>Over price</label>
                    <OddsInput value={g.over ?? ""} onChange={(v) => editGame(i, "over", v)} placeholder="-110" />
                  </div>
                  <div className="sg-field">
                    <label>Under price</label>
                    <OddsInput value={g.under ?? ""} onChange={(v) => editGame(i, "under", v)} placeholder="-110" />
                  </div>
                </div>
                {(scanned || skipped) && (
                  <div className="sg-result">
                    {scanned && <span className="sg-model">model <strong>{scanned.model.toFixed(2)}</strong> vs {g.line}</span>}
                    {scanned && Math.abs(scanned.edge) >= 4 && <span className={"sr-edge hot"}>{scanned.edge > 0 ? "OVER" : "UNDER"} candidate · {Math.abs(scanned.edge).toFixed(1)} pts → confirm in Terminal</span>}
                    {scanned && Math.abs(scanned.edge) < 4 && <span className="sr-edge">no gap · {Math.abs(scanned.edge).toFixed(1)} pts</span>}
                    {skipped && <span className="sr-err">{skipped.err}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {!games.length && <p className="ing-hint">Start with step 1 — matchups and probable pitchers load in one tap. Odds screenshots imported in the Terminal land here too.</p>}
    </section>
  );
}

// ===========================================================================
// BET OF THE DAY — a mirror, not a pick. Predicts what pattern-you would bet
// on today's slate from the historical profile, and attaches what bets of
// that exact shape have actually returned.
// ===========================================================================
function BetOfTheDay() {
  const todayKey = etDayKey();
  const [slate, setSlate] = useState(null);
  const [teams, setTeams] = useState([]);
  const [botd, setBotd] = useState(null); // { date, ts, scanned, pick|null, patternPick }
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  useEffect(() => {
    (async () => {
      const raw = await store.get("ingenuity:teams", []);
      const migrated = raw.map((x) => ({ ...EMPTY_TEAM, ...x, players: x.players || [], rotation: x.rotation || [] }));
      const { merged } = mergeSeedRosters(migrated, false);
      setTeams(merged);
      const day = await store.get("ingenuity:slate:day", null);
      if (day && day.date === todayKey) setSlate(day);
      const saved = await store.get("ingenuity:botd", null);
      if (saved && saved.date === todayKey) setBotd(saved); // yesterday's pick never carries over
    })();
  }, []);

  const P = BETTOR_PROFILE;
  const games = (slate?.games || []).filter((g) => g.line !== "" && g.line != null && !isNaN(parseFloat(g.line)));

  // Pattern-you's pick: highest affinity to your most-bet teams, and it's an Over —
  // because that's what the ledger says you do.
  const patternPickFrom = (gs) => {
    const aff = (nm) => P.topTeams.reduce((s2, [t, c]) => s2 + (String(nm).includes(t) ? c : 0), 0);
    let best = gs[0], bs = -1;
    for (const g of gs) { const sc = aff(g.away) + aff(g.home); if (sc > bs) { bs = sc; best = g; } }
    return best ? { matchup: `${best.away} @ ${best.home}`, side: "Over", line: best.line } : null;
  };

  const findBestBet = async () => {
    if (!games.length) { setMsg("The slate needs games with totals first — build it in Today's Slate below (fetch or paste), then come back."); return; }
    setBusy(true); setMsg("");
    await new Promise((res) => setTimeout(res, 30));
    const scored = [];
    const skipped = [];
    for (const g of games) {
      const A = matchTeamDb(g.away, teams), H = matchTeamDb(g.home, teams);
      if (!A || !H) continue;
      const num = (v) => (v === "" || v == null ? null : parseFloat(v));
      const side = (t, pName) => {
        let sp = num(t.sp) ?? 0.32, spBf = num(t.spBf) ?? 200, spIp = num(t.spIp) ?? 5, spEra = num(t.spEra);
        let resolved = false;
        if (pName && t.rotation) {
          const pn = normName(pName);
          const hit = t.rotation.find((r) => normName(r.name) === pn) || t.rotation.find((r) => pn.includes(normName(r.name).split(" ").pop()));
          if (hit) { sp = num(hit.xwoba) ?? sp; spBf = num(hit.bf) ?? spBf; spIp = num(hit.ip) ?? spIp; spEra = num(hit.era) ?? spEra; resolved = num(hit.xwoba) != null; }
        }
        return { off: num(t.off) ?? CFG.LEAGUE_WOBA, xoff: num(t.xoff), pa: num(t.pa) ?? 600, recent: num(t.recent), recentPA: num(t.recentPA), recentBbk: num(t.recentBbk), sp, spBf, spIp, spEra, pen: num(t.pen) ?? 0.318, penBf: num(t.penBf) ?? 800, penBarrel: num(t.penBarrel), penHardHit: num(t.penHardHit), oaa: num(t.oaa), framing: num(t.framing), resolved };
      };
      if (g.inPlay || (g.start && new Date(g.start).getTime() <= Date.now())) continue; // underway — not a pregame question
      const a = side(A, g.awayP), h = side(H, g.homeP);
      // A "bet of the day" built on a guessed starter is a made-up number wearing
      // a confidence score. Sit the game out and say so.
      if (!a.resolved || !h.resolved) {
        skipped.push({ matchup: `${A.name} @ ${H.name}`, noArm: !g.awayP || !g.homeP });
        continue;
      }
      const line = parseFloat(g.line), over = parseFloat(g.over) || -110, under = parseFloat(g.under) || -110;
      const r = projectGame({
        park: parkForTeam(H.name), line, temp: g.wx ? g.wx.temp : null, windOut: g.wx ? g.wx.windOut : null,
        awayOff: a.off, awayXoff: a.xoff, awayPA: a.pa, awayRecent: a.recent, awayRecentPA: a.recentPA, awayRecentBbk: a.recentBbk, awaySP: a.sp, awaySPbf: a.spBf, awaySPip: a.spIp, awaySPera: a.spEra, awayPen: a.pen, awayPenBf: a.penBf, awayPenBarrel: a.penBarrel, awayPenHardHit: a.penHardHit, awayOAA: a.oaa, awayFraming: a.framing,
        homeOff: h.off, homeXoff: h.xoff, homePA: h.pa, homeRecent: h.recent, homeRecentPA: h.recentPA, homeRecentBbk: h.recentBbk, homeSP: h.sp, homeSPbf: h.spBf, homeSPip: h.spIp, homeSPera: h.spEra, homePen: h.pen, homePenBf: h.penBf, homePenBarrel: h.penBarrel, homePenHardHit: h.penHardHit, homeOAA: h.oaa, homeFraming: h.framing,
      }, 8000);
      const pW = r.pOver / (r.pOver + r.pUnder);
      const dO = amToDec(over), dU = amToDec(under);
      const fair = (1 / dO) / ((1 / dO) + (1 / dU));
      const edge = (pW - fair) * 100;
      const price = edge > 0 ? over : under;
      // Your ledger's lesson baked in: standard prices are your near-breakeven
      // lane; longshot prices are where the CLV paradox lives. Penalize them.
      const priceOk = Math.abs(price) <= 155;
      scored.push({ matchup: `${A.name} @ ${H.name}`, side: edge > 0 ? "Over" : "Under", line, price, edge, model: r.mean, pitchers: `${g.awayP || "TBD"} vs ${g.homeP || "TBD"}`, priceOk });
    }
    let best = null;
    for (const x of scored) {
      const eff = Math.abs(x.edge) - (x.priceOk ? 0 : 2); // longshot penalty
      if (!best || eff > best.eff) best = { ...x, eff };
    }
    const pick = best && Math.abs(best.edge) >= 4 && best.eff >= 4 ? best : null;
    const noArm = skipped.filter((s) => s.noArm).length;
    const result = { date: todayKey, ts: new Date().toISOString().slice(11, 16), scanned: scored.length,
      skipped: skipped.length, noArm, notInDb: skipped.length - noArm,
      pick, patternPick: patternPickFrom(games) };
    setBotd(result);
    await store.set("ingenuity:botd", result);
    setBusy(false);
  };

  return (
    <section className="botd">
      <div className="botd-head">
        <h2>Bet of the Day — model vs the mirror</h2>
        <span className="botd-sub">the model's best find from today's stored slate, next to what pattern-you would take ({P.total.n.toLocaleString()} logged bets) · research, not a recommendation</span>
      </div>

      {!botd && (
        <div className="botd-pick">
          <p>{games.length
            ? `Today's slate is loaded (${games.length} game${games.length === 1 ? "" : "s"} with totals). One tap runs the whole board and picks the single strongest model-vs-book gap — filtered through your own ledger's lessons.`
            : "No slate data yet for today. Build it in Today's Slate below (fetch matchups or paste the board), then find the best bet."}</p>
          <button className="ing-run small" onClick={findBestBet} disabled={busy || !games.length}>{busy ? "Scanning the board…" : "Find best bet"}</button>
          {msg && <p className="ing-hint">{msg}</p>}
        </div>
      )}

      {botd && (
        <>
          <div className="botd-pick">
            {botd.pick ? (
              <p>
                <strong>Model's best find: {botd.pick.side.toUpperCase()} {botd.pick.line} — {botd.pick.matchup}</strong> ({botd.pick.pitchers}) at {botd.pick.price > 0 ? "+" : ""}{botd.pick.price} · model {botd.pick.model.toFixed(2)} · {Math.abs(botd.pick.edge).toFixed(1)} pts past the no-vig book{botd.pick.priceOk ? "" : " — but note the price sits outside your profitable band"}. Scanned {botd.scanned} game{botd.scanned === 1 ? "" : "s"} with confirmed starters at {botd.ts}. Confirm it in the Terminal before it means anything.
              </p>
            ) : botd.scanned === 0 ? (
              <p>
                <strong>No bet of the day yet — nothing on the board is projectable.</strong> Not one game has both starters confirmed, and the starting pitcher is the single biggest input to a total. The odds feed carries lines and prices but never the probables, so tap <b>Fetch matchups + pitchers</b> in Today's Slate below, then re-run. This is a missing-data answer, not a pass.
              </p>
            ) : (
              <p>
                <strong>The model's best bet today is the pass.</strong> {botd.scanned} game{botd.scanned === 1 ? "" : "s"} scanned at {botd.ts}; nothing cleared the bar once your ledger's lessons (longshot penalty, 4+ pt minimum) were applied. That's not a blank — per your own history, the pass has been the most profitable bet you make.
              </p>
            )}
            {botd.skipped > 0 && botd.scanned > 0 && (
              <p className="botd-why">
                {botd.skipped} of {botd.scanned + botd.skipped} games sat out{botd.noArm ? ` — ${botd.noArm} with no probable starter posted` : ""}{botd.noArm && botd.notInDb ? "," : ""}{botd.notInDb ? ` ${botd.notInDb} whose starter isn't in your database yet` : ""}. Without the arm the model would be pricing a team-average pitcher who isn't throwing — a made-up number, not a rougher one. Fetch pitchers and re-run to widen the net.
              </p>
            )}
            {botd.patternPick && (
              <p className="botd-why">
                The mirror, for contrast — pattern-you would take: <strong>{botd.patternPick.side} {botd.patternPick.line} in {botd.patternPick.matchup}</strong> ({P.overPct}% of your totals are Overs; those teams are your most-bet). {botd.pick && botd.pick.matchup === botd.patternPick.matchup && botd.pick.side === botd.patternPick.side ? "Today the model and the mirror agree — rare enough to notice." : "When the model and the mirror disagree, the ledger says trust the model's pass over the pattern's itch."}
              </p>
            )}
            <button className="ing-ghost" onClick={findBestBet} disabled={busy}>{busy ? "Re-scanning…" : "Re-run (odds moved?)"}</button>
          </div>
          <div className="botd-truth">
            <div><em>Pattern-you's record in this shape</em><strong className="neg">{P.totalsMarket.roi}% ROI on totals · {P.live.roi}% live · {P.parlays.roi}% parlays</strong></div>
            <div><em>Closing line beaten</em><strong className="neg">{P.clvBeatPct}% of the time</strong></div>
            <div><em>The standing rule</em><strong>A pick here is a research flag — the Terminal's 20k-sim verdict is the only one that counts</strong></div>
          </div>
        </>
      )}
    </section>
  );
}
