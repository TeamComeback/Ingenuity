// LINEUP FETCHER — MLB Stats API (free, no key)
// ---------------------------------------------------------------------------
function yesterdayISO() {
  return etDayKey(new Date(Date.now() - 24 * 3600 * 1000));
}
// quick wOBA proxy when only OBP/SLG are available (MLB API doesn't publish wOBA)
function estWoba(obp, slg) {
  const o = parseFloat(obp), s = parseFloat(slg);
  if (isNaN(o) || isNaN(s)) return "";
  return ((1.7 * o + s) / 3).toFixed(3);
}

function LineupFetcher({ teams, saveTeams }) {
  const [date, setDate] = useState(yesterdayISO());
  const [games, setGames] = useState(null);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [detail, setDetail] = useState(null); // { gamePk, teams: [{name, players, probable}] }
  const [importMsg, setImportMsg] = useState("");
  const [pasteOpen, setPasteOpen] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [liveOpen, setLiveOpen] = useState(false);
  const [apiKey, setApiKey] = useState("");
  const [pasteMsg, setPasteMsg] = useState("");

  const fetchSchedule = async () => {
    setBusy(true); setError(null); setGames(null); setDetail(null); setImportMsg("");
    try {
      const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=probablePitcher`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      const list = (j.dates?.[0]?.games || []).map((g) => ({
        gamePk: g.gamePk,
        away: g.teams.away.team.name, home: g.teams.home.team.name,
        awaySP: g.teams.away.probablePitcher?.fullName || null,
        homeSP: g.teams.home.probablePitcher?.fullName || null,
        status: g.status?.detailedState || "",
        venue: g.venue?.name || "",
      }));
      setGames(list);
      if (!list.length) setError("No games found for that date.");
    } catch (e) {
      setError("fetch-failed");
    }
    setBusy(false);
  };

  const fetchLineups = async (g) => {
    setBusy(true); setError(null); setImportMsg("");
    try {
      const r = await fetch(`https://statsapi.mlb.com/api/v1/game/${g.gamePk}/boxscore`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      const side = (s, name, probable) => {
        const players = Object.values(j.teams[s].players || {})
          .filter((p) => p.battingOrder) // players who actually appeared in the batting order
          .sort((a, b) => parseInt(a.battingOrder) - parseInt(b.battingOrder))
          .slice(0, 10)
          .map((p) => {
            const b = p.seasonStats?.batting || {};
            return {
              name: p.person?.fullName || "?",
              order: Math.round(parseInt(p.battingOrder) / 100),
              obp: b.obp || "", slg: b.slg || "",
              woba: estWoba(b.obp, b.slg),
              pa: b.plateAppearances ?? "",
            };
          });
        return { name, players, probable };
      };
      setDetail({
        gamePk: g.gamePk,
        teams: [side("away", g.away, g.awaySP), side("home", g.home, g.homeSP)],
      });
    } catch (e) {
      setError("fetch-failed");
    }
    setBusy(false);
  };

  const importTeam = (t) => {
    const players = t.players.map((p) => ({ name: p.name, woba: p.woba, pa: String(p.pa || "") }));
    const { off, pa } = lineupToTeamOffense(players);
    const next = [...teams];
    const i = next.findIndex((x) => x.name.toLowerCase() === t.name.toLowerCase());
    const base = i >= 0 ? next[i] : { ...EMPTY_TEAM, name: t.name };
    const merged = {
      ...base,
      players,
      off: off ?? base.off, pa: pa != null ? String(pa) : base.pa,
      rotation: t.probable && !(base.rotation || []).some((r) => r.name === t.probable)
        ? [...(base.rotation || []), { name: t.probable, xwoba: "", bf: "", ip: "" }]
        : (base.rotation || []),
    };
    if (i >= 0) next[i] = merged; else next.push(merged);
    saveTeams(next);
    setImportMsg(`Saved ${t.name} — ${players.length} hitters${t.probable ? `, probable SP ${t.probable} added to rotation (fill xwOBA from Savant)` : ""}.`);
  };

  const importPaste = () => {
    setPasteMsg("");
    try {
      const data = JSON.parse(pasteText);
      const arr = Array.isArray(data) ? data : [data];
      const next = [...teams];
      let count = 0;
      for (const raw of arr) {
        if (!raw.name) continue;
        const i = next.findIndex((x) => x.name.toLowerCase() === String(raw.name).toLowerCase());
        const base = i >= 0 ? next[i] : { ...EMPTY_TEAM };
        const merged = { ...base, ...raw, players: raw.players || base.players || [], rotation: raw.rotation || base.rotation || [] };
        if (i >= 0) next[i] = merged; else next.push(merged);
        count++;
      }
      saveTeams(next);
      setPasteMsg(`Imported ${count} team${count === 1 ? "" : "s"}.`);
      setPasteText("");
    } catch {
      setPasteMsg("Couldn't parse that — needs valid JSON (a team object or an array of them).");
    }
  };

  return (
    <main className="ing-main single">
      <section className="ing-lineups">
        <h2 className="lg-formtitle">Pull lineups &amp; probables</h2>
        <p className="ing-hint">
          Fetches from the public MLB Stats API — actual batting orders for completed games (use yesterday to grab
          who's actually playing) and probable pitchers for upcoming ones. wOBA is estimated from OBP/SLG
          ((1.7·OBP + SLG) ÷ 3) since the API doesn't publish it; swap in true xwOBA from Baseball Savant when precision matters.
        </p>
        <div className="ing-fetchbar">
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
          <button className="ing-run small" onClick={fetchSchedule} disabled={busy}>{busy ? "Fetching…" : "Fetch slate"}</button>
          <button className="ing-ghost" onClick={() => { setDate(yesterdayISO()); }}>Yesterday</button>
        </div>

        {error === "fetch-failed" && (
          <div className="ing-fetcherr">
            <h3>Couldn't reach the MLB Stats API from here</h3>
            <p>This environment may block the request. Two ways to keep the database fed without screenshots:</p>
            <ol>
              <li><strong>Paste JSON below.</strong> Export from Baseball Savant (leaderboard → CSV), or ask me in chat to fetch a slate — I can pull lineups/stats with web search and hand you a ready-to-paste JSON block.</li>
              <li><strong>Run a tiny local script.</strong> One <code>curl</code> to <code>statsapi.mlb.com/api/v1/schedule?sportId=1&amp;date=YYYY-MM-DD</code> then <code>/game/&#123;gamePk&#125;/boxscore</code> gives you every lineup; I can write that script for you.</li>
            </ol>
          </div>
        )}
        {error && error !== "fetch-failed" && <p className="ing-fetcherr-msg">{error}</p>}

        {games && !detail && (
          <div className="ing-slate">
            {games.map((g) => (
              <button className="ing-slate-row" key={g.gamePk} onClick={() => fetchLineups(g)}>
                <span className="ing-slate-match">{g.away} @ {g.home}</span>
                <span className="ing-slate-sp">{g.awaySP || "TBD"} v {g.homeSP || "TBD"}</span>
                <span className="ing-slate-status">{g.status}</span>
              </button>
            ))}
          </div>
        )}

        {detail && (
          <div className="ing-lineup-detail">
            <button className="ing-ghost tiny" onClick={() => setDetail(null)}>← back to slate</button>
            {importMsg && <p className="ing-importmsg">{importMsg}</p>}
            <div className="ing-lineup-cols">
              {detail.teams.map((t, i) => (
                <div className="ing-lineup-col" key={i}>
                  <div className="ing-lineup-col-head">
                    <h3>{t.name}</h3>
                    <button className="ing-run small" onClick={() => importTeam(t)}>Save to database</button>
                  </div>
                  {t.probable && <p className="ing-probable">Probable SP: {t.probable}</p>}
                  {t.players.length === 0 && <p className="ing-hint">No batting order yet (game not started). Probables still importable.</p>}
                  {t.players.map((p, j) => (
                    <div className="ing-lineup-player" key={j}>
                      <span className="ord">{p.order}</span>
                      <span className="nm">{p.name}</span>
                      <span className="st">OBP {p.obp || "—"} · SLG {p.slg || "—"}</span>
                      <span className="wb">~{p.woba || "—"}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="ing-pasteblock">
          <button className="ing-ghost" onClick={() => setPasteOpen(!pasteOpen)}>
            {pasteOpen ? "Hide" : "Paste"} JSON import
          </button>
          {pasteOpen && (
            <>
              <p className="ing-hint">
                Accepts one team object or an array. Fields: <code>name, off, pa, recent, recentPA, sp, spBf, spIp, pen, penBf,
                players:[&#123;name,woba,pa&#125;], rotation:[&#123;name,xwoba,bf&#125;]</code>. Existing teams with the same name are updated, not duplicated.
              </p>
              <textarea rows={6} value={pasteText} onChange={(e) => setPasteText(e.target.value)}
                placeholder='[{"name":"Orioles","off":"0.331","pa":"3200","pen":"0.312","players":[{"name":"Gunnar Henderson","woba":"0.370","pa":"380"}]}]' />
              <button className="ing-run small" onClick={importPaste}>Import</button>
              {pasteMsg && <p className="ing-importmsg">{pasteMsg}</p>}
            </>
          )}
        </div>
      </section>
    </main>
  );
}

function TeamCard({ label, team, setTeam, teams, onLoad }) {
  const [showRoster, setShowRoster] = useState(true);
  const set = (k) => (e) => setTeam({ ...team, [k]: e.target.value });
  const pickStarter = (name) => {
    if (!name) { setTeam({ ...team, starter: "" }); return; }
    const p = (team.rotation || []).find((r) => r.name === name);
    if (!p) return;
    // Auto-load the starter's projected stats into the sim's SP inputs the
    // moment they're selected. Blank stats fall back to prior/league values.
    setTeam({
      ...team,
      starter: name,
      sp: p.xwoba || "",
      spBf: p.bf || "",
      spIp: p.ip || team.spIp || "5.0",
      spEra: p.era || "",
    });
  };
  const starterObj = (team.rotation || []).find((r) => r.name === team.starter);
  const starterHasStats = starterObj && starterObj.xwoba !== "" && starterObj.xwoba != null;
  // Type a team name → the moment it matches a saved team, the whole record
  // (lineup, stats, pitching staff) loads into this slot.
  const handleName = (e) => {
    const v = e.target.value;
    const match = teams.find((t) => (t.name || "").toLowerCase() === v.trim().toLowerCase());
    if (match) setTeam({ ...EMPTY_TEAM, ...match });
    else setTeam({ ...team, name: v });
  };
  const listId = `ing-teamlist-${label.toLowerCase()}`;
  const lineup = team.players || [];
  return (
    <div className="ing-teamcard">
      <div className="ing-teamcard-head">
        <span className="ing-teamlabel">{label}</span>
        {teams.length > 0 && (
          <select className="ing-load" value="" onChange={(e) => e.target.value && onLoad(e.target.value)}>
            <option value="">Load saved…</option>
            {teams.map((t, i) => <option key={i} value={t.name}>{t.name}</option>)}
          </select>
        )}
      </div>
      <input className="ing-teamname" value={team.name} onChange={handleName} placeholder="Type a team name…" list={listId} />
      <datalist id={listId}>
        {teams.map((t, i) => <option key={i} value={t.name} />)}
      </datalist>
      {(team.rotation || []).length > 0 && (
        <>
          <select className="ing-load full" value={team.starter || ""} onChange={(e) => pickStarter(e.target.value)}>
            <option value="">Today's starter…</option>
            {team.rotation.map((p, i) => <option key={i} value={p.name}>{p.name}{p.xwoba ? ` · ${p.xwoba}` : " · no stats yet"}</option>)}
          </select>
          {team.starter && (
            <p className={`ing-sp-note ${starterHasStats ? "" : "warn"}`}>
              {starterHasStats
                ? `SP loaded: ${team.starter} — xwOBA ${starterObj.xwoba}${starterObj.era ? `, ${starterObj.era} ERA-blend` : ""}${starterObj.bf ? `, ${starterObj.bf} BF` : ""}${starterObj.ip ? `, ${starterObj.ip} IP/st` : ""}`
                : `${team.starter} selected — no stats saved yet, sim will use league-average SP until they're loaded`}
            </p>
          )}
        </>
      )}
      {lineup.length > 0 && (
        <div className="ing-card-roster">

function OddsInput({ value, onChange, placeholder }) {
  const str = String(value ?? "").trim();
  const neg = str.startsWith("-");
  const hasVal = str !== "" && str !== "-" && str !== "+";
  const setSign = (sign) => {
    const n = Math.abs(parseFloat(str));
    if (isNaN(n)) { onChange(sign === "-" ? "-" : ""); return; }
    onChange(sign === "-" ? String(-n) : String(n));
  };
  return (
    <div className="ing-odds">
      <button type="button" className={"sign" + (hasVal && !neg ? " on" : "")} onClick={() => setSign("+")} aria-label="Plus odds">+</button>
      <button type="button" className={"sign" + (neg ? " on" : "")} onClick={() => setSign("-")} aria-label="Minus odds">−</button>
      <input value={value ?? ""} onChange={(e) => onChange(e.target.value)} placeholder={placeholder || "-110"} inputMode="numeric" />
    </div>
  );
}

function Field({ label, v, on }) {
  return (
    <label className="ing-f">
      <span>{label}</span>
      <input value={v ?? ""} onChange={on} inputMode="decimal" placeholder="—" />
    </label>
  );
}

function Readout({ r, onLog, logMsg }) {
  // win probability conditional on no push — the right basis for pricing a bet
  const pPush = r.pPush || 0;
  const pWinOver = r.pOver / (r.pOver + r.pUnder);
  const pWinUnder = 1 - pWinOver;
  const edge = pWinOver - 0.5;
  const strength = Math.abs(edge);
  const side = edge > 0 ? "OVER" : "UNDER";
  let verdict, vclass;
  if (strength < 0.04) { verdict = "No edge — coin flip. Pass. (Deep-dive verdict: the Terminal only calls an edge past a slate 'candidate' — this one didn't survive the closer look.)"; vclass = "flat"; }
  else if (strength < 0.07) { verdict = `Slight ${side} lean — inside the error bar. Watch, don't bet.`; vclass = "lean"; }
  else { verdict = `${side} edge confirmed at full depth. Verify park + weather before trusting it.`; vclass = "strong"; }

  const maxBin = Math.max(...Object.values(r.hist));
  const binKeys = Object.keys(r.hist).map(Number).sort((a, b) => a - b);
  const lo = Math.max(0, binKeys[0]), hi = binKeys[binKeys.length - 1];
  const bars = [];
  for (let b = lo; b <= hi; b++) bars.push({ b, c: r.hist[b] || 0 });

  const teamTotals = [
    { name: r.awayName, mean: r.awayMean, arr: r.awayRuns },
    { name: r.homeName, mean: r.homeMean, arr: r.homeRuns },
  ];

  // EV vs the book, push-aware: a push refunds the stake, so
  // EV = pWin·profit − pLose·stake, with the push slice contributing zero.
  const evRow = (label, pWin, pLose, price) => {
    const d = amToDec(price);
    if (d == null) return null;
    const implied = (1 / d) * 100;
    const ev = pWin * (d - 1) * 100 - pLose * 100;
    return { label, p: pWin * 100, implied, ev, price };
  };
  const evRows = [
    r.overPrice != null ? evRow(`Over ${r.line}`, r.pOver, r.pUnder, r.overPrice) : null,
    r.underPrice != null ? evRow(`Under ${r.line}`, r.pUnder, r.pOver, r.underPrice) : null,
  ].filter(Boolean);
  // De-vig: strip the book's margin to get its true (no-vig) opinion.
  let devig = null;
  if (r.overPrice != null && r.underPrice != null) {
    const dO = amToDec(r.overPrice), dU = amToDec(r.underPrice);
    if (dO != null && dU != null) {
      const qO = 1 / dO, qU = 1 / dU;
      devig = { fairOver: qO / (qO + qU), hold: (qO + qU - 1) * 100 };
    }
  }

  return (
    <div className="ing-readout">
      <div className="ing-bignum">
        <div className="ing-total">
          <span className="ing-total-val">{r.mean.toFixed(2)}</span>
          <span className="ing-total-label">projected total</span>
        </div>
        <div className="ing-vs-line">
          <span>book {r.line}</span>
          <span className="ing-med">median {r.median.toFixed(1)}</span>
        </div>
      </div>

      {(r.awayStarter || r.homeStarter) && (
        <p className="ing-matchup-sp">{r.awayStarter || "TBD"} v {r.homeStarter || "TBD"}</p>
      )}

      <div className={`ing-verdict ${vclass}`}>{verdict}</div>

      {evRows.length > 0 && (
        <div className="ing-ev">
          <div className="ing-tt-head">Model vs book (per $100)</div>
          {evRows.map((e, i) => (
            <div className="ing-ev-row" key={i}>
              <span className="ing-ev-label">{e.label} <em>{e.price > 0 ? "+" : ""}{e.price}</em></span>
              <span className="ing-ev-probs">model {e.p.toFixed(1)}% · book implies {e.implied.toFixed(1)}%</span>
              <span className={`ing-ev-val ${e.ev > 0 ? "pos" : "neg"}`}>{e.ev > 0 ? "+" : ""}${e.ev.toFixed(1)}</span>
            </div>
          ))}
          {devig && (
            <div className="ing-devig">
              No-vig book opinion: Over {(devig.fairOver * 100).toFixed(1)}% / Under {((1 - devig.fairOver) * 100).toFixed(1)}%
              · hold {devig.hold.toFixed(1)}%
              · model vs no-vig gap: {((pWinOver - devig.fairOver) * 100) > 0 ? "+" : ""}{((pWinOver - devig.fairOver) * 100).toFixed(1)} pts on the over
            </div>
          )}
          <p className="ing-ev-note">The no-vig line is the book's true opinion with its margin stripped out — that's the number to beat, not the posted price. Positive EV is a lead to verify, not a green light.</p>
        </div>
      )}

      <div className="ing-logrow">
        {onLog && <button className="ing-ghost" onClick={() => onLog(r)} disabled={!!logMsg}>Log to ledger</button>}
        {logMsg && <span className="ing-importmsg">{logMsg}</span>}
      </div>

      <div className="ing-probs">
        <div className="ing-prob">
          <span className="ing-prob-label">Over {r.line}</span>
          <span className="ing-prob-val">{(pWinOver * 100).toFixed(1)}%</span>
          <span className="ing-prob-odds">fair {americanOdds(pWinOver)}</span>
        </div>
        <div className="ing-prob">
          <span className="ing-prob-label">Under {r.line}</span>
          <span className="ing-prob-val">{(pWinUnder * 100).toFixed(1)}%</span>
          <span className="ing-prob-odds">fair {americanOdds(pWinUnder)}</span>
        </div>
      </div>
      {pPush > 0.005 && (
        <p className="ing-push-note">Push risk at {r.line}: {(pPush * 100).toFixed(1)}% of sims land exactly on the number (stake refunded, win probabilities shown are push-excluded).</p>
      )}

      <div className="ing-curve">
        <div className="ing-curve-head">Run distribution <span>80% range {r.p10.toFixed(0)}–{r.p90.toFixed(0)}</span></div>
        <div className="ing-bars">
          {bars.map(({ b, c }) => {
            const isLine = b === Math.round(r.line);
            return (
              <div className="ing-bar-wrap" key={b}>
                <div className="ing-bar" style={{ height: `${(c / maxBin) * 100}%` }} data-line={isLine} />
                <span className="ing-bar-label">{b}</span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="ing-teamtotals">
        <div className="ing-tt-head">Team totals</div>
        {teamTotals.map((t, i) => (
          <div className="ing-tt-row" key={i}>
            <span className="ing-tt-name">{t.name}</span>
            <span className="ing-tt-mean">{t.mean.toFixed(2)}</span>
            <div className="ing-tt-probs">
              {[3.5, 4.5, 5.5].map((l) => (
                <span key={l}>o{l} <em>{(r.teamProb(t.arr, l) * 100).toFixed(0)}%</em></span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const BLANK_GAME = {
  date: "", matchup: "", park: "", model: "", line: "", lean: "", leanSide: "none",
  decision: "PASS", betDetail: "", final: "", outcome: "", note: "",
};
const BLANK_BET = {
  date: "", desc: "", type: "straight", market: "O/U", odds: "", stake: "", closing: "",
  legs: [{ desc: "", odds: "" }, { desc: "", odds: "" }],
  modelCall: "MANUAL", result: "PENDING", notes: "",
};

function Ledger({ onHome }) {
  const [tab, setTab] = useState("record");
  const [games, setGames] = useState(SEED_GAMES);
  const [bets, setBets] = useState(SEED_BETS);
  const [form, setForm] = useState({ ...BLANK_GAME });
  const [betForm, setBetForm] = useState({ ...BLANK_BET });
  const [loaded, setLoaded] = useState(false);
  const [betFilter, setBetFilter] = useState("all"); // all | manual

  useEffect(() => {
    (async () => {
      const g = await store.get("ingenuity:ledger:games", null);
      const b = await store.get("ingenuity:ledger:bets", null);
      if (g) setGames(g); else await store.set("ingenuity:ledger:games", SEED_GAMES);
      if (b) setBets(b); else await store.set("ingenuity:ledger:bets", SEED_BETS);
      setLoaded(true);
    })();
  }, []);

  const saveGames = useCallback(async (next) => { setGames(next); await store.set("ingenuity:ledger:games", next); }, []);
  const saveBets = useCallback(async (next) => { setBets(next); await store.set("ingenuity:ledger:bets", next); }, []);

  const addGame = () => {
    if (!form.matchup.trim()) return;
    const g = {
      ...form, id: Date.now(),
      model: form.model === "" ? null : parseFloat(form.model),
      line: form.line === "" ? null : parseFloat(form.line),
      final: form.final === "" ? null : parseFloat(form.final),
      betDetail: form.betDetail.trim() || null,
    };
    saveGames([g, ...games]);
    setForm({ ...BLANK_GAME });
    setTab("archive");
  };

  // ---- manual bet math ----
  const stakeNum = parseFloat(betForm.stake) || 0;
  const dec = betForm.type === "parlay"
    ? parlayDecimal(betForm.legs.filter((l) => l.odds !== ""))
    : amToDec(betForm.odds);
  const potentialPayout = dec != null && stakeNum > 0 ? stakeNum * dec : null;
  const potentialProfit = potentialPayout != null ? potentialPayout - stakeNum : null;

  const addBet = () => {
    if (!betForm.desc.trim() && betForm.type === "straight") return;
    const isParlay = betForm.type === "parlay";
    const legs = isParlay ? betForm.legs.filter((l) => l.desc.trim() || l.odds !== "") : null;
    const desc = isParlay
      ? (betForm.desc.trim() || `${legs.length}-leg parlay: ` + legs.map((l) => l.desc || "?").join(" + "))
      : betForm.desc.trim();
    if (!desc) return;
    const d = isParlay ? parlayDecimal(legs) : amToDec(betForm.odds);
    const stake = parseFloat(betForm.stake) || 0;
    const profit = d != null ? stake * (d - 1) : 0;
    const net = betForm.result === "W" ? Math.round(profit * 100) / 100
      : betForm.result === "L" ? -stake
      : 0; // push or pending
    const bet = {
      date: betForm.date || etDayKey(),
      loggedAt: Date.now(), // when YOU entered it — lets the ledger surface your own entries
      src: "manual",
      desc, type: betForm.type,
      market: betForm.market,
      legs,
      odds: isParlay ? (d != null ? decToAm(d) : null) : (betForm.odds === "" ? null : parseFloat(betForm.odds)),
      dec: d,
      clv: (!isParlay && amToDec(betForm.closing) != null && d != null)
        ? Math.round((d / amToDec(betForm.closing) - 1) * 1000) / 10
        : null,
      stake,
      modelCall: betForm.modelCall,
      result: betForm.result,
      net,
      notes: betForm.notes.trim(),
    };
    saveBets([...bets, bet]);
    setBetForm({ ...BLANK_BET, legs: [{ desc: "", odds: "" }, { desc: "", odds: "" }] });
    setBetFilter("manual"); // land on Record showing your own entries
    setTab("record");
  };

  const settleBet = (i, result) => {
    const next = bets.map((b, j) => {
      if (j !== i) return b;
      const d = b.dec ?? (b.type === "parlay" && b.legs ? parlayDecimal(b.legs) : amToDec(b.odds));
      const profit = d != null ? b.stake * (d - 1) : 0;
      const net = result === "W" ? Math.round(profit * 100) / 100 : result === "L" ? -b.stake : 0;
      return { ...b, result, net };
    });
    saveBets(next);
  };

  const setLeg = (i, k, v) => {
    const legs = betForm.legs.map((l, j) => (j === i ? { ...l, [k]: v } : l));
    setBetForm({ ...betForm, legs });
  };

  // ---- record math ----
  const graded = bets.filter((b) => b.result === "W" || b.result === "L");
  const wins = graded.filter((b) => b.result === "W").length;
  const losses = graded.filter((b) => b.result === "L").length;
  const pending = bets.filter((b) => b.result === "PENDING").length;
  const net = Math.round(bets.reduce((s, b) => s + (b.net || 0), 0) * 100) / 100;
  const modelBets = bets.filter((b) => b.modelCall === "MODEL LEAN");
  const againstBets = bets.filter((b) => b.modelCall !== "MODEL LEAN");
  const manualCount = bets.filter((b) => b.src === "manual").length;
  // Newest first so a bet you just logged is at the TOP, not buried under the seeds.
  // Carry the original index so settleBet still targets the right row.
  const shownBets = bets
    .map((b, i) => ({ b, i }))
    .filter(({ b }) => betFilter === "all" || b.src === "manual")
    .sort((x, y) => {
      const d = String(y.b.date || "").localeCompare(String(x.b.date || ""));
      if (d !== 0) return d;
      return (y.b.loggedAt || 0) - (x.b.loggedAt || 0);
    });
  const passes = games.filter((g) => g.decision.startsWith("PASS") && !g.decision.includes("BET"));
  const modelErrGames = games.filter((g) => g.model != null && g.final != null);
  const avgErr = modelErrGames.length
    ? modelErrGames.reduce((s, g) => s + (g.final - g.model), 0) / modelErrGames.length : 0;

  return (
    <>
      <header className="ing-head">
        <div className="ing-brand">
          <button className="ing-home-btn" onClick={onHome} aria-label="Back to home">← Home</button>
          <div>
            <h1>LEDGER</h1>
            <p>Research record · game archive · honest bookkeeping</p>
          </div>
        </div>
        <nav className="ing-nav">
          {["record", "history", "archive", "addgame", "addbet"].map((t) => (
            <button key={t} className={tab === t ? "on" : ""} onClick={() => setTab(t)}>
              {t === "record" ? "Record" : t === "history" ? "History" : t === "archive" ? "Games" : t === "addgame" ? "Add game" : "Add bet"}
            </button>
          ))}
        </nav>
      </header>

      {tab === "record" && (
        <main className="lg-main">
          <section className="lg-stats">
            <div className="lg-stat big">
              <span className={`lg-stat-val ${net < 0 ? "red" : "green"}`}>{wins}–{losses}</span>
              <span className="lg-stat-label">graded bets{pending ? ` · ${pending} pending` : ""}</span>
            </div>
            <div className="lg-stat big">
              <span className={`lg-stat-val ${net < 0 ? "red" : "green"}`}>{net < 0 ? "-" : "+"}${Math.abs(net)}</span>
              <span className="lg-stat-label">net result</span>
            </div>
            <div className="lg-stat">
              <span className="lg-stat-val">{passes.length}</span>
              <span className="lg-stat-label">model passes</span>
            </div>
            <div className="lg-stat">
              <span className="lg-stat-val amber">{avgErr > 0 ? "+" : ""}{avgErr.toFixed(1)}</span>
              <span className="lg-stat-label">avg model error (runs)</span>
            </div>
          </section>

          <section className="lg-split">
            <div className="lg-split-card">
              <h3>Bets on model leans</h3>
              <div className="lg-split-num">{modelBets.length}</div>
              <p>{modelBets.filter((b) => b.result === "L").length} lost · ${Math.abs(Math.round(modelBets.reduce((s, b) => s + (b.net || 0), 0)))} {modelBets.reduce((s, b) => s + (b.net || 0), 0) < 0 ? "down" : "up"}</p>
            </div>
            <div className="lg-split-card warn">
              <h3>Bets against / outside model</h3>
              <div className="lg-split-num">{againstBets.length}</div>
              <p>{againstBets.filter((b) => b.result === "L").length} lost · ${Math.abs(Math.round(againstBets.reduce((s, b) => s + (b.net || 0), 0)))} {againstBets.reduce((s, b) => s + (b.net || 0), 0) < 0 ? "down" : "up"}</p>
            </div>
          </section>

          <section className="lg-story">
            <h2>What the record actually says</h2>
            <p>
              Of the money lost, <strong>${Math.abs(Math.round(againstBets.reduce((s, b) => s + (b.net || 0), 0)))} of ${Math.abs(net)}</strong> came
              from bets the model never endorsed — placed against its passes or on games it never evaluated.
              The single model-endorsed bet (PIT/PHI Over 8.5) was a sound structural read that lost to a gem from Sánchez.
              Meanwhile the model's passes repeatedly kept money off coin flips, and its two big misses (Rays/Royals,
              Padres/Cubs) were <em>watched, not bet</em> — the discipline worked even when the projection didn't.
            </p>
          </section>

          <section className="lg-betlist">
            <div className="lg-betlist-head">
              <h2>Every bet <span className="lg-count">{bets.length}</span></h2>
              <div className="lg-filter">
                <button className={betFilter === "all" ? "on" : ""} onClick={() => setBetFilter("all")}>All</button>
                <button className={betFilter === "manual" ? "on" : ""} onClick={() => setBetFilter("manual")}>
                  Logged by you{manualCount ? ` · ${manualCount}` : ""}
                </button>
              </div>
            </div>
            {betFilter === "manual" && !manualCount && (
              <p className="lg-hint">No manually logged bets yet. Use the <b>Add bet</b> tab — they'll appear here at the top, newest first.</p>
            )}
            {shownBets.map(({ b, i }) => (
              <div className={"lg-bet" + (b.src === "manual" ? " mine" : "")} key={i}>
                <span className="lg-bet-date">
                  {b.date}
                  {b.src === "manual" && <span className="lg-mine-tag">✎ yours</span>}
                </span>
                <div className="lg-bet-body">
                  <span className="lg-bet-desc">
                    {b.market && <span className="lg-mkt">{b.market}</span>}
                    {b.desc}
                    {b.type === "parlay" && <span className="lg-parlay-tag"> PARLAY {b.odds ? `· ${b.odds}` : ""}</span>}
                  </span>
                  {b.type === "parlay" && b.legs && (
                    <span className="lg-bet-legs">{b.legs.map((l) => `${l.desc || "?"} (${l.odds > 0 ? "+" : ""}${l.odds})`).join(" · ")}</span>
                  )}
                  {b.clv != null && <span className={`lg-clv ${b.clv >= 0 ? "pos" : "neg"}`}>CLV {b.clv >= 0 ? "+" : ""}{b.clv}%</span>}
                  {b.notes && <span className="lg-bet-notes">✎ {b.notes}</span>}
                </div>
                <span className={`lg-tag ${b.modelCall === "MODEL LEAN" ? "ok" : b.modelCall === "MANUAL" ? "quiet" : "warn"}`}>{b.modelCall}</span>
                <span className="lg-bet-stake">${b.stake}</span>
                {b.result === "PENDING" ? (
                  <span className="lg-settle">
                    <button onClick={() => settleBet(i, "W")}>W</button>
                    <button onClick={() => settleBet(i, "L")}>L</button>
                    <button onClick={() => settleBet(i, "P")}>P</button>
                  </span>

// ===========================================================================
// SMART IMPORT — paste Savant CSVs or drop screenshots (lineups, stats, odds).
// CSVs parse locally; images go through Claude vision and come back as
// structured data that updates the database / feeds the Slate Scanner.
// ===========================================================================
// Downscale + re-encode any image to JPEG under the API size limit.
// Full-res phone screenshots routinely exceed 5MB as base64 — this was the
// cause of the "vision call unavailable" failures.
// File Interpreter's memory: every conversion attempt (paste, CSV, image)
// gets logged so failure patterns surface in the Brain instead of vanishing.
async function logInterp(kind, ok, detail) {
  try {
    const log = await store.get("ingenuity:brain:interpLog", []);
    const nl = [{ ts: new Date().toISOString().slice(5, 16).replace("T", " "), kind, ok, detail: String(detail || "").slice(0, 90) }, ...log].slice(0, 20);
    await store.set("ingenuity:brain:interpLog", nl);
  } catch {}
}

// NOTE: the artifact sandbox blocks blob: URLs, so files must be read as
// data: URLs (FileReader). If canvas decode fails, fall back to sending the
// original bytes when they're an API-supported type and small enough.
async function readFileDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error("the file could not be read"));
    r.readAsDataURL(file);
  });
}

async function prepImageForAI(file) {
  const dataUrl = await readFileDataUrl(file);
  try {
    const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = () => rej(new Error("decode failed")); i.src = dataUrl; });
    const scale = Math.min(1, 1568 / Math.max(img.width, img.height));
    const cv = document.createElement("canvas");
    cv.width = Math.max(1, Math.round(img.width * scale));
    cv.height = Math.max(1, Math.round(img.height * scale));
    cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
    const out = cv.toDataURL("image/jpeg", 0.85).split(",")[1];
    if (out && out.length > 50) return { b64: out, mediaType: "image/jpeg" };
    throw new Error("canvas produced no data");
  } catch {
    const b64 = String(dataUrl).split(",")[1] || "";
    const mediaType = /^image\/(jpeg|png|webp|gif)$/.test(file.type || "") ? file.type : "image/jpeg";
    if (!b64) throw new Error("the image contained no readable data");
    if (b64.length > 4700000) throw new Error("image too large to send unresized — crop the screenshot tighter and retry");
    return { b64, mediaType };
  }
}

// One vision/JSON call with real error surfacing instead of a blind catch.
// NOTE: this environment's API bridge requires max_tokens to be exactly 1000
// — other values are rejected ("Invalid response format").
async function callVisionJSON(blocks) {
  const data = await callClaudeAPI({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: blocks }] });
  if (data.error) throw new Error(typeof data.error === "string" ? data.error : data.error.message || data.error.type || "API error");
  const raw = (data.content || []).map((c) => c.text || "").join("").trim();
  const a = raw.indexOf("{"), b = raw.lastIndexOf("}");
  if (a === -1 || b === -1) throw new Error("model returned no JSON" + (raw ? ` — got: "${raw.slice(0, 80)}"` : " (empty reply)"));
  return JSON.parse(raw.slice(a, b + 1));
}

function parseCsvText(text) {
  text = text.replace(/^\uFEFF/, "");
  // delimiter sniff: Excel/Numbers copies are often tab- or semicolon-separated
  const first = text.split("\n")[0] || "";
  const best = [",", "\t", ";"].map((d) => [d, first.split(d).length]).sort((x, y) => y[1] - x[1])[0];
  const DELIM = best[1] > 1 ? best[0] : ",";
  const rows = []; let row = [], cur = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) { if (c === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else q = false; } else cur += c; }
    else if (c === '"') q = true;
    else if (c === DELIM) { row.push(cur); cur = ""; }
    else if (c === "\n") { row.push(cur); rows.push(row); row = []; cur = ""; }
    else if (c !== "\r") cur += c;
  }
  if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

// Apply a list of {name, woba?, xwoba?, pa?, era?, xera?} rows to the team DB.
// Hitters get the 55/45 xwOBA/wOBA blend; pitchers get xwOBA + ERA-blend.
//
// mode "season" (default) → writes career/season truth: player wOBA, team off/pa,
//   rotation xwOBA/ERA, bullpen. This is the long-run talent picture.
// mode "recent"  → writes ONLY the team-level 14-day form fields (recent,
//   recentPA, recentBbk) and never touches season numbers. Recent windows are
//   small samples; overwriting season talent with 14 days of noise is exactly
//   the mistake the stabilization logic exists to prevent.
function applyStatRows(rows, teams, mode = "season", rosterMap = null) {
  // Auto-roster: figure out each player's team, then make sure he exists on
  // that team's roster before matching. This lets an import work even when
  // rosters are empty or thin. Two sources, in order: (1) the CSV's own team
  // column when the file happens to have one, (2) MLB's own roster list
  // (rosterMap) for files that don't — which is the NORMAL Baseball Savant
  // case, since Savant has no way to add a team column to its exports at all.
  // A pitcher row (has ERA/xERA or barrel-allowed but no wOBA) seeds the
  // rotation; a hitter row seeds the lineup.
  let seeded = 0, unroutable = 0;
  if (rows.some((r) => r.team) || (rosterMap && Object.keys(rosterMap).length)) {
    const idx = new Map(); // resolved team name -> team object
    teams.forEach((t) => idx.set(normName(t.name), t));
    for (const r of rows) {
      const fromMap = !r.team && rosterMap ? rosterMap[normName(r.name)] : null;
      if (!r.team && !fromMap) { continue; } // no team label anywhere for this player — leave to the season/recent name-match below
      const resolved = r.team ? (resolveTeamName(r.team) || r.team) : fromMap;
      let t = idx.get(normName(resolved));
      if (!t) { unroutable++; continue; } // team not in the 30-team DB (shouldn't happen, but safe)
      const isPitcher = (r.era != null || r.xera != null || (r.barrel != null && r.woba == null && r.xwoba == null));
      const bucket = isPitcher ? "rotation" : "players";
      t[bucket] = t[bucket] || [];
      const exists = t[bucket].some((p) => normName(p.name) === normName(r.name));
      if (!exists) {
        if (isPitcher) t.rotation.push({ name: r.name, xwoba: "", bf: "", ip: "", era: "" });
        else t.players.push({ name: r.name, woba: "", pa: "" });
        seeded++;
      }
    }
  }

  const byName = new Map();
  for (const r of rows) { const k = normName(r.name); if (k) byName.set(k, r); }
  const lastIdx = new Map();
  for (const [k, v] of byName) { const ln = k.split(" ").pop(); lastIdx.set(ln, lastIdx.has(ln) ? null : { k, v }); }
  const look = (nm) => {
    const n = normName(nm);
    if (byName.has(n)) return byName.get(n);
    const hit = lastIdx.get(n.split(" ").pop());
    return hit && hit.k[0] === n[0] ? hit.v : null;
  };
  // ---- recent (14-day) mode: team-level form only ----
  if (mode === "recent") {
    let matched = 0;
    const nextR = teams.map((t) => {
      let wSum = 0, paSum = 0, bbkSum = 0, bbkPA = 0, hit = 0;
      for (const pl of (t.players || [])) {
        const st = look(pl.name);
        if (!st) continue;
        const pa = st.pa != null ? st.pa : 40; // short windows: assume a modest sample
        if (st.woba != null || st.xwoba != null) {
          // small sample → lean harder on xwOBA, which stabilizes faster than results
          const w = st.woba != null && st.xwoba != null ? 0.65 * st.xwoba + 0.35 * st.woba : (st.xwoba ?? st.woba);
          wSum += w * pa; paSum += pa; hit++;
        }
        if (st.bb != null && st.k != null) { bbkSum += (st.bb - st.k) * pa; bbkPA += pa; }
      }
      if (!hit && !bbkPA) return t;
      matched += hit;
      return {
        ...t,
        recent: paSum ? (wSum / paSum).toFixed(3) : t.recent,
        recentPA: paSum ? String(Math.round(paSum)) : t.recentPA,
        recentBbk: bbkPA ? (bbkSum / bbkPA).toFixed(1) : t.recentBbk,
        recentAsOf: etDayKey(),
      };
    });
    const teamsTouched = nextR.filter((t, i2) => t !== teams[i2]).map((t) => ({ name: t.name, n: 0 })).sort();
    return { next: nextR, hitters: matched, pitchers: 0, mode: "recent", teamsTouched, seeded, unroutable };
  }

  let hitters = 0, pitchers = 0;
  const next = teams.map((t) => {
    let changed = false;
    const players = (t.players || []).map((pl) => {
      const st = look(pl.name);
      if (!st) return pl;
      let out = pl;
      if (st.woba != null || st.xwoba != null) {
        const w = st.woba != null && st.xwoba != null ? 0.55 * st.xwoba + 0.45 * st.woba : (st.xwoba ?? st.woba);
        hitters++; changed = true;
        out = { ...out, woba: w.toFixed(3), pa: st.pa != null ? String(Math.round(st.pa)) : pl.pa };
      }
      // BB%-K% (plate discipline) — the fast-stabilizing recent-form signal
      if (st.bb != null && st.k != null) {
        changed = true;
        out = { ...out, bbk: (st.bb - st.k).toFixed(1), pa: st.pa != null ? String(Math.round(st.pa)) : out.pa };
      }
      return out;
    });
    const rotation = (t.rotation || []).map((pt) => {
      const st = look(pt.name);
      if (!st) return pt;
      let out = pt;
      if (st.xwoba != null || st.era != null || st.xera != null) {
        pitchers++; changed = true;
        const eb = st.era != null && st.xera != null ? ((st.era + st.xera) / 2).toFixed(2) : st.xera != null ? st.xera.toFixed(2) : st.era != null ? st.era.toFixed(2) : pt.era;
        out = { ...out, xwoba: st.xwoba != null ? st.xwoba.toFixed(3) : pt.xwoba, bf: st.pa != null ? String(Math.round(st.pa)) : pt.bf, era: eb };
      }
      // barrel%/hard-hit% allowed — contact-quality-against, the fastest-reacting bullpen-fatigue signal
      if (st.barrel != null) { changed = true; out = { ...out, barrel: st.barrel.toFixed(1) }; }
      if (st.hardHit != null) { changed = true; out = { ...out, hardHit: st.hardHit.toFixed(1) }; }
      return out;
    });
    if (!changed) return t;
    const { off, pa } = lineupToTeamOffense(players);
    // PA-weighted team BB%-K%, same aggregation pattern as offense wOBA
    let bbkW = 0, bbkPA = 0;
    for (const p of players) { const b = parseFloat(p.bbk), n2 = parseFloat(p.pa); if (!isNaN(b) && !isNaN(n2) && n2 > 0) { bbkW += b * n2; bbkPA += n2; } }
    let penW = 0, penB = 0, barrelW = 0, hardHitW = 0, cqB = 0;
    for (const r of rotation) {
      const b = parseFloat(r.bf), x = parseFloat(r.xwoba);
      if (!isNaN(b) && !isNaN(x) && b > 0 && b < 250) { penW += x * b; penB += b; }
      const brl = parseFloat(r.barrel), hh = parseFloat(r.hardHit);
      if (!isNaN(b) && b > 0 && b < 250 && (!isNaN(brl) || !isNaN(hh))) {
        if (!isNaN(brl)) barrelW += brl * b;
        if (!isNaN(hh)) hardHitW += hh * b;
        cqB += b;
      }
    }
    return {
      ...t, players, rotation, off: off ?? t.off, pa: off != null ? String(pa) : t.pa,
      recentBbk: bbkPA ? (bbkW / bbkPA).toFixed(1) : t.recentBbk,
      pen: penB ? (penW / penB).toFixed(3) : t.pen, penBf: penB ? String(Math.round(penB)) : t.penBf,
      penBarrel: cqB ? (barrelW / cqB).toFixed(1) : t.penBarrel,
      penHardHit: cqB ? (hardHitW / cqB).toFixed(1) : t.penHardHit,
      statsAsOf: etDayKey(),
    };
  });
  // Which teams did the players in this paste belong to? Each player updates
  // his OWN team — paste Lindor, Soto, and Bichette together and the Mets get
  // two, the Blue Jays one. No single-team guessing.
  const teamsTouched = [];
  next.forEach((t, i2) => {
    if (t === teams[i2]) return;
    const changed = []; // {name, kind, woba|xwoba, isNew}
    const oldP = teams[i2].players || [], oldR = teams[i2].rotation || [];
    (t.players || []).forEach((pl, j) => {
      if (pl !== oldP[j]) changed.push({ name: pl.name, kind: "hitter", val: pl.woba || "", isNew: !oldP[j] });
    });
    (t.rotation || []).forEach((pt, j) => {
      if (pt !== oldR[j]) changed.push({ name: pt.name, kind: "pitcher", val: pt.xwoba || "", era: pt.era || "", isNew: !oldR[j] });
    });
    teamsTouched.push({ name: t.name, n: changed.length, changed });
  });
  teamsTouched.sort((a, b) => b.n - a.n);
  return { next, hitters, pitchers, teamsTouched, seeded, unroutable };
}

function savantCsvToRows(csv) {
  const rows = parseCsvText(csv);
  if (rows.length < 2) return { rows: null, headers: rows[0] || [] };
  let head = rows[0].map((h) => String(h).trim().toLowerCase());
  // Savant's default name header is "last_name, first_name" — a single logical
  // column whose LABEL contains a comma. A naive CSV split turns the header into
  // two cells ("last_name" + "first_name") while each data row keeps the name as
  // one quoted "Last, First" field. That misaligns every column after the name
  // by one (team ends up reading PA, etc.). Detect and repair by collapsing the
  // two header cells back into one so header and data column counts agree.
  if (head[0] === "last_name" && (head[1] === "first_name" || head[1] === "")) {
    const dataCols = rows[1] ? rows[1].length : head.length;
    if (head.length === dataCols + 1) {
      head = ["last_name, first_name", ...head.slice(2)];
      rows[0] = rows[0].slice(); // header now aligns 1:1 with data rows
    }
  }
  const find = (cands) => { for (const c of cands) { const i = head.indexOf(c); if (i !== -1) return i; } return -1; };
  const iName = (() => { const i = find(["last_name, first_name", "last_name,first_name", "player_name", "player", "name", "\u540d"]); return i !== -1 ? i : 0; })();
  const iPa = find(["pa", "pa_count", "plate_appearances"]);
  const iW = find(["woba", "woba_value"]);
  const iX = find(["est_woba", "xwoba", "estimated_woba", "est woba"]);
  const iE = find(["era"]);
  const iXE = find(["xera", "est_era", "x-era"]);
  const iBB = find(["bb_percent", "bb%", "walk_percent", "bb_pct"]);
  const iK = find(["k_percent", "k%", "strikeout_percent", "k_pct"]);
  const iBarrel = find(["barrel_batted_rate", "brl_percent", "barrel%", "barrel_pct"]);
  const iHardHit = find(["hard_hit_percent", "hardhit_percent", "hard_hit%", "hard_hit_pct"]);
  const iTeam = find(["team", "team_name", "player_team", "team_abbrev", "parent_org", "team_id"]);
  if (iX === -1 && iW === -1 && iE === -1 && iBB === -1 && iK === -1 && iBarrel === -1 && iHardHit === -1) return { rows: null, headers: rows[0] };
  const out = rows.slice(1).filter((r) => r[iName] && String(r[iName]).trim()).map((r) => {
    const cell = String(r[iName]).trim();
    const parts = cell.includes(",") ? cell.split(",").map((x) => x.trim()) : null;
    const num = (i) => (i !== -1 && r[i] !== "" && r[i] != null ? parseFloat(r[i]) : null);
    return {
      name: parts && parts.length === 2 ? `${parts[1]} ${parts[0]}` : cell,
      team: iTeam !== -1 && r[iTeam] != null ? String(r[iTeam]).trim() : null,
      pa: num(iPa), woba: num(iW), xwoba: num(iX), era: num(iE), xera: num(iXE),
      bb: num(iBB), k: num(iK), barrel: num(iBarrel), hardHit: num(iHardHit),
    };
  }).filter((r) => r.woba != null || r.xwoba != null || r.era != null || r.xera != null || (r.bb != null && r.k != null) || r.barrel != null || r.hardHit != null);
  return { rows: out.length ? out : null, headers: rows[0] };
}

function SmartImport({ teams, saveTeams, onGameLine, statsFocus }) {
  const [open, setOpen] = useState(!!statsFocus); // in the Database tab, open by default — this is a stats tool
  const [timeframe, setTimeframe] = useState("season"); // season | recent
  const [lastImport, setLastImport] = useState(null); // { teams:[{name, added, updated, players:[...]}] } — what the last import changed
  const [rosterMap, setRosterMap] = useState(null); // MLB name -> team, for CSVs with no team column
  const [rosterSync, setRosterSync] = useState(""); // status line for the sync control

  useEffect(() => {
    if (!statsFocus) return;
    (async () => {
      const cached = await store.get("ingenuity:mlb:rosterMap", null);
      if (cached) {
        setRosterMap(cached.map);
        const age = Math.floor((Date.now() - new Date(cached.asOf + "T12:00:00Z").getTime()) / 86400000);
        if (age > ROSTER_MAP_MAX_AGE_DAYS) syncRosters(true); // stale — refresh quietly
        else setRosterSync(`MLB rosters synced ${age === 0 ? "today" : age + "d ago"} — ${Object.keys(cached.map).length} players.`);
      } else {
        syncRosters(true); // never synced — do it now, quietly
      }
    })();
  }, [statsFocus]);

  const syncRosters = async (quiet) => {
    if (!quiet) setRosterSync("Syncing MLB rosters…");
    const res = await refreshMlbRosterMap();
    if (res.ok) {
      const cached = await store.get("ingenuity:mlb:rosterMap", null);
      setRosterMap(cached?.map || null);
      setRosterSync(`MLB rosters synced just now — ${res.n} players. This lets stats CSVs with no team column still route correctly.`);
    } else {
      setRosterSync(quiet ? "" : "Couldn't reach MLB's roster list from here — team-column CSVs still work; sync again later.");
    }
  };
  const [text, setText] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [staged, setStaged] = useState(null); // { file, name, isImage, url }
  const [inputKey, setInputKey] = useState(0); // remount the file input to truly clear it

  const applyRows = async (rows, label) => {
    const hadTeamCol = rows.some((r) => r.team);
    const { next, hitters, pitchers, teamsTouched, seeded, unroutable } = applyStatRows(rows, teams, timeframe, rosterMap);
    await saveTeams(next);
    setLastImport({ ts: new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }), mode: timeframe, teams: teamsTouched || [], seeded: seeded || 0 });
    const touched = teamsTouched || [];
    const teamList = touched.slice(0, 6).map((t) => t.n ? `${t.name} (${t.n})` : t.name).join(", ")
      + (touched.length > 6 ? ` +${touched.length - 6} more` : "");
    const seededNote = seeded ? ` Auto-rostered ${seeded} new player${seeded === 1 ? "" : "s"} (${hadTeamCol ? "from the file's team column" : "matched against MLB's current rosters"}).` : "";

    // If nothing landed, say WHY — the three real causes are distinguishable.
    const diagnose = () => {
      if (!hadTeamCol) return rosterMap && Object.keys(rosterMap).length
        ? `${label}: parsed ${rows.length} players, but none matched MLB's current rosters by name — check for nicknames, suffixes, or typos, or tap "Sync MLB rosters" if it's been a while.`
        : `${label}: parsed ${rows.length} players. Baseball Savant's exports don't include a team column (there's no button for that — the "Team" control on Savant is a filter, not an export column), so the app resolves each player's team from MLB's own roster list instead. That list hasn't synced yet — tap "Sync MLB rosters" above and re-run this import.`;
      if (unroutable) return `${label}: parsed ${rows.length} players, but their team labels didn't match any of the 30 MLB clubs (${unroutable} unresolved). If the file uses an unusual team code, tell me the format and I'll map it.`;
      return `${label}: parsed ${rows.length} players but none matched — check name spellings against the Database tab.`;
    };

    if (timeframe === "recent") {
      setMsg(hitters || touched.length
        ? `${label}: read as LAST-14-DAY form — ${hitters} hitters recognized across ${touched.length} team${touched.length === 1 ? "" : "s"}${touched.length ? `: ${teamList}` : ""}.${seededNote} Season numbers untouched.`
        : diagnose());
    } else {
      setMsg(touched.length || seeded
        ? `${label}: ${hitters} hitters and ${pitchers} pitchers recognized across ${touched.length} team${touched.length === 1 ? "" : "s"}${touched.length ? `: ${teamList}` : ""}.${seededNote} Team wOBA, bullpens, and freshness stamps updated.`
        : diagnose());
    }
  };

  const stageFile = async (file) => {
    if (!file) return;
    setMsg("");
    const isImage = (file.type || "").startsWith("image/") || /\.(png|jpe?g|webp|gif|heic)$/i.test(file.name);
    let url = null;
    if (isImage) { try { url = await readFileDataUrl(file); } catch {} }
    setStaged({ file, name: file.name, isImage, url });
  };
  const removeStaged = () => {
    setStaged(null); setMsg("File removed — nothing was imported.");
    setInputKey((k) => k + 1);
  };

  const importStaged = async () => {
    if (!staged) return;
    const file = staged.file;
    setBusy(true); setMsg("");
    try {
      if (staged.isImage) {
        setMsg("Reading the screenshot…");
        const { b64, mediaType } = await prepImageForAI(file);
        const parsed = await callVisionJSON([
          { type: "image", source: { type: "base64", media_type: mediaType, data: b64 } },
          { type: "text", text: `This screenshot is from baseball betting/stats research. Classify and extract it. Respond ONLY with JSON, no fences, exactly one of these shapes:
1. Player stats table: {"kind":"stats","rows":[{"name":"First Last","woba":0.000,"xwoba":0.000,"pa":0,"era":0.00,"xera":0.00}]} (omit fields not shown; if more than 25 players are visible, return only the first 25)
2. A lineup card: {"kind":"lineup","team":"team name","players":["First Last", ...batting order...]}
3. A slate of games with totals/odds: {"kind":"odds","lines":["Away Team @ Home Team | 8.5 | -110 | -105", ...]}
If none of these: {"kind":"unknown"}` },
        ]);
        if (parsed.kind === "stats" && parsed.rows?.length) { await applyRows(parsed.rows, `Screenshot read (${parsed.rows.length} players)`); logInterp("image-stats", true, parsed.rows.length + " players"); }
        else if (parsed.kind === "lineup" && parsed.team) {
          const t = matchTeamDb(parsed.team, teams);
          if (!t) setMsg(`Read a ${parsed.team} lineup but no matching team in the database.`);
          else {
            const known = new Map((t.players || []).map((pl) => [normName(pl.name), pl]));
            const players = parsed.players.map((nm) => known.get(normName(nm)) || { name: nm, woba: "", pa: "" });
            const rest = (t.players || []).filter((pl) => !parsed.players.some((nm) => normName(nm) === normName(pl.name)));
            const { off, pa } = lineupToTeamOffense(players);
            await saveTeams(teams.map((x) => x === t ? { ...x, players: [...players, ...rest], off: off ?? x.off, pa: off != null ? String(pa) : x.pa } : x));
            setMsg(`${parsed.team} lineup loaded — tonight's ${players.length} hitters at the top, team offense recomputed.`);
            logInterp("image-lineup", true, parsed.team);
          }
        } else if (parsed.kind === "odds" && parsed.lines?.length) {
          if (statsFocus) { setMsg("That's an odds/slate screenshot, not roster stats. Odds go to Today's Slate from the Home screen. This box only loads player stats."); logInterp("image-odds", false, "odds in stats box"); }
          else {
            await store.set("ingenuity:slate:odds", parsed.lines.join("\n"));
            setMsg(`Read ${parsed.lines.length} games with odds — sent to Today's Slate on the Home screen. It will merge automatically.`);
            logInterp("image-odds", true, parsed.lines.length + " games");
          }
        } else { setMsg("Couldn't classify that screenshot as stats, a lineup, or odds. A tighter crop usually fixes it."); logInterp("image", false, "unclassifiable screenshot"); }
      } else {
        const content = await file.text();
        const { rows, headers } = savantCsvToRows(content);
        if (rows) await applyRows(rows, `${file.name} (${rows.length} rows)`);
        else setMsg(`${file.name}: no stat columns recognized. Headers found: ${headers.slice(0, 6).join(", ") || "none"}. Expected woba / est_woba / era / xera.`);
      }
      removeStaged();
    } catch (e) { setMsg(`Import failed: ${e.message}. CSV paste always works as a fallback.`); logInterp("image", false, e.message); }
    setBusy(false);
  };

  // Does this paste look like player statistics rather than a game/odds line?
  // Stat exports lead with a header row naming stat columns. Checking this FIRST
  // fixes the old routing bug where a stats paste got fed to the odds parser and
  // came back "not a game line".
  const looksLikeStats = (t) => {
    const head = (t.split("\n")[0] || "").toLowerCase();
    return ["woba", "est_woba", "xwoba", "era", "xera", "bb_percent", "k_percent", "barrel", "hard_hit", "last_name"].some((h) => head.includes(h));
  };

  const handleText = async () => {
    setBusy(true); setMsg("");
    try {
      // In the Database tab this panel is STATS ONLY. A game line pasted here is a
      // mistake (it belongs in the Terminal's projection), so we never route text
      // to the game-line parser — we treat everything as stats and, if it isn't,
      // say so plainly instead of silently loading a matchup.
      if (statsFocus) {
        const { rows, headers } = savantCsvToRows(text);
        if (rows) { await applyRows(rows, `Stats parsed (${rows.length} players)`); setText(""); logInterp("csv-paste", true, rows.length + " rows"); }
        else if (/\b(@|at|vs)\b/i.test(text) && /\d/.test(text)) { setMsg("That looks like a game line, not player stats. Game lines go in the Project tab (they build a projection). This box is only for roster stats — paste a Savant CSV or a stats table with a header row."); logInterp("csv-paste", false, "game line in stats box"); }
        else { setMsg(`No stat columns found. Paste a Savant export (or table) that includes a header row with wOBA / est_woba, ERA / xERA, BB%, K%, and ideally a Team column. Headers seen: ${headers.slice(0, 6).join(", ") || "none"}.`); logInterp("csv-paste", false, "stat header, no columns"); }
        setBusy(false);
        return;
      }
      // Player stats first — a stats paste must never be read as odds.
      if (looksLikeStats(text)) {
        const { rows, headers } = savantCsvToRows(text);
        if (rows) { await applyRows(rows, `Stats parsed (${rows.length} players)`); setText(""); logInterp("csv-paste", true, rows.length + " rows"); }
        else { setMsg(`That looks like a stats table but no usable columns were found. Include the header row (woba / est_woba, era / xera, bb_percent, k_percent). Headers found: ${headers.slice(0, 6).join(", ") || "none"}.`); logInterp("csv-paste", false, "stat header, no columns"); }
        setBusy(false);
        return;
      }
      // A game line (has "@" or "at" plus a total) auto-fills the projection.
      const short = parseShorthand(text, teams);
      const slateParsed = short ? [short] : parseSlateText(text).games.filter((g) => g.away && g.home);
      const asGame = slateParsed[0];
      if (asGame && onGameLine) {
        const res = onGameLine(asGame);
        if (res.ok) {
          const sp = [res.aStarter, res.hStarter].filter(Boolean);
          setMsg(`Loaded ${res.away} @ ${res.home} into the projection below${sp.length ? ` — starters ${res.aStarter || "?"} vs ${res.hStarter || "?"} with their stats` : ""}. Line and prices filled. Scroll down and hit Run projection.`);
          setText("");
          logInterp("game-line", true, `${res.away} @ ${res.home}`);
        } else {
          setMsg(`Read the game, but "${res.miss}" isn't in the database yet. Add the team (or check spelling), then paste again.`);
          logInterp("game-line", false, `no DB team: ${res.miss}`);
        }
        setBusy(false);
        return;
      }
      // Otherwise treat it as a stats CSV.
      const { rows, headers } = savantCsvToRows(text);
      if (rows) { await applyRows(rows, `CSV parsed (${rows.length} rows)`); setText(""); logInterp("csv-paste", true, rows.length + " rows"); }
      else { logInterp("csv-paste", false, "no stat columns"); setMsg(`Not a game line or a recognized CSV. For a game, use: Phillies (Zack Wheeler) @ Tigers (Tarik Skubal) | 7.5 | +102 | -122. For stats, include the header row (woba / est_woba, era / xera). Headers found: ${headers.slice(0, 6).join(", ") || "none"}.`); }
    } catch (e) { setMsg("Parse failed — check the format and try again."); logInterp("csv-paste", false, e.message); }
    setBusy(false);
  };

  return (
    <div className="ing-import">
      <button className="ing-import-toggle" onClick={() => setOpen(!open)}>
        {open ? "\u25be" : "\u25b8"} {statsFocus ? "Import roster stats — CSVs & screenshots" : "Smart import — game lines, CSVs, screenshots"}
      </button>
      {open && (
        <div className="ing-import-body">
          <p className="ing-hint">{statsFocus
            ? <>This loads <strong>player stats into the team database</strong>. Drop a Baseball Savant CSV (ideally with a <strong>Team</strong> column so it sorts every player to the right club) or paste a stats table with a header row. Pick the timeframe first. Files stage — nothing imports until you confirm. Game lines belong in the Project tab, not here.</>
            : <>Paste a <strong>game line</strong> to auto-fill this projection — teams, both starters with their stats, line, and prices, all at once. Or drop a Savant CSV to refresh the database, a lineup screenshot to load tonight's order, or an odds-board screenshot to feed Today's Slate. Files stage first — nothing imports until you confirm.</>}</p>

          <div className="ing-tf">
            <span className="ing-tf-label">{statsFocus ? "What are you loading?" : "Stats timeframe"}</span>
            <div className="ing-tf-btns">
              <button className={timeframe === "season" ? "on" : ""} onClick={() => setTimeframe("season")}>{statsFocus ? "Full roster (season)" : "Season"}</button>
              <button className={timeframe === "recent" ? "on" : ""} onClick={() => setTimeframe("recent")}>{statsFocus ? "Recent form / lineup" : "Last 14 days"}</button>
            </div>
          </div>
          <p className="ing-tf-note">
            {timeframe === "season"
              ? (statsFocus
                ? "Full-roster mode: the season baseline for every player — team wOBA/xwOBA, whole rotation, whole bullpen. This is the foundation the model regresses toward, and what you'd load from a full-league Savant export. Do this once, refresh weekly."
                : "Season mode: sets each player's true-talent line — team wOBA/xwOBA, rotation, bullpen. This is the baseline the model regresses toward.")
              : (statsFocus
                ? "Recent / lineup mode: last-14-day form (recent wOBA + BB%−K%), layered on top without touching the season baseline. This is what you load when today's lineups are announced or you want hot/cold form. BB%−K% is weighted heavier here — it stabilizes near 60 PA, while raw 14-day wOBA is mostly noise."
                : "14-day mode: fills recent form only (recent wOBA + BB%−K%) and leaves season numbers alone. The engine weights BB%−K% heavier here — it stabilizes at ~60 PA, while raw wOBA over 14 days is still mostly noise.")}
          </p>

          {statsFocus && (
            <div className="ing-rostersync">
              <button className="ing-ghost small" onClick={() => syncRosters(false)} disabled={busy}>⟳ Sync MLB rosters</button>
              <span>{rosterSync || "Resolves player → team automatically, even when a CSV has no team column."}</span>
            </div>
          )}
          <input key={inputKey} type="file" accept=".csv,.txt,.tsv,image/*" onChange={(e) => stageFile(e.target.files[0])} disabled={busy} />
          {staged && (
            <div className="ing-staged">
              {staged.url && <img src={staged.url} alt="staged" className="ing-staged-thumb" />}
              <span className="ing-staged-name">{staged.name}</span>
              <button className="ing-run small" onClick={importStaged} disabled={busy}>{busy ? "Working…" : "Import this"}</button>
              <button className="ing-ghost" onClick={removeStaged} disabled={busy}>✕ Remove</button>
            </div>
          )}
          <textarea rows={4} value={text} onChange={(e) => setText(e.target.value)} placeholder={statsFocus
            ? "Paste a stats table or CSV with a header row, e.g.:\nlast_name, first_name,team,pa,woba,est_woba,bb_percent,k_percent\n\"Harper, Bryce\",PHI,300,.390,.380,14,20\n\nA Team column lets one file fill every club at once."
            : "Shorthand works: skenes wheeler 8.5 -104 -122\n(away SP, home SP, total, over, under — teams auto-detected)\n\nOr a full line: Phillies (Zack Wheeler) @ Tigers (Tarik Skubal) | 7.5 | +102 | -122\nOr a stats CSV with header row"} />
          <div className="ing-db-actions">
            <button className="ing-run small" onClick={handleText} disabled={busy || !text.trim()}>{busy ? "Working…" : "Load / apply paste"}</button>
            {msg && <span className="ing-importmsg">{msg}</span>}
          </div>

          {lastImport && lastImport.teams.length > 0 && (
            <div className="ing-receipt">
              <div className="ing-receipt-head">
                <span>Imported {lastImport.ts} · {lastImport.mode === "recent" ? "14-day form" : "season stats"}</span>
                <button onClick={() => setLastImport(null)} aria-label="Dismiss">✕</button>
              </div>
              {lastImport.seeded > 0 && <p className="ing-receipt-seed">Auto-rostered {lastImport.seeded} new player{lastImport.seeded === 1 ? "" : "s"} from the file's team column.</p>}
              {lastImport.teams.map((tm, i) => (
                <details key={i} className="ing-receipt-team" open={lastImport.teams.length <= 2}>
                  <summary>{tm.name} <em>{tm.n} update{tm.n === 1 ? "" : "s"}</em></summary>
                  {tm.changed && tm.changed.length > 0 && (
                    <div className="ing-receipt-players">
                      {tm.changed.map((p, j) => (
                        <span key={j} className={p.kind === "pitcher" ? "pit" : ""}>
                          {p.kind === "pitcher" ? "⚾ " : ""}{p.name}
                          <em>{p.val || "—"}</em>
                          {p.isNew ? <i className="new">new</i> : null}
                        </span>
                      ))}
                    </div>
                  )}
                </details>
              ))}
              <p className="ing-receipt-note">Tap a team in the list below to see its full stored roster anytime. If a name you pasted isn't here, its spelling didn't match — fix it and re-paste.</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ===========================================================================
// TODAY'S SLATE — the 6th agent's home. One persistent slate per day:
// matchups + probable pitchers fetched automatically, market odds added by
// screenshot / paste / file / inline edit, everything stored and auto-applied
// to the Terminal when those teams are loaded. Scan runs the engine on the
// whole board against the de-vig market.
// ===========================================================================
// ---------------------------------------------------------------------------
// Claude API caller — one door for both builds.
// Inside the artifact, Anthropic brokers the call and no key is needed.
// On a hosted page there's no broker, so the request carries the user's own
// key plus the header Anthropic requires for direct browser calls. That header
// is named "dangerous" for a reason: a key in client code is exposed to anyone
// who can read the page. That's acceptable here and ONLY here, because this is
// a single-user personal tool and the key never leaves this device.
// ---------------------------------------------------------------------------
const AI_KEY_STORE = "ingenuity:anthropic:key";

async function callClaudeAPI(body) {
  const headers = { "Content-Type": "application/json" };
  if (typeof STANDALONE !== "undefined" && STANDALONE) {
    const key = await store.get(AI_KEY_STORE, "");
    if (!key) {
      const e = new Error("NO_KEY");
      e.code = "NO_KEY";
      throw e;
    }
    headers["x-api-key"] = key;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  let resp;
  try {
    resp = await fetch("https://api.anthropic.com/v1/messages", { method: "POST", headers, body: JSON.stringify(body) });
  } catch (e) {
    const err = new Error("Couldn't reach the Claude API — check your connection.");
    err.code = "NETWORK";
    throw err;
  }
  if (!resp.ok) {
    let detail = "";
    try { detail = (await resp.text()).slice(0, 160); } catch {}
    const err = new Error(
      resp.status === 401 ? "Claude API rejected the key (401). Check it's a valid key, pasted whole."
      : resp.status === 429 ? "Claude API rate limit or no credit on the key (429)."
      : `Claude API error ${resp.status}. ${detail}`
    );
    err.code = "HTTP_" + resp.status;
    throw err;
  }
  return resp.json();
}

// ===========================================================================
// BOARD CHART — the whole slate in one glance.
// Fifteen game cards make you read the board one row at a time. This puts every
// game on a shared runs axis: the book's number, the model's number, and the
// gap between them. The outliers ARE the candidates — they stick out visually
// instead of having to be hunted for. Works on a live scan or a frozen
// archived board (which carries its own proj), so past days chart too.
// ===========================================================================
function shortTeam(n) {
  const w = String(n || "").trim().split(/\s+/);
  return w[w.length - 1] || "?";
}

function BoardChart({ games, rows, onPick, onOpen }) {
  const [sort, setSort] = useState("gap"); // gap | board
  const [sel, setSel] = useState(null);

  const data = games.map((g, i) => {
    const r = rows?.find((x) => x.away === g.away && x.home === g.home && x.status === "ok");
    const model = r ? r.model : (g.proj ? g.proj.model : null);
    const edge = r ? r.edge : (g.proj ? g.proj.edge : null);
    const line = parseFloat(g.line);
    return { i, g, model, edge, line: isNaN(line) ? null : line };
  }).filter((d) => d.model != null && d.line != null);

  if (!data.length) {
    return (
      <div className="bc-empty">
        Run the scan to chart the board — every game's model number against its line, on one axis.
      </div>
    );
  }

  const ordered = [...data].sort((a, b) =>
    sort === "gap" ? Math.abs(b.model - b.line) - Math.abs(a.model - a.line) : a.i - b.i
  );

  const W = 340, LABEL = 82, RIGHT = 14;
  const cx = LABEL, cw = W - LABEL - RIGHT;
  const rowH = 30, headH = 20;
  const H = headH + ordered.length * rowH + 6;

  const vals = data.flatMap((d) => [d.model, d.line]);
  let lo = Math.floor(Math.min(...vals)) - 0.5;
  let hi = Math.ceil(Math.max(...vals)) + 0.5;
  if (hi - lo < 2) { hi += 1; lo -= 1; }
  const X = (v) => cx + ((v - lo) / (hi - lo)) * cw;

  const ticks = [];
  for (let t = Math.ceil(lo); t <= Math.floor(hi); t++) ticks.push(t);

  const selected = sel != null ? data.find((d) => d.i === sel) : null;

  return (
    <div className="bc">
      <div className="bc-head">
        <span className="bc-title">The board · {data.length} projected</span>
        <div className="bc-sort">
          <button className={sort === "gap" ? "on" : ""} onClick={() => setSort("gap")}>By gap</button>
          <button className={sort === "board" ? "on" : ""} onClick={() => setSort("board")}>Board order</button>
        </div>
      </div>

      <svg className="bc-svg" viewBox={`0 0 ${W} ${H}`} role="img" aria-label="Model vs book line for every game on the board">
        {ticks.map((t) => (
          <g key={t}>
            <line x1={X(t)} y1={headH - 6} x2={X(t)} y2={H - 4} stroke="#1c3329" strokeWidth="1" />
            <text x={X(t)} y={headH - 10} fill="#7a998c" fontSize="8" textAnchor="middle" fontFamily="Archivo, sans-serif">{t}</text>
          </g>
        ))}

        {ordered.map((d, k) => {
          const y = headH + k * rowH + rowH / 2;
          const gap = d.model - d.line;
          const over = gap > 0;
          const hot = Math.abs(d.edge) >= 4;
          const col = over ? "#f5c451" : "#5fd9e8";
          const isSel = sel === d.i;
          return (
            <g key={d.i} className="bc-row" onClick={() => { const nx = isSel ? null : d.i; setSel(nx); if (onPick) onPick(nx == null ? null : d.g); }} style={{ cursor: "pointer" }}>
              <rect x="0" y={headH + k * rowH} width={W} height={rowH} fill={isSel ? "rgba(52,230,168,0.07)" : "transparent"} />
              <text x="4" y={y + 3} fill={isSel ? "#d8e8e0" : "#7a998c"} fontSize="9.5" fontFamily="Archivo, sans-serif">
                {shortTeam(d.g.away)}@{shortTeam(d.g.home)}
              </text>
              <line x1={X(d.line)} y1={y} x2={X(d.model)} y2={y} stroke={col} strokeWidth={hot ? 3 : 1.5} opacity={hot ? 0.9 : 0.45} strokeLinecap="round" />
              <line x1={X(d.line)} y1={y - 5} x2={X(d.line)} y2={y + 5} stroke="#7a998c" strokeWidth="1.5" />
              <circle cx={X(d.model)} cy={y} r={hot ? 4.5 : 3} fill={col} opacity={hot ? 1 : 0.6} />
              {hot && <circle cx={X(d.model)} cy={y} r="7.5" fill="none" stroke={col} strokeWidth="1" opacity="0.35" />}
            </g>
          );
        })}
      </svg>

      <div className="bc-legend">
        <span><i className="bc-k-line" /> book line</span>
        <span><i className="bc-k-over" /> model over</span>
        <span><i className="bc-k-under" /> model under</span>
        <span className="bc-k-note">ring = 4+ pt candidate · tap a row</span>
      </div>

      {selected && (
        <div className="bc-detail">
          <strong>{selected.g.away} @ {selected.g.home}</strong>
          <span>{selected.g.awayP || "TBD"} vs {selected.g.homeP || "TBD"}</span>
          <span>
            book <b>{selected.g.line}</b> ({selected.g.over || "-110"}/{selected.g.under || "-110"}) · model <b>{selected.model.toFixed(2)}</b> ·{" "}
            {selected.model > selected.line ? "over" : "under"} by {Math.abs(selected.model - selected.line).toFixed(2)} runs
            {selected.edge != null ? ` · ${Math.abs(selected.edge).toFixed(1)} pts vs no-vig` : ""}
          </span>
          <span className="bc-detail-note">
            {Math.abs(selected.edge ?? 0) >= 4
              ? "Flagged by the scanner — the full 20k-sim deep dive is the only thing that can confirm it."
              : "No meaningful gap. The board and the model agree here."}
          </span>
          {onOpen && (
            <button className="bc-open" onClick={() => onOpen(selected.g)}>Open full breakdown →</button>
          )}
        </div>
      )}
    </div>
  );
}

const SLATE_ARCHIVE_DAYS = 90; // keep a season's worth of full boards; a day is ~3KB

// Full boards (odds + weather + pitchers) roll off at 90 days, but a graded
// game is training data — it must never expire. Each finished game distills to
// one compact permanent row (~120 bytes): date, teams, park, line, model,
// final, and O/U result. Keyed by date+matchup so re-grading can't duplicate.
// This is the store R&D reads from, and what powers over/under streaks.
async function recordFinals(arch) {
  const rec = await store.get("ingenuity:results:log", {});
  let added = 0;
  for (const d of Object.keys(arch)) {
    for (const g of (arch[d].games || [])) {
      if (g.final == null) continue;
      const key = d + "|" + normName(g.away) + "@" + normName(g.home);
      if (rec[key]) continue;
      const line = g.proj ? g.proj.atLine : (g.line !== "" && g.line != null ? parseFloat(g.line) : null);
      const ou = line == null ? null : g.final > line ? "O" : g.final < line ? "U" : "P";
      rec[key] = { date: d, away: g.away, home: g.home, line, final: g.final, model: g.proj ? g.proj.model : null, ou };
      added++;
    }
  }
  if (added) await store.set("ingenuity:results:log", rec);
  return added;
}

// Per-team over/under streak from the permanent log. Returns the most recent
// run of the SAME result and the last few games, newest first. This is a
// research signal to SURFACE — not a model input. The "hot unders will keep
// going under" read and the contrarian "series due to flip" read are opposite
// interpretations of the same streak; the app shows the fact and lets the user
// decide, rather than baking a bias into the projection.
function teamOUStreak(log, teamName) {
  const n = normName(teamName);
  const games = Object.values(log)
    .filter((r) => r.ou && (normName(r.away).includes(n) || normName(r.home).includes(n) || n.includes(normName(r.away)) || n.includes(normName(r.home))))
    .sort((a, b) => (a.date < b.date ? 1 : -1)); // newest first
  if (!games.length) return { n: 0 };
  let streak = 1;
  const top = games[0].ou;
  for (let i = 1; i < games.length; i++) { if (games[i].ou === top) streak++; else break; }
  const last = games.slice(0, 6).map((g) => ({ date: g.date, ou: g.ou, final: g.final, line: g.line, vs: normName(g.away).includes(n) ? g.home : g.away }));
  return { n: games.length, streak, side: top, last };
}


function SlateHub() {
  const todayKey = etDayKey();
  const [slate, setSlate] = useState(null); // { date, games: [{away, home, awayP, homeP, line, over, under, openLine.., proj?}] }

  const [pasteText, setPasteText] = useState("");
