// HISTORY — equity chart with period filters + analytics + full bet browser
// ===========================================================================
function periodList(mode, all) {
  const lastDay = all[all.length - 1].day;
  const firstDay = all[0].day;
  if (mode === "all") return [{ label: "All time", start: firstDay, end: lastDay + 1 }];
  if (mode === "year") {
    const years = [...new Set(all.map((b) => dayToDate(b.day).getUTCFullYear()))];
    return years.map((y) => ({ label: String(y), start: Math.floor((Date.UTC(y, 0, 1) - HISTORY_EPOCH_UTC) / 86400000), end: Math.floor((Date.UTC(y + 1, 0, 1) - HISTORY_EPOCH_UTC) / 86400000) }));
  }
  if (mode === "month") {
    const seen = new Map();
    for (const b of all) { const d = dayToDate(b.day); seen.set(`${d.getUTCFullYear()}-${d.getUTCMonth()}`, d); }
    const months = [...seen.values()].sort((a, b) => a - b).slice(-13);
    return months.map((d) => {
      const y = d.getUTCFullYear(), m = d.getUTCMonth();
      return { label: d.toLocaleString("en", { month: "short", timeZone: "UTC" }) + " " + y,
        start: Math.floor((Date.UTC(y, m, 1) - HISTORY_EPOCH_UTC) / 86400000),
        end: Math.floor((Date.UTC(y, m + 1, 1) - HISTORY_EPOCH_UTC) / 86400000) };
    });
  }
  // week: last 10 Monday-start weeks with data
  const weeks = [];
  let wStart = lastDay - ((dayToDate(lastDay).getUTCDay() + 6) % 7);
  for (let i = 0; i < 10; i++) {
    const st = wStart - i * 7;
    if (st + 7 < firstDay) break;
    const d = dayToDate(st);
    weeks.unshift({ label: d.toLocaleString("en", { month: "short", timeZone: "UTC" }) + " " + d.getUTCDate(), start: st, end: st + 7 });
  }
  return weeks;
}

function EquityChart({ bets }) {
  if (!bets.length) return <p className="ing-hint">No bets in this window.</p>;
  const W2 = 620, H2 = 220, pad = 6;
  let cum = 0;
  const pts = [{ x: 0, y: 0 }];
  bets.forEach((b, i) => { cum += (b.res === "O" ? 0 : b.profit); pts.push({ x: i + 1, y: cum }); });
  const ys = pts.map((p) => p.y);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const span = Math.max(1, maxY - minY);
  const X = (x) => pad + (x / (pts.length - 1)) * (W2 - 2 * pad);
  const Y = (y) => pad + 14 + (1 - (y - minY) / span) * (H2 - 2 * pad - 28);
  const path = pts.map((p, i) => `${i ? "L" : "M"}${X(p.x).toFixed(1)},${Y(p.y).toFixed(1)}`).join(" ");
  const up = cum >= 0;
  const maxI = ys.indexOf(maxY), minI = ys.indexOf(minY);
  return (
    <svg viewBox={`0 0 ${W2} ${H2}`} className="eq-chart" preserveAspectRatio="none" role="img" aria-label="Cumulative profit chart">
      <path d={path} fill="none" stroke={up ? "var(--phos)" : "#8fa3b8"} strokeWidth="2.5" strokeLinejoin="round" />
      <text x={Math.min(W2 - 70, Math.max(4, X(maxI)))} y={Math.max(12, Y(maxY) - 6)} className="eq-label">{maxY >= 0 ? "+" : "-"}${Math.abs(maxY).toFixed(2)}</text>
      <text x={Math.min(W2 - 70, Math.max(4, X(minI)))} y={Math.min(H2 - 3, Y(minY) + 14)} className="eq-label dim">{minY >= 0 ? "+" : "-"}${Math.abs(minY).toFixed(2)}</text>
    </svg>
  );
}

function HistoryView() {
  const all = React.useMemo(() => decodeHistory(), []);
  const [mode, setMode] = useState("year");
  const periods = React.useMemo(() => periodList(mode, all), [mode, all]);
  const [pi, setPi] = useState(periods.length - 1);
  const [page, setPage] = useState(0);
  useEffect(() => { setPi(periods.length - 1); setPage(0); }, [mode]);
  const per = periods[Math.min(pi, periods.length - 1)];
  const bets = all.filter((b) => b.day >= per.start && b.day < per.end);

  const wins = bets.filter((b) => b.res === "W").length;
  const losses = bets.filter((b) => b.res === "L").length;
  const pushes = bets.filter((b) => b.res === "P").length;
  const cashouts = bets.filter((b) => b.res === "C").length;
  const voids = bets.filter((b) => b.res === "V").length;
  const pendings = bets.filter((b) => b.res === "O").length;
  const netP = bets.reduce((s2, b) => s2 + (b.res === "O" ? 0 : b.profit), 0);
  // ROI staked excludes voids & pushes (stake returned) and pending (unresolved)
  const staked = bets.reduce((s2, b) => s2 + ((b.res === "V" || b.res === "P" || b.res === "O") ? 0 : b.stake), 0);
  const roiP = staked ? (100 * netP) / staked : 0;

  const seg = (a) => {
    const n = a.reduce((s2, b) => s2 + (b.res === "O" ? 0 : b.profit), 0), st = a.reduce((s2, b) => s2 + ((b.res === "V" || b.res === "P" || b.res === "O") ? 0 : b.stake), 0);
    return { rec: `${a.filter((b) => b.res === "W").length}–${a.filter((b) => b.res === "L").length}`, net: n, roi: st ? (100 * n) / st : 0, n: a.length };
  };
  const rowsCfg = [
    ["Straight bets", bets.filter((b) => b.type === 0)],
    ["Parlays / RR", bets.filter((b) => b.type !== 0)],
    ["Live", bets.filter((b) => b.live === 1)],
    ["Pre-game", bets.filter((b) => !b.live)],
    ["Standard odds (1.5–2.2)", bets.filter((b) => b.odds >= 1.5 && b.odds < 2.2)],
    ["Longshots (5.0+)", bets.filter((b) => b.odds >= 5)],
  ].map(([label, a]) => ({ label, ...seg(a) })).filter((r) => r.n > 0);

  const PAGE = 25;
  const listed = [...bets].reverse().slice(page * PAGE, page * PAGE + PAGE);
  const pages = Math.ceil(bets.length / PAGE);

  return (
    <main className="lg-main">
      <div className="hist-modes">
        {["week", "month", "year", "all"].map((m) => (
          <button key={m} className={mode === m ? "on" : ""} onClick={() => setMode(m)}>{m[0].toUpperCase() + m.slice(1)}</button>
        ))}
      </div>
      {periods.length > 1 && (
        <div className="hist-chips">
          {periods.map((pp, i) => (
            <button key={i} className={i === Math.min(pi, periods.length - 1) ? "on" : ""} onClick={() => { setPi(i); setPage(0); }}>{pp.label}</button>
          ))}
        </div>
      )}

      <section className="hist-stats">
        <div><em>Profit</em><strong className={netP >= 0 ? "pos" : "neg"}>{netP >= 0 ? "+" : "-"}${Math.abs(netP).toFixed(2)}</strong></div>
        <div><em>ROI</em><strong className={roiP >= 0 ? "pos" : "neg"}>{roiP >= 0 ? "+" : ""}{roiP.toFixed(2)}%</strong></div>
        <div><em>Record</em><strong>{wins}–{losses}–{pushes}{cashouts ? ` · ${cashouts}C` : ""}{voids ? ` · ${voids}V` : ""}{pendings ? ` · ${pendings} open` : ""}</strong></div>
        <div><em>Staked</em><strong>${staked.toFixed(0)}</strong></div>
      </section>

      <EquityChart bets={bets} />

      {rowsCfg.length > 0 && (
        <section className="hist-break">
          <h2 className="lg-formtitle">Where it went (this window)</h2>
          {rowsCfg.map((r, i) => (
            <div className="hist-break-row" key={i}>
              <span className="hb-label">{r.label}</span>
              <span className="hb-rec">{r.rec}</span>
              <span className={"hb-net " + (r.net >= 0 ? "pos" : "neg")}>{r.net >= 0 ? "+" : "-"}${Math.abs(r.net).toFixed(0)}</span>
              <span className={"hb-roi " + (r.roi >= 0 ? "pos" : "neg")}>{r.roi.toFixed(1)}%</span>
            </div>
          ))}
        </section>
      )}

      <section className="hist-list">
        <h2 className="lg-formtitle">Bets <span className="ing-count">{bets.length}</span></h2>
        {listed.map((b, i) => (
          <div className="hist-bet" key={i}>
            <span className="hb-date">{dayToDate(b.day).toISOString().slice(0, 10)}</span>
            <span className="hb-sport">{SPORT_NAMES[b.sport] || b.sport}{b.live ? " · LIVE" : ""}</span>
            <span className="hb-desc">{b.desc || (b.type === 1 ? "Parlay" : b.type === 2 ? "Round robin" : "Straight") + ` @ ${b.odds.toFixed(2)}`}</span>
            <span className="hb-stake">${b.stake.toFixed(2)}</span>
            <span className={"hb-res " + (b.res === "W" ? "pos" : (b.res === "P" || b.res === "V" || b.res === "O") ? "" : b.res === "C" ? (b.profit >= 0 ? "pos" : "neg") : "neg")}>{b.res === "W" ? `+$${b.profit.toFixed(2)}` : b.res === "P" ? "PUSH" : b.res === "V" ? "VOID" : b.res === "O" ? "PENDING" : b.res === "C" ? `${b.profit >= 0 ? "+" : "-"}$${Math.abs(b.profit).toFixed(2)} CO` : `-$${Math.abs(b.profit).toFixed(2)}`}</span>
          </div>
        ))}
        {pages > 1 && (
          <div className="hist-pager">
            <button className="ing-ghost tiny" disabled={page === 0} onClick={() => setPage(page - 1)}>← newer</button>
            <span>{page + 1} / {pages}</span>
            <button className="ing-ghost tiny" disabled={page >= pages - 1} onClick={() => setPage(page + 1)}>older →</button>
          </div>
        )}
      </section>
    </main>
  );
}

// ===========================================================================
// BRAIN — model oversight: health metrics, bounded parameter tuning,
// AI-assisted recalibration. Every change is human-approved and logged.
// ===========================================================================
function Brain({ onHome }) {
  const [params, setParams] = useState({});
  const [draft, setDraft] = useState({});
  const [log, setLog] = useState([]);
  const [games, setGames] = useState([]);
  const [teamsMissing, setTeamsMissing] = useState(0);
  const [staleRecent, setStaleRecent] = useState(0);
  const [seasonAge, setSeasonAge] = useState(null);
  const [slateScan, setSlateScan] = useState(null);
  const [interpLog, setInterpLog] = useState([]);
  const [aiBusy, setAiBusy] = useState(false);
  const [aiOut, setAiOut] = useState(null);
  const [aiErr, setAiErr] = useState("");
  const [aiKey, setAiKey] = useState("");
  const [keyOpen, setKeyOpen] = useState(false);
  const [keyMsg, setKeyMsg] = useState("");
  const hosted = typeof STANDALONE !== "undefined" && STANDALONE;
  const [saved, setSaved] = useState("");

  useEffect(() => {
    (async () => {
      const bp = await store.get("ingenuity:brain:params", {});
      const bl = await store.get("ingenuity:brain:log", []);
      const g = await store.get("ingenuity:ledger:games", SEED_GAMES);
      setParams(bp); setDraft({ ...bp }); setLog(bl); setGames(g);
      // Data Scout: how many teams are under half-filled on stats
      const teams = await store.get("ingenuity:teams", []);
      let thin = 0;
      for (const t of teams) {
        const hp = (t.players || []); const rp = (t.rotation || []);
        const done = hp.filter((x) => x.woba).length + rp.filter((x) => x.xwoba).length;
        const total = hp.length + rp.length;
        if (total > 0 && done / total < 0.5) thin++;
      }
      setTeamsMissing(teams.length ? thin : 0);
      // staleness: 14-day form older than a week misleads; season stats age slowly
      setStaleRecent(teams.filter((t) => (t.recent || t.recentBbk) && (daysOld(t.recentAsOf) == null || daysOld(t.recentAsOf) > 7)).length);
      const ages = teams.map((t) => daysOld(t.statsAsOf)).filter((d) => d != null);
      setSeasonAge(ages.length ? Math.min(...ages) : null);
      setSlateScan(await store.get("ingenuity:brain:slateScan", null));
      setInterpLog(await store.get("ingenuity:brain:interpLog", []));
      // persist the imported history + profile for recollection by any module
      await store.set("ingenuity:brain:bettorProfile", BETTOR_PROFILE);
      await store.set("ingenuity:brain:history", BET_HISTORY);
    })();
  }, []);

  const persist = async (next, entry) => {
    applyBrainParams(next);
    setParams(next); setDraft({ ...next });
    await store.set("ingenuity:brain:params", next);
    if (entry) {
      const nl = [{ ts: new Date().toISOString().slice(0, 16).replace("T", " "), ...entry }, ...log].slice(0, 60);
      setLog(nl);
      await store.set("ingenuity:brain:log", nl);
    }
    setSaved("Applied — every projection from now on uses these values.");
    setTimeout(() => setSaved(""), 4000);
  };

  const saveDraft = () => {
    const next = {};
    for (const [k, spec] of Object.entries(BRAIN_TUNABLES)) {
      const v = parseFloat(draft[k]);
      if (!isNaN(v) && v !== DEFAULT_CFG[k]) next[k] = Math.min(spec.max, Math.max(spec.min, v));
    }
    persist(next, { source: "manual", change: "Manual parameter save" });
  };
  const resetAll = () => persist({}, { source: "manual", change: "Reset all parameters to defaults" });

  useEffect(() => { (async () => { setAiKey(await store.get(AI_KEY_STORE, "")); })(); }, []);

  // ---- model health from the ledger ----
  const graded = games.filter((g) => g.model != null && g.final != null);
  const bias = graded.length ? graded.reduce((s, g) => s + (g.final - g.model), 0) / graded.length : null;
  const mae = graded.length ? graded.reduce((s, g) => s + Math.abs(g.final - g.model), 0) / graded.length : null;
  const leans = games.filter((g) => g.leanSide && g.leanSide !== "none" && g.final != null && g.line != null);
  const leanHits = leans.filter((g) => (g.leanSide === "over" ? g.final > g.line : g.final < g.line)).length;
  const bigMisses = graded.filter((g) => Math.abs(g.final - g.model) > 3.5).length;

  // ---- AI recalibration (Claude API — available inside this app) ----
  const askAI = async () => {
    setAiBusy(true); setAiErr(""); setAiOut(null);
    try {
      const health = {
        gradedGames: graded.length, meanBiasRuns: bias, meanAbsErrorRuns: mae,
        leanRecord: `${leanHits}/${leans.length}`, bigMisses,
        recentGames: graded.slice(0, 15).map((g) => ({ matchup: g.matchup, park: g.park, model: g.model, line: g.line, final: g.final, lean: g.lean })),
      };
      const current = {}; for (const k of Object.keys(BRAIN_TUNABLES)) current[k] = CFG[k];
      const bettor = { lifetime: BETTOR_PROFILE.total, clvBeatPct: BETTOR_PROFILE.clvBeatPct, liveROI: BETTOR_PROFILE.live.roi, parlayROI: BETTOR_PROFILE.parlays.roi, bestShape: "standard-odds straights " + BETTOR_PROFILE.standardOdds.roi + "%" };
      const prompt = `You are the calibration brain for an MLB totals Monte Carlo model. BETTOR CONTEXT (the human this model serves; their history, for context on discipline — do NOT suggest bets): ${JSON.stringify(bettor)}.
You are the calibration brain for an MLB totals Monte Carlo model (gamma-Poisson run generation, correlated team totals). Analyze the model's ledger health and current tunable parameters, then suggest changes ONLY where the evidence supports them. Be conservative: few or zero changes is a valid answer, and with under ~30 graded games most signals are noise.

HEALTH: ${JSON.stringify(health)}
BETTOR PROFILE (the human's multi-year pattern — context for what behaviors the record shows): ${JSON.stringify({ roi: BETTOR_PROFILE.total.roi, clvAvg: BETTOR_PROFILE.avgBookEvPct, clvBeatPct: BETTOR_PROFILE.clvBeatPct, liveRoi: BETTOR_PROFILE.live.roi, parlayRoi: BETTOR_PROFILE.parlays.roi, bestShapeRoi: BETTOR_PROFILE.standardOdds.roi })}
CURRENT PARAMETERS: ${JSON.stringify(current)}
TUNABLE BOUNDS: ${JSON.stringify(Object.fromEntries(Object.entries(BRAIN_TUNABLES).map(([k, v]) => [k, { min: v.min, max: v.max, meaning: v.desc }])))}

Respond ONLY with JSON, no markdown fences, exactly this shape:
{"summary": "2-3 sentence read of model health", "suggestions": [{"param": "NAME", "value": 0.0, "reason": "why, tied to the evidence"}]}`;
      const data = await callClaudeAPI({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] });
      const text = (data.content || []).map((c) => c.text || "").join("").replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(text);
      parsed.suggestions = (parsed.suggestions || []).filter((sg) => BRAIN_TUNABLES[sg.param] && !isNaN(parseFloat(sg.value)));
      setAiOut(parsed);
    } catch (e) {
      setAiErr(e.code === "NO_KEY"
        ? "AI recalibration needs a Claude API key on this device — add one below. The six numeric agents and the manual tuner run without it."
        : `Analysis failed — ${e.message} The manual tuner below always works.`);
    }
    setAiBusy(false);
  };

  const applySuggestion = (sg) => {
    const spec = BRAIN_TUNABLES[sg.param];
    const v = Math.min(spec.max, Math.max(spec.min, parseFloat(sg.value)));
    persist({ ...params, [sg.param]: v }, { source: "ai", change: `${sg.param} → ${v}`, reason: sg.reason });
    setAiOut({ ...aiOut, suggestions: aiOut.suggestions.filter((x) => x !== sg) });
  };

  // ---- agent council: five specialists, each derived from real data ----
  const P = BETTOR_PROFILE;
  const tunedCount = Object.keys(params).length;
  const agents = [
    {
      id: "calibrator", glyph: "\u25CE", name: "Calibrator", role: "Tunes engine parameters",
      ...(bias == null || graded.length < 8
        ? { tone: "idle", status: "waiting", read: `Needs ~8 graded projections to trust a bias signal (${graded.length} so far). Until then it holds the engine at ${tunedCount ? tunedCount + " tuned param" + (tunedCount === 1 ? "" : "s") : "defaults"}.` }
        : Math.abs(bias) > 0.75
          ? { tone: "alert", status: "signal", read: `Model bias is ${bias > 0 ? "+" : ""}${bias.toFixed(2)} runs over ${graded.length} games — beyond the plus-or-minus 0.75 threshold. Recommends nudging CALIBRATION_OFFSET ${bias > 0 ? "up" : "down"}. Run AI recalibration to draft the exact value.` }
          : { tone: "ok", status: "calibrated", read: `Bias ${bias > 0 ? "+" : ""}${bias.toFixed(2)} runs, inside tolerance. No change warranted — MAE ${mae ? mae.toFixed(2) : "—"} is near the 4.1 floor.` }),
    },
    {
      id: "scout", glyph: "\u25C8", name: "Data Scout", role: "Watches roster & stat freshness",
      tone: teamsMissing > 6 || staleRecent > 6 ? "alert" : teamsMissing > 0 || staleRecent > 0 || seasonAge > 21 ? "warn" : "ok",
      status: teamsMissing > 6 || staleRecent > 6 ? "stale" : teamsMissing > 0 || staleRecent > 0 ? "partial" : "fresh",
      read: staleRecent > 0
        ? `${staleRecent} team${staleRecent === 1 ? "'s" : "s'"} 14-day form is over a week old — a "recent" window that already closed. The engine trusts recent form MORE than season stats by design, so stale form misleads harder than no form. Re-import a fresh 14-day CSV or clear it.`
        : teamsMissing > 0
          ? `${teamsMissing} of 30 teams have under half their roster's stats filled. Pull fresh CSVs and paste them in the Terminal, Lineups tab; the Scout flags which teams are thin.`
          : seasonAge != null && seasonAge > 21
            ? `Season stats haven't been refreshed in ${seasonAge} days. They drift slowly, but a refresh from Savant is due.`
            : `All 30 rosters carry stats${seasonAge != null ? `, refreshed ${seasonAge === 0 ? "today" : seasonAge + "d ago"}` : ""}. Recent form is either fresh or absent — nothing stale is steering the model.`,
    },
    {
      id: "risk", glyph: "\u25B2", name: "Risk Warden", role: "Guards against your own patterns",
      tone: "warn", status: "vigilant",
      read: `Your history: ${P.live.roi}% ROI live vs ${P.pregame.roi}% pre-game, ${P.parlays.roi}% on parlays, ${P.clvBeatPct}% closing-line-beat rate. The Warden's standing order — if a Bet-of-the-Day mirror matches a live or parlay shape, treat it as a stop sign, not a suggestion.`,
    },
    {
      id: "market", glyph: "\u2248", name: "Market Reader", role: "Compares model to the book",
      tone: "idle", status: "ready",
      read: "Feed it book prices in the Terminal and it reports the no-vig line, the hold you're paying, and the model-vs-market edge in points. It stays quiet until it has a price to read — the gap it finds, not the posted price, is the only number worth acting on.",
    },
    {
      id: "historian", glyph: "\u2261", name: "Historian", role: "Keeps the long memory",
      tone: "ok", status: "archiving",
      read: `Holds ${P.total.n.toLocaleString()} settled bets (${P.span}) plus every game logged here. All of it is stored for recollection and fed to the AI as context — so recalibration always knows both how the model performs and how you actually bet.`,
    },
    {
      id: "scanner", glyph: "\u25C9", name: "Slate Scanner", role: "The wide net: stores the day's board, flags candidates",
      ...(!slateScan
        ? { tone: "idle", status: "no scan yet", read: "Lives on the Home screen. Fetches the day's matchups + probable pitchers, stores every game's odds so the data persists all day, and sweeps the board at 8k sims flagging any 4+ point model-vs-book gap. It surfaces candidates; the Terminal confirms them at full depth. Most days the honest output is 'no lean.'" }
        : slateScan.lean
          ? { tone: "warn", status: "candidate flagged", read: `Last scan ${slateScan.ts}: ${slateScan.scanned} games, flagged ${slateScan.lean.side} ${slateScan.lean.line} in ${slateScan.lean.matchup} — model ${slateScan.lean.model}, ${Math.abs(slateScan.lean.edge)} pts past the no-vig book. That's a lead to confirm in the Terminal (20k sims + park/weather), not a bet. The Warden reminds you the passes have been the edge.` }
          : { tone: "ok", status: "no candidates", read: `Last scan ${slateScan.ts}: ${slateScan.scanned} games, nothing beat the no-vig book by 4+ points. It reported 'pass' — which is the scanner doing its job, not failing at it.` }),
    },
    (() => {
      const total = interpLog.length;
      const fails = interpLog.filter((e) => !e.ok).length;
      const lastFail = interpLog.find((e) => !e.ok);
      const kinds = [...new Set(interpLog.map((e) => e.kind))].join(", ");
      const base = { id: "interpreter", glyph: "\u2318", name: "File Interpreter", role: "Converts anything you give it into model-readable data" };
      if (total === 0) return { ...base, tone: "idle", status: "ready", read: "Every paste and upload routes through it: game lines and CSVs parse locally and cannot fail; screenshots ride the vision bridge with the paste box as automatic fallback. It logs every conversion — success or failure — so the pipeline's error patterns become visible here instead of staying mysterious. That log is how the system debugs itself." };
      if (fails === 0) return { ...base, tone: "ok", status: `${total} converted`, read: `All ${total} recent conversions succeeded (${kinds}). Local parses are doing the heavy lifting; that's the architecture working — the reliable path carries the load, the fancy path is a bonus.` };
      return { ...base, tone: "warn", status: `${fails} of ${total} failed`, read: `${total - fails}/${total} recent conversions succeeded. Last failure: ${lastFail.kind} — "${lastFail.detail}". The pattern so far: local parses (game lines, CSVs) never fail; failures cluster on the vision/image path. When a screenshot bounces, the paste box is the instant fallback — and every failure logged here sharpens where the next fix goes.` };
    })(),
  ];

  return (
    <>
      <header className="ing-head">
        <div className="ing-brand">
          <button className="ing-home-btn" onClick={onHome} aria-label="Back to home">← Home</button>
          <div>
            <h1>BRAIN</h1>
            <p>Model oversight · human-approved changes · v1.3</p>
          </div>
        </div>
      </header>

      <main className="lg-main">
        <section className="lg-stats">
          <div className="lg-stat">
            <span className="lg-stat-val">{graded.length}</span>
            <span className="lg-stat-label">graded projections</span>
          </div>
          <div className="lg-stat">
            <span className={"lg-stat-val " + (bias != null && Math.abs(bias) > 1 ? "amber" : "")}>{bias != null ? (bias > 0 ? "+" : "") + bias.toFixed(2) : "—"}</span>
            <span className="lg-stat-label">bias (final − model)</span>
          </div>
          <div className="lg-stat">
            <span className="lg-stat-val">{mae != null ? mae.toFixed(2) : "—"}</span>
            <span className="lg-stat-label">mean abs error</span>
          </div>
          <div className="lg-stat">
            <span className="lg-stat-val">{leans.length ? `${leanHits}–${leans.length - leanHits}` : "—"}</span>
            <span className="lg-stat-label">lean record</span>
          </div>
        </section>

        <section className="br-council">
          <div className="br-council-head">
            <h2 className="lg-formtitle">Agent council</h2>
            <span className="ing-hint" style={{ margin: 0 }}>Seven specialists, one pipeline. Data flows in, the model prices it, the ledger grades it, and the results feed back into calibration — every error logged is fuel for the next improvement. Agents observe and flag; only the Calibrator proposes changes, and you still approve them.</span>
          </div>
          <div className="br-flow">
            <div className="br-stage">
              <em>1 · Data in</em>
              <strong>⌘ Interpreter · ◈ Scout · ◉ Scanner</strong>
              <span>Uploads become structured data; rosters stay fresh; the day's market is stored</span>
            </div>
            <span className="br-arrow">→</span>
            <div className="br-stage core">
              <em>2 · Model core</em>
              <strong>◎ Calibrator · ≈ Market Reader</strong>
              <span>20k-sim engine on 7 bounded params; the book de-vigged to its true opinion</span>
            </div>
            <span className="br-arrow">→</span>
            <div className="br-stage">
              <em>3 · Verdicts</em>
              <strong>▲ Risk Warden</strong>
              <span>Slate flags candidates, Terminal confirms — the Warden checks every call against your leak history</span>
            </div>
            <span className="br-arrow">→</span>
            <div className="br-stage">
              <em>4 · Graded</em>
              <strong>≡ Historian</strong>
              <span>Every projection and bet lands in the ledger — the untouchable record</span>
            </div>
            <span className="br-arrow loop">⟲</span>
            <div className="br-stage feedback">
              <em>5 · Feedback</em>
              <strong>bias → Calibrator · errors → Interpreter</strong>
              <span>Model misses become parameter proposals; conversion failures show where to fix the pipeline. The loop is the self-improvement.</span>
            </div>
          </div>

          <div className="br-agents">
            {agents.map((a) => (
              <div className={"br-agent " + a.tone} key={a.id}>
                <div className="br-agent-top">
                  <span className="br-agent-glyph">{a.glyph}</span>
                  <div>
                    <strong>{a.name}</strong>
                    <span className="br-agent-role">{a.role}</span>
                  </div>
                  <span className={"br-agent-status " + a.tone}>{a.status}</span>
                </div>
                <p className="br-agent-read">{a.read}</p>
              </div>
            ))}
          </div>
        </section>

        <section className="lg-story">
          <h2>How the brain works</h2>
          <p>
            The brain runs a closed loop: data comes in through the Interpreter, Scout, and Scanner; the engine prices
            it; the Terminal and Slate issue verdicts under the Warden's guard; the Historian grades everything in the
            ledger — and the results flow back. Model bias becomes Calibrator proposals; conversion failures are logged
            by the Interpreter so pipeline errors surface instead of repeating. Changes apply instantly, persist between
            sessions, and are logged below. The AI can analyze and suggest; only you can apply. A positive
            bias means games are beating the model's number; MAE near 4.1 runs is the theoretical floor for a
            well-calibrated totals model, so don't chase numbers below it.
          </p>
        </section>

        <section className="br-profile">
          <h2 className="lg-formtitle">Bettor profile — {BETTOR_PROFILE.total.n.toLocaleString()} bets, {BETTOR_PROFILE.span}</h2>
          <div className="br-prof-grid">
            <div><em>All-time</em><strong className="neg">{BETTOR_PROFILE.total.w}–{BETTOR_PROFILE.total.l} · -${Math.abs(BETTOR_PROFILE.total.net).toFixed(0)}</strong><span>{BETTOR_PROFILE.total.roi}% ROI on ${(BETTOR_PROFILE.staked/1000).toFixed(1)}k staked</span></div>
            <div><em>CLV (the verdict)</em><strong className="neg">{BETTOR_PROFILE.avgBookEvPct}% avg</strong><span>beat the close on only {BETTOR_PROFILE.clvBeatPct}% of priced bets</span></div>
            <div><em>Live betting</em><strong className="neg">-${Math.abs(BETTOR_PROFILE.live.net).toFixed(0)}</strong><span>{BETTOR_PROFILE.live.n} bets · {BETTOR_PROFILE.live.roi}% ROI — the single biggest leak</span></div>
            <div><em>Parlays</em><strong className="neg">-${Math.abs(BETTOR_PROFILE.parlays.net).toFixed(0)}</strong><span>{BETTOR_PROFILE.parlays.roi}% ROI over {BETTOR_PROFILE.parlays.n} tickets</span></div>
            <div><em>Best shape</em><strong>{BETTOR_PROFILE.standardOdds.roi}%</strong><span>standard-odds straights ({BETTOR_PROFILE.standardOdds.n} bets) — near-breakeven, your edge</span></div>
            <div><em>Volume</em><strong>{BETTOR_PROFILE.betsPerActiveDay}/day</strong><span>{BETTOR_PROFILE.activeDays} active days · median stake ${BETTOR_PROFILE.medianStake}</span></div>
            <div><em>Pre-game vs live</em><strong>{BETTOR_PROFILE.pregame.roi}%</strong><span>pre-game ROI — {(BETTOR_PROFILE.live.roi - BETTOR_PROFILE.pregame.roi).toFixed(1)} pts better than live</span></div>
            <div><em>Lottery shape</em><strong className="neg">-${Math.abs(BETTOR_PROFILE.netWithoutTop5).toFixed(0)}</strong><span>net without the top 5 hits (${BETTOR_PROFILE.top5WinsTotal.toFixed(0)} of value in 5 bets)</span></div>
            <div><em>Worst drawdown</em><strong className="neg">${BETTOR_PROFILE.maxDrawdown}</strong><span>peak-to-trough · longest skid {BETTOR_PROFILE.longestLossStreak} straight</span></div>
          </div>
          <p className="ing-hint" style={{marginTop: 10}}>Stored for recollection at ingenuity:brain:bettorProfile — the AI recalibration and the Bet-of-the-Day mirror both read from it.</p>
        </section>

        <section className="br-ai">
          <div className="br-ai-head">
            <h2 className="lg-formtitle">AI recalibration</h2>
            <button className="ing-run small" onClick={askAI} disabled={aiBusy || graded.length < 5}>
              {aiBusy ? "Analyzing ledger…" : "Analyze model health"}
            </button>
          </div>
          {graded.length < 5 && <p className="ing-hint">Needs at least 5 graded projections in the ledger — log games from the terminal and fill in finals.</p>}
          {hosted && (
            <div className="br-key">
              <button className="br-key-toggle" onClick={() => setKeyOpen(!keyOpen)}>
                {keyOpen ? "▾" : "▸"} Claude API key {aiKey ? "· saved on this device" : "· not set"}
              </button>
              {keyOpen && (
                <div className="br-key-body">
                  <p className="ing-hint">
                    This is a hosted page, so there's no Anthropic bridge — AI recalibration and screenshot reading run on <b>your own</b> key.
                    Get one at <a href="https://console.anthropic.com" target="_blank" rel="noreferrer">console.anthropic.com</a>. A calibration is one small
                    request (fractions of a cent), but it is billed to you.
                  </p>
                  <p className="ing-hint">
                    <b>Be clear on the trade:</b> the key is stored in this browser and sent straight from your phone to Anthropic. Anyone who can open this
                    browser can read it. That's an acceptable risk for a personal tool on your own device and nowhere else. The key is never committed to
                    GitHub — it lives only here.
                  </p>
                  <input
                    className="br-key-input" type="password" value={aiKey} placeholder="sk-ant-..."
                    onChange={async (e) => { setAiKey(e.target.value); await store.set(AI_KEY_STORE, e.target.value.trim()); setKeyMsg("Saved on this device."); }}
                  />
                  <div className="ing-db-actions">
                    <button className="ing-ghost" onClick={async () => { setAiKey(""); await store.set(AI_KEY_STORE, ""); setKeyMsg("Key cleared from this device."); }}>Forget key</button>
                    {keyMsg && <span className="ing-importmsg">{keyMsg}</span>}
                  </div>
                </div>
              )}
            </div>
          )}
          {aiErr && <p className="ing-fetcherr-msg">{aiErr}</p>}
          {aiOut && (
            <div className="br-ai-out">
              <p className="br-ai-summary">{aiOut.summary}</p>
              {aiOut.suggestions.length === 0 && <p className="ing-hint">No parameter changes recommended — with this sample the honest move is to keep collecting data.</p>}
              {aiOut.suggestions.map((sg, i) => (
                <div className="br-sug" key={i}>
                  <div>
                    <strong>{sg.param}</strong> → {sg.value} <span className="br-sug-cur">(now {CFG[sg.param]})</span>
                    <p>{sg.reason}</p>
                  </div>
                  <button className="ing-run small" onClick={() => applySuggestion(sg)}>Apply</button>
                </div>
              ))}
            </div>
          )}
        </section>

        <section className="br-params">
          <h2 className="lg-formtitle">Engine parameters</h2>
          <p className="ing-hint">Bounded — the brain physically cannot push a value outside its rail. Blank = default.</p>
          {Object.entries(BRAIN_TUNABLES).map(([k, spec]) => (
            <div className="br-param" key={k}>
              <div className="br-param-info">
                <strong>{k}</strong>
                <span>{spec.desc} · default {DEFAULT_CFG[k]} · rails {spec.min}–{spec.max}</span>
              </div>
              <input value={draft[k] ?? ""} placeholder={String(DEFAULT_CFG[k])}
                onChange={(e) => setDraft({ ...draft, [k]: e.target.value })} inputMode="decimal" />
              <span className={"br-param-live" + (params[k] != null ? " tuned" : "")}>{params[k] != null ? "tuned" : "default"}</span>
            </div>
          ))}
          <div className="ing-db-actions">
            <button className="ing-run small" onClick={saveDraft}>Save parameters</button>
            <button className="ing-ghost" onClick={resetAll}>Reset to defaults</button>
            {saved && <span className="ing-importmsg">{saved}</span>}
          </div>
        </section>

        {log.length > 0 && (
          <section className="br-log">
            <h2 className="lg-formtitle">Change log</h2>
            {log.map((e, i) => (
              <div className="br-log-row" key={i}>
                <span className="br-log-ts">{e.ts}</span>
                <span className={"lg-tag " + (e.source === "ai" ? "ok" : "quiet")}>{e.source === "ai" ? "AI + approved" : "manual"}</span>
                <span className="br-log-change">{e.change}{e.reason ? ` — ${e.reason}` : ""}</span>
              </div>
            ))}
          </section>
        )}
      </main>

      <footer className="ing-foot">
        The brain adjusts parameters, never records. The ledger stays the untouched source of truth it grades itself against.
      </footer>
    </>
  );
}

.hist-break-row { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 10px; padding: 8px 0; border-top: 1px solid var(--line); font-size: 13px; align-items: baseline; }
.hist-break-row:first-of-type { border-top: none; }
.hb-label { font-weight: 500; }
.hb-rec { color: var(--ink-dim); }
.hb-net, .hb-roi { font-family: 'Archivo'; font-weight: 700; text-align: right; }
.hist-bet { display: grid; grid-template-columns: 88px 76px 1fr 64px 90px; gap: 10px; align-items: baseline; padding: 9px 12px; background: var(--field2); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 6px; font-size: 12.5px; }
@media (max-width: 700px) { .hist-bet { grid-template-columns: 1fr auto; } .hb-date, .hb-sport, .hb-stake { display: none; } }
.hb-date { color: var(--ink-dim); font-size: 11px; }
.hb-sport { font-family: 'Archivo'; font-size: 9.5px; letter-spacing: 0.08em; color: var(--cyan); }
.hb-desc { line-height: 1.4; }
.hb-stake { color: var(--ink-dim); text-align: right; }
.hb-res { font-family: 'Archivo'; font-weight: 700; text-align: right; }
.hist-pager { display: flex; gap: 14px; align-items: center; justify-content: center; margin-top: 12px; font-size: 12px; color: var(--ink-dim); }
.br-memory { background: var(--field2); border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
.br-mem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 13px; }

.br-mem-grid div { display: flex; flex-direction: column; gap: 3px; }
.br-mem-grid em { font-style: normal; font-size: 9.5px; letter-spacing: 0.11em; text-transform: uppercase; color: var(--ink-dim); font-family: 'Archivo'; }
.br-mem-grid strong { font-size: 13px; font-weight: 600; line-height: 1.45; }
.slate { max-width: 1080px; width: 100%; margin-top: 22px; background: var(--field2); border: 1px solid var(--line); border-radius: 14px; padding: 20px 22px; text-align: left; }
.slate-head { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }

.ing-run.ghosty.warn { color: var(--amber); }
.ing-run.ghosty.warn:hover:not(:disabled) { border-color: var(--amber); box-shadow: 0 0 14px rgba(245,196,81,0.25); }
.ing-run.ghosty { background: transparent; border: 1px solid var(--line); color: var(--cyan); box-shadow: none; }

.slate-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.slate-input { width: 100%; background: var(--field); border: 1px solid var(--line); color: var(--ink); padding: 11px 13px; border-radius: 8px; font-family: 'Space Grotesk'; font-size: 13px; resize: vertical; margin-bottom: 8px; }
.slate-input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(95,217,232,0.12); }
.slate-lean { display: flex; flex-direction: column; gap: 6px; padding: 14px 16px; border-radius: 10px; border-left: 3px solid var(--ink-dim); background: rgba(122,153,140,0.07); margin: 12px 0; }
.slate-lean.hot { border-left-color: var(--amber); background: rgba(245,196,81,0.07); }
.slate-lean strong { font-family: 'Archivo'; font-size: 14px; }
.slate-lean span { font-size: 12.5px; color: var(--ink-dim); line-height: 1.5; }
.slate-caveat { color: var(--amber) !important; }
.slate-rows { margin-top: 10px; }
.slate-row { display: grid; grid-template-columns: 1.6fr 1fr 0.8fr 0.7fr; gap: 10px; align-items: baseline; padding: 8px 12px; background: var(--field); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 6px; font-size: 12.5px; }
.slate-row.skip { grid-template-columns: 1.6fr 1fr; opacity: 0.6; }
.sr-match { font-weight: 500; }
.sr-model em { font-style: normal; color: var(--ink-dim); font-size: 11px; }
.sr-edge { font-family: 'Archivo'; font-weight: 700; color: var(--ink-dim); }
.sr-edge.hot { color: var(--amber); }
.sr-ev { font-family: 'Archivo'; font-weight: 700; text-align: right; }
.sr-ev.pos { color: var(--phos); } .sr-ev.neg { color: var(--ink-dim); }
.sr-err { color: var(--rust); font-size: 11.5px; }
.ing-import { margin-bottom: 18px; }
.ing-import-toggle { width: 100%; text-align: left; font-family: 'Archivo'; font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase; background: var(--field2); border: 1px dashed var(--line); color: var(--cyan); padding: 11px 14px; border-radius: 9px; cursor: pointer; }
.ing-import-toggle:hover { border-color: var(--cyan); }
.ing-import-body { border: 1px dashed var(--line); border-top: none; border-radius: 0 0 9px 9px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.ing-import-body input[type=file] { font-size: 12px; color: var(--ink-dim); }
.ing-import-body textarea { background: var(--field); border: 1px solid var(--line); color: var(--ink); padding: 10px 12px; border-radius: 7px; font-family: 'Space Grotesk'; font-size: 12.5px; resize: vertical; }
.ing-import-body textarea:focus { outline: none; border-color: var(--phos); }
.ing-staged { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--field); border: 1px solid var(--line); border-radius: 9px; flex-wrap: wrap; }
.ing-staged-thumb { width: 46px; height: 46px; object-fit: cover; border-radius: 6px; border: 1px solid var(--line); }
.ing-staged-name { font-size: 12.5px; color: var(--ink); flex: 1; min-width: 120px; word-break: break-all; }
.ing-slatenote { font-size: 12px; color: var(--cyan); margin-bottom: 12px; padding: 9px 12px; background: rgba(95,217,232,0.07); border-left: 3px solid var(--cyan); border-radius: 7px; }
.slate-chips { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.slate-chip { font-family: 'Archivo'; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); color: var(--ink-dim); }
.slate-chip.good { color: var(--phos); border-color: var(--phos-dim); }
.slate-filebtn { font-family: 'Archivo'; font-weight: 600; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; background: transparent; color: var(--cyan); border: 1px solid var(--cyan); padding: 11px 18px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; }
.slate-filebtn:hover { box-shadow: 0 0 14px rgba(95,217,232,0.3); }
.slate-live { display: flex; flex-direction: column; gap: 10px; margin: 10px 0; padding: 13px; border: 1px dashed var(--line); border-radius: 9px; }
.slate-live-row { display: flex; gap: 9px; flex-wrap: wrap; }
.slate-live-row input { flex: 1; min-width: 200px; background: var(--field); border: 1px solid var(--line); color: var(--ink); padding: 10px 12px; border-radius: 7px; font-family: 'Space Grotesk'; font-size: 13px; }
.slate-live-row input:focus { outline: none; border-color: var(--phos); }
.slate-paste { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
.slate-paste textarea { width: 100%; background: var(--field); border: 1px solid var(--line); color: var(--ink); padding: 11px 13px; border-radius: 8px; font-family: 'Space Grotesk'; font-size: 13px; resize: vertical; }
.slate-game { display: flex; flex-direction: column; gap: 12px; padding: 14px; background: var(--field); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 9px; }
.sg-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.sg-teams { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.sg-match { font-weight: 600; font-size: 14px; }
.sg-pitchers { font-size: 11.5px; color: var(--ink-dim); }
.sg-market { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
@media (max-width: 480px) { .sg-market { grid-template-columns: 1fr 1fr; } .sg-field:first-child { grid-column: 1 / -1; } }
.sg-field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.sg-field label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); font-family: 'Archivo'; }
.sg-field .ing-odds { flex-wrap: nowrap; }
.sg-field .ing-odds input { min-width: 0; }
.sg-field .ing-odds .sign { width: 30px; flex: none; }
.sg-line { background: var(--field2); border: 1px solid var(--line); color: var(--ink); padding: 10px; border-radius: 7px; font-family: 'Space Grotesk'; font-size: 14px; width: 100%; }
.sg-line:focus { outline: none; border-color: var(--cyan); }
.sg-result { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 14px; padding-top: 11px; border-top: 1px solid var(--line); }
.sg-model { font-size: 12.5px; color: var(--ink-dim); }
.sg-model strong { color: var(--phos); font-family: 'Archivo'; font-size: 15px; }
.sg-remove { background: transparent; border: 1px solid var(--line); color: var(--ink-dim); cursor: pointer; font-size: 13px; padding: 6px 10px; border-radius: 6px; flex: none; }
.sg-remove:hover { color: var(--rust); border-color: var(--rust); }
.ing-groupnote { font-style: normal; font-size: 9.5px; color: var(--ink-dim); font-weight: 400; margin-left: 8px; letter-spacing: 0.05em; }
.ing-roster-preview .ord { color: var(--phos); font-family: 'Archivo'; margin-right: 2px; }
.ing-foot { padding: 18px 28px; border-top: 1px solid var(--line); font-size: 11px; color: var(--ink-dim); text-align: center; line-height: 1.5; }

@media (prefers-reduced-motion: reduce) {
  .ing-logo, .ing-readout, .home-brand { animation: none; }
  .ing-bar { transition: none; }
}
