// Standalone build — React loaded globally from CDN
const { useState, useEffect, useMemo, useCallback } = React;
const STANDALONE = true; // hosted-page build: live odds & MLB fetches work; artifact AI bridge does not

// ============================================================================
//  INGENUITY — Unified Research Suite
//  Home → Projection Terminal (v1.3) + Research Ledger + Model Brain, one app.
//  New in this build:
//    • Home screen choosing Terminal or Ledger
//    • Player/lineup database — save hitters, starters, bullpens per team;
//      compute team offense from the saved lineup so data isn't re-entered
//    • Lineup fetcher — pulls yesterday's (or any date's) actual lineups +
//      probable pitchers from the free MLB Stats API and imports to the DB
//    • Manual bet entry in the ledger — straight bets and parlays with
//      automatic payout math, notes, and settle-later grading
//  Storage keys are unchanged, so existing saved teams/games/bets carry over.
//  Research tool only. Not betting advice.
// ============================================================================

// ---------------------------------------------------------------------------
// v1.2 projection constants
// ---------------------------------------------------------------------------
const DEFAULT_CFG = {
  N_SIMS: 20000,
  LEAGUE_WOBA: 0.318,
  WOBA_SCALE: 1.18,
  LEAGUE_RUNS_PER_PA: 0.118,
  PA_PER_INNING: 4.3,
  REG_OFFENSE_PA: 200,
  REG_STARTER_BF: 250,
  REG_BULLPEN_BF: 200,
  RECENT_FORM_WEIGHT: 0.25, // legacy raw-wOBA path only (v1.5: was 0.4 — 14-day raw wOBA is mostly noise; the BB%-K% process path is where recent trust belongs)
  STARTER_IP_SD: 1.1,
  // v1.2: overdispersion split into a SHARED game factor (weather/ump/ball —
  // hits both offenses together) and per-side factors. The shared factor
  // correlates the two team totals and fattens the tails of the game total —
  // the fix for the hot-slate misses (Rays/Royals 14, Padres/Cubs 16) where
  // v1.1's independent-sides model couldn't reach blowup games.
  // Tuned WITH the Poisson layer so that corr(away, home) ≈ 0.10 (empirical
  // same-game level) and the game total's sd lands ≈ 4 runs, matching real
  // MLB totals instead of v1.1's too-thin ~2.9.
  OVERDISP_SHAPE_GAME: 25.0,
  OVERDISP_SHAPE_SIDE: 9.0,
  // v1.2: home team skips the bottom 9th when leading → bats ~8.56 of 9
  // innings on average. Books price this; a model that doesn't runs ~2%
  // hot on every home total.
  HOME_BAT_FACTOR: 0.951,
  WEATHER_MAX_BOOST: 0.06,
  // v1.3: pitcher rating = xwOBA blended with an ERA-derived equivalent.
  // xwOBA is contact quality; ERA/xERA capture sequencing, stretch-vs-stuff,
  // and the guys who are "worse than their stats." 70/30 keeps contact
  // quality primary while letting run prevention drag the rating.
  PITCHER_XWOBA_WEIGHT: 0.7,
  LEAGUE_ERA: 4.10,
  ERA_TO_RA: 1.08, // earned → total runs allowed
  CALIBRATION_OFFSET: 0, // brain-tunable: runs added/removed from every projected total
  SEED_VERSION: 3, // bump when seeded stats are refreshed

  // v1.4 — deeper-stat pass: xwOBA offense gap, stabilization-aware recency,
  // bullpen contact quality, defense, framing. Same "process stat first,
  // results stat as the check" philosophy as the existing pitcher blend.
  OFFENSE_XWOBA_WEIGHT: 0.55, // team xwOBA vs actual wOBA (offense true-talent)
  LEAGUE_BBK: -13.0,          // league-average BB% − K% (plate discipline)
  BBK_TO_WOBA_SCALE: 0.0035,  // wOBA pts per 1-pt BB%-K% deviation from league
  RECENT_PROCESS_WEIGHT: 0.5, // weight on recent BB%-K% (stabilizes ~60 PA — trustworthy fast)
  RECENT_RESULT_WEIGHT: 0.2,  // weight on recent raw wOBA (needs 200+ PA — still noisy at 14d)
  LEAGUE_BARREL: 8.0,         // league-average barrel% allowed
  LEAGUE_HARDHIT: 35.0,       // league-average hard-hit% allowed
  BARREL_TO_WOBA_SCALE: 0.010,   // wOBA pts per 1-pt barrel% deviation
  HARDHIT_TO_WOBA_SCALE: 0.004,  // wOBA pts per 1-pt hard-hit% deviation
  PEN_CONTACT_WEIGHT: 0.4,    // bullpen: barrel/hard-hit-derived quality vs raw xwOBA
  DEFENSE_OAA_SCALE: 0.0025,  // fractional runs shift per team OAA
  FRAMING_FACTOR_SCALE: 0.0015, // fractional runs shift per catcher framing run

  // v1.5 — times-through-the-order. A starter isn't one pitcher: he's ~0.010
  // wOBA better than his line the 1st time through and worse the 3rd. Flat
  // pricing systematically undervalues innings 5–6 (where overs live) and
  // misprices long outings. Centered on the 2nd pass so a typical 5.5-IP start
  // stays calibration-neutral; the 3rd-pass step runs slightly steeper (1.2x),
  // matching the research consensus that the 3rd-time penalty is the biggest.
  TTO_STEP: 0.010,
};

// Live config = defaults + brain overrides (persisted, human-approved).
let CFG = { ...DEFAULT_CFG };

// The brain may tune ONLY these, inside these bounds.
const BRAIN_TUNABLES = {
  RECENT_FORM_WEIGHT:   { min: 0,    max: 0.7,  desc: "Weight on 14-day form vs season" },
  OVERDISP_SHAPE_GAME:  { min: 10,   max: 200,  desc: "Shared game variance (lower = more correlated/fatter tails)" },
  OVERDISP_SHAPE_SIDE:  { min: 4,    max: 30,   desc: "Per-team variance (lower = wider team totals)" },
  HOME_BAT_FACTOR:      { min: 0.90, max: 1.0,  desc: "Home 9th-inning offense scale" },
  WEATHER_MAX_BOOST:    { min: 0,    max: 0.15, desc: "Cap on temp+wind run boost" },
  PITCHER_XWOBA_WEIGHT: { min: 0.3,  max: 1.0,  desc: "xwOBA vs ERA-equivalent in pitcher rating" },
  CALIBRATION_OFFSET:   { min: -1.5, max: 1.5,  desc: "Global runs bias correction on totals" },
  OFFENSE_XWOBA_WEIGHT: { min: 0.2,  max: 1.0,  desc: "xwOBA vs actual wOBA in offense true-talent" },
  PEN_CONTACT_WEIGHT:   { min: 0,    max: 0.8,  desc: "Barrel/hard-hit vs xwOBA in bullpen rating" },
  DEFENSE_OAA_SCALE:    { min: 0,    max: 0.006, desc: "Runs impact per team OAA" },
  TTO_STEP:             { min: 0,    max: 0.02,  desc: "wOBA penalty per time through the order" },
};

function applyBrainParams(overrides) {
  CFG = { ...DEFAULT_CFG };
  if (!overrides) return;
  for (const [k, v] of Object.entries(overrides)) {
    const spec = BRAIN_TUNABLES[k];
    const num = parseFloat(v);
    if (spec && !isNaN(num)) CFG[k] = Math.min(spec.max, Math.max(spec.min, num));
  }
}

// ERA → wOBA-against equivalent, calibrated so league ERA maps exactly to
// league wOBA. Runs flow: ERA/9 per inning → ×ERA_TO_RA for unearned →
// per-PA via PA_PER_INNING → back through the engine's runs-per-wOBA scale.
function eraToWoba(era) {
  const e = parseFloat(era);
  if (isNaN(e)) return null;
  return CFG.LEAGUE_WOBA + CFG.WOBA_SCALE * ((e - CFG.LEAGUE_ERA) * CFG.ERA_TO_RA / 9 / CFG.PA_PER_INNING);
}

// Effective pitcher rating: contact quality first, run prevention as the check.
function effectivePitcherWoba(xwoba, era) {
  const x = parseFloat(xwoba);
  const eW = eraToWoba(era);
  if (isNaN(x)) return eW ?? CFG.LEAGUE_WOBA;
  if (eW == null) return x;
  return CFG.PITCHER_XWOBA_WEIGHT * x + (1 - CFG.PITCHER_XWOBA_WEIGHT) * eW;
}

// Offense true-talent estimate: blend actual wOBA with xwOBA, same "process
// first, results as the check" logic as the pitcher side. xwOBA isolates
// contact quality from sequencing/luck (BABIP, clutch) — the regression
// candidates (over/under their record) show up in this gap.
function effectiveOffenseWoba(off, xoff) {
  const o = parseFloat(off), x = parseFloat(xoff);
  if (isNaN(x)) return isNaN(o) ? CFG.LEAGUE_WOBA : o;
  if (isNaN(o)) return x;
  return CFG.OFFENSE_XWOBA_WEIGHT * x + (1 - CFG.OFFENSE_XWOBA_WEIGHT) * o;
}

// BB%−K% (plate discipline) → wOBA-equivalent. Stabilizes far faster (~60 PA)
// than wOBA itself (~200+ PA), so it's the trustworthy part of a 14-day window.
function bbkToWoba(bbk) {
  const b = parseFloat(bbk);
  if (isNaN(b)) return null;
  return CFG.LEAGUE_WOBA + CFG.BBK_TO_WOBA_SCALE * (b - CFG.LEAGUE_BBK);
}

// Bullpen batted-ball-quality proxy from barrel%/hard-hit% allowed — the
// fastest-reacting signal to bullpen fatigue, ahead of xwOBA itself updating.
function contactQualityToWoba(barrel, hardHit) {
  const b = parseFloat(barrel), h = parseFloat(hardHit);
  if (isNaN(b) && isNaN(h)) return null;
  let woba = CFG.LEAGUE_WOBA;
  if (!isNaN(b)) woba += CFG.BARREL_TO_WOBA_SCALE * (b - CFG.LEAGUE_BARREL);
  if (!isNaN(h)) woba += CFG.HARDHIT_TO_WOBA_SCALE * (h - CFG.LEAGUE_HARDHIT);
  return woba;
}
function effectivePenWoba(pen, barrel, hardHit) {
  const p = parseFloat(pen);
  const cq = contactQualityToWoba(barrel, hardHit);
  if (cq == null) return isNaN(p) ? CFG.LEAGUE_WOBA : p;
  if (isNaN(p)) return cq;
  return CFG.PEN_CONTACT_WEIGHT * cq + (1 - CFG.PEN_CONTACT_WEIGHT) * p;
}

// Defense (OAA) + catcher framing: both shift how contact/counts resolve
// independent of the pitcher or park. Combined into one small multiplier,
// same role as park/weather but tied to the fielding team, not the stadium.
function fieldFactor(oaa, framingRuns) {
  const o = parseFloat(oaa), f = parseFloat(framingRuns);
  let factor = 1;
  if (!isNaN(o)) factor *= (1 - o * CFG.DEFENSE_OAA_SCALE);
  if (!isNaN(f)) factor *= (1 - f * CFG.FRAMING_FACTOR_SCALE);
  return Math.max(0.90, Math.min(1.10, factor));
}

// All 30 parks. Factors are run-environment multipliers (1.00 = neutral),
// consistent with the original seed values; new entries follow the same scale.

  "American Family": 1.02, "Daikin": 1.01, "Nationals Park": 1.00, "Globe Life": 0.99,
  "Target": 0.99, "Progressive": 0.99, "Angel Stadium": 0.98, "Dodger": 0.98,

// Home team -> park, so slate scans and Bet of the Day price the actual

  "Reds": "Great American", "Phillies": "Citizens Bank", "Red Sox": "Fenway",

  "Tigers": "Comerica", "Cardinals": "Busch", "Marlins": "loanDepot",

// Baseball runs on Eastern time: a 10:15pm ET first pitch on the west coast is
// still THAT day's slate, and MLB's own schedule API buckets by ET. The app used
// UTC, which rolled the day over at 8pm ET — the slate vanished exactly during
// prime time, and late games got filed under tomorrow. Everything day-shaped
// now goes through here.
function etDayKey(d = new Date()) {
  return new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" }).format(d);
}

// Age of a stamp in whole days; null if never stamped.
function daysOld(iso) {
  if (!iso) return null;
  const d = Math.floor((Date.now() - new Date(iso + "T12:00:00Z").getTime()) / 86400000);
  return d < 0 ? 0 : d;
}

// Wind blows FROM wind_direction; it travels TOWARD dir+180. The out-to-center
// component is the projection of that vector onto the park's CF bearing:
// positive = blowing out (more runs), negative = blowing in.
function windOutComponent(speedMph, windFromDeg, cfBearing) {
  if (speedMph == null || windFromDeg == null || cfBearing == null) return 0;
  const towardDeg = (windFromDeg + 180) % 360;
  const rad = ((towardDeg - cfBearing) * Math.PI) / 180;
  return Math.round(speedMph * Math.cos(rad) * 10) / 10;
}

// 225° -> "SW": the direction the wind is coming FROM, book/broadcast style.
function degToCompass(deg) {
  if (deg == null || isNaN(deg)) return "—";
  const pts = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return pts[Math.round(((deg % 360) / 22.5)) % 16];
}

// MLB's own player list — free, keyless, one call, ~750-900 active players with
// their current team. This is the fix for CSVs with no team column at all
// (which is the NORMAL case for Baseball Savant — its leaderboards have a
// TEAM FILTER, not a team COLUMN you can add to the export; there is no
// button on Savant that puts "Team" into the CSV). Cached for a week; the
// season rarely needs it fresher than that outside trade-deadline week.
const ROSTER_MAP_MAX_AGE_DAYS = 7;
async function refreshMlbRosterMap() {
  try {
    const yr = new Date().getFullYear();
    const r = await fetch(`https://statsapi.mlb.com/api/v1/sports/1/players?season=${yr}`);
    if (!r.ok) return { ok: false, n: 0 };
    const j = await r.json();
    const people = j.people || [];
    const map = {};
    for (const p of people) {
      const team = p.currentTeam?.name;
      if (!p.fullName || !team) continue;
      const resolved = resolveTeamName(team) || team;
      map[normName(p.fullName)] = resolved;
    }
    const n = Object.keys(map).length;
    if (n) await store.set("ingenuity:mlb:rosterMap", { asOf: etDayKey(), map });
    return { ok: n > 0, n };
  } catch { return { ok: false, n: 0 }; } // offline or blocked — team-column CSVs and manual entry still work
}

function parkForTeam(teamName) {
  // Whole-word match: every word of the mapped name must appear in the given
  // name. Keeps "SF Giants" -> Oracle while making "Red Sox"/"White Sox"
  // impossible to cross-wire. Unknown names fall back to Neutral.
  const tw = normName(teamName).split(" ");
  for (const [team, park] of Object.entries(TEAM_PARK)) {
    if (normName(team).split(" ").every((w) => tw.includes(w))) return park;
  }
  return "Neutral";
}

// ---------------------------------------------------------------------------
// math helpers
// ---------------------------------------------------------------------------
function regress(rate, n, phantom, league = CFG.LEAGUE_WOBA) {
  if (rate == null || n == null) return rate ?? league;
  return (rate * n + league * phantom) / (n + phantom);
}
// Recency blend, stabilization-aware: BB%-K% (process) is trustworthy at 14
// days; raw wOBA (results — BABIP/sequencing-driven) mostly isn't. Falls back
// to the old flat blend if only raw recent wOBA is supplied (legacy teams).
function blendRecent(season, seasonPA, recent, recentPA, recentBbk) {
  const rw = parseFloat(recent), rb = bbkToWoba(recentBbk);
  const haveW = !isNaN(rw), haveB = rb != null;
  if (!haveW && !haveB) return season;
  const scale = (recentPA != null && recentPA < 40) ? recentPA / 40 : 1;
  if (haveB && !haveW) { const w = CFG.RECENT_PROCESS_WEIGHT * scale; return rb * w + season * (1 - w); }
  if (haveW && !haveB) { const w = CFG.RECENT_FORM_WEIGHT * scale; return rw * w + season * (1 - w); }
  const wp = CFG.RECENT_PROCESS_WEIGHT * scale, wr = CFG.RECENT_RESULT_WEIGHT * scale;
  const wSeason = Math.max(0, 1 - wp - wr);
  return rb * wp + rw * wr + season * wSeason;
}
function weatherFactor(temp, windOut) {
  let boost = 0;
  if (temp != null && !isNaN(temp) && temp !== "") boost += ((temp - 70) / 10) * 0.006;
  if (windOut != null && !isNaN(windOut) && windOut !== "") boost += (windOut / 5) * 0.004;
  return 1 + Math.max(-CFG.WEATHER_MAX_BOOST, Math.min(CFG.WEATHER_MAX_BOOST, boost));
}
function randn() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function randGamma(shape) {
  if (shape < 1) return randGamma(1 + shape) * Math.pow(Math.random(), 1 / shape);
  const d = shape - 1 / 3, c = 1 / Math.sqrt(9 * d);
  while (true) {
    let x = randn(), v = Math.pow(1 + c * x, 3);
    if (v <= 0) continue;
    const u = Math.random();
    if (u < 1 - 0.0331 * x * x * x * x) return d * v;
    if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
  }
}

// Poisson draw — runs are integers; gamma-mixed Poisson = negative binomial,
// the standard distribution for team run scoring. This is what makes pushes,
// tails, and the total's spread come out at real-baseball levels.
function randPoisson(lambda) {
  if (lambda <= 0) return 0;
  if (lambda < 30) {
    const L = Math.exp(-lambda);
    let k = 0, p = 1;
    do { k++; p *= Math.random(); } while (p > L);
    return k - 1;
  }
  return Math.max(0, Math.round(lambda + Math.sqrt(lambda) * randn()));
}

// Split a start into 1st/2nd/3rd-time-through segments. One pass through the
// order is 9 batters ≈ 9/PA_PER_INNING innings. Exported for testability.
function ttoSegments(sip) {
  const passIp = 9 / CFG.PA_PER_INNING;
  const ip1 = Math.min(sip, passIp);
  const ip2 = Math.min(Math.max(sip - passIp, 0), passIp);
  const ip3 = Math.max(sip - 2 * passIp, 0);
  return [ip1, ip2, ip3];
}

function simulateSide(offW, oppSP, oppSPip, oppPen, park, fld, n, gameFactor, sideScale) {
  const runs = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let sip = oppSPip + randn() * CFG.STARTER_IP_SD;
    sip = Math.max(1.5, Math.min(9, sip));
    const penIp = Math.max(0, 9 - sip);
    const mrun = (pitchW, ip) => {
      const m = (offW + pitchW) / 2;
      const pa = ip * CFG.PA_PER_INNING;
      return ((m - CFG.LEAGUE_WOBA) / CFG.WOBA_SCALE + CFG.LEAGUE_RUNS_PER_PA) * pa;
    };
    const [ip1, ip2, ip3] = ttoSegments(sip);
    const spRuns = mrun(oppSP - CFG.TTO_STEP, ip1) + mrun(oppSP, ip2) + mrun(oppSP + 1.2 * CFG.TTO_STEP, ip3);
    let lam = (spRuns + mrun(oppPen, penIp)) * park * fld * sideScale + CFG.CALIBRATION_OFFSET / 2;
    lam *= gameFactor[i]; // shared run-environment draw — correlates the two sides
    lam *= randGamma(CFG.OVERDISP_SHAPE_SIDE) / CFG.OVERDISP_SHAPE_SIDE;
    runs[i] = randPoisson(Math.max(0, lam)); // integer runs, negative-binomial dispersion
  }
  return runs;
}

function projectGame(g, nOverride) {
  const park = (PARKS[g.park] ?? 1.0) * weatherFactor(g.temp, g.windOut);
  const awayOff = regress(blendRecent(effectiveOffenseWoba(g.awayOff, g.awayXoff), g.awayPA, g.awayRecent, g.awayRecentPA, g.awayRecentBbk), g.awayPA, CFG.REG_OFFENSE_PA);
  const homeOff = regress(blendRecent(effectiveOffenseWoba(g.homeOff, g.homeXoff), g.homePA, g.homeRecent, g.homeRecentPA, g.homeRecentBbk), g.homePA, CFG.REG_OFFENSE_PA);
  const awaySP = regress(effectivePitcherWoba(g.awaySP, g.awaySPera), g.awaySPbf, CFG.REG_STARTER_BF);
  const homeSP = regress(effectivePitcherWoba(g.homeSP, g.homeSPera), g.homeSPbf, CFG.REG_STARTER_BF);
  const awayPen = regress(effectivePenWoba(g.awayPen, g.awayPenBarrel, g.awayPenHardHit), g.awayPenBf, CFG.REG_BULLPEN_BF);
  const homePen = regress(effectivePenWoba(g.homePen, g.homePenBarrel, g.homePenHardHit), g.homePenBf, CFG.REG_BULLPEN_BF);
  // fielding side's D/framing applies to the OPPOSING lineup it faces
  const homeField = fieldFactor(g.homeOAA, g.homeFraming);
  const awayField = fieldFactor(g.awayOAA, g.awayFraming);
  const n = nOverride || CFG.N_SIMS;
  // one shared run-environment draw per simulated game (v1.2)
  const gameFactor = new Float64Array(n);
  for (let i = 0; i < n; i++) gameFactor[i] = randGamma(CFG.OVERDISP_SHAPE_GAME) / CFG.OVERDISP_SHAPE_GAME;
  const awayRuns = simulateSide(awayOff, homeSP, g.homeSPip, homePen, park, homeField, n, gameFactor, 1);
  const homeRuns = simulateSide(homeOff, awaySP, g.awaySPip, awayPen, park, awayField, n, gameFactor, CFG.HOME_BAT_FACTOR);
  const totals = new Float64Array(n); // integer-valued: sides are Poisson draws
  for (let i = 0; i < n; i++) totals[i] = awayRuns[i] + homeRuns[i];
  const mean = (a) => a.reduce((s, x) => s + x, 0) / a.length;
  const sorted = Array.from(totals).sort((x, y) => x - y);
  const pct = (p) => sorted[Math.floor(p * sorted.length)];
  const bins = {};
  let over = 0, under = 0, push = 0;
  for (let i = 0; i < n; i++) {
    const b = totals[i]; bins[b] = (bins[b] || 0) + 1;
    if (b > g.line) over++; else if (b < g.line) under++; else push++;
  }
  return {
    mean: mean(totals), median: pct(0.5),
    awayMean: mean(awayRuns), homeMean: mean(homeRuns),
    p10: pct(0.1), p90: pct(0.9),
    line: g.line,
    pOver: over / n, pUnder: under / n, pPush: push / n,
    awayRuns, homeRuns,
    teamProb: (arr, l) => arr.filter((x) => x > l).length / arr.length,
    hist: bins,
  };
}

function americanOdds(p) {
  if (p <= 0 || p >= 1) return "—";
  if (p >= 0.5) return `-${Math.round((p / (1 - p)) * 100)}`;
  return `+${Math.round(((1 - p) / p) * 100)}`;
}
function amToDec(am) {
  const n = parseFloat(am);
  if (isNaN(n) || n === 0 || (n > -100 && n < 100)) return null; // american odds are ≥100 or ≤-100
  return n > 0 ? 1 + n / 100 : 1 + 100 / Math.abs(n);
}
function decToAm(dec) {
  if (dec == null || dec <= 1) return "—";
  return dec >= 2 ? `+${Math.round((dec - 1) * 100)}` : `-${Math.round(100 / (dec - 1))}`;
}
function parlayDecimal(legs) {
  let dec = 1;
  for (const leg of legs) {
    const d = amToDec(leg.odds);
    if (d == null) return null;
    dec *= d;
  }
  return dec;
}

function lineupToTeamOffense(players) {
  const valid = players.filter((p) => p.woba !== "" && !isNaN(parseFloat(p.woba)));
  if (!valid.length) return { off: null, pa: null };
  let wSum = 0, paSum = 0;
  for (const p of valid) {
    const pa = parseFloat(p.pa) || 100;
    wSum += parseFloat(p.woba) * pa;
    paSum += pa;
  }
  return { off: (wSum / paSum).toFixed(3), pa: Math.round(paSum) };
}

const SEED_ROSTERS = { ...AL_ROSTERS, ...NL_ROSTERS };

function mergeSeedRosters(stored, force = false) {
  // Seed entries are [name, stat, count]: hitters [name, blended wOBA, PA]
  // (55% xwOBA / 45% actual — luck-stripped true talent), pitchers
  // [name, xwOBA, BF]. Normally stats fill only BLANK fields and never
  // overwrite user values. force=true is a stats refresh (seed version
  // bumped): seeded players' stat fields update to the new numbers, while
  // custom teams, custom players, IP entries, and recent-form fields are
  // always left alone.
  const merged = [...stored];
  let changed = false;
  const mkH = (h) => ({ name: h[0], woba: h[1] || "", pa: h[2] || "" });
  const mkP = (p) => ({ name: p[0], xwoba: p[1] || "", bf: p[2] || "", ip: "", era: p[3] || "" });
  const blank = (v) => v === "" || v == null;

  for (const [name, r] of Object.entries(SEED_ROSTERS)) {
    const i = merged.findIndex((t) => (t.name || "").toLowerCase() === name.toLowerCase());
    if (i < 0) {
      const players = r.hitters.map(mkH);
      const { off, pa } = lineupToTeamOffense(players);
      merged.push({
        ...EMPTY_TEAM, name,
        players,
        rotation: r.pitchers.map(mkP),
        off: off ?? "", pa: pa != null ? String(pa) : "",
        pen: r.pen || "", penBf: r.penBf || EMPTY_TEAM.penBf,
      });
      changed = true;
    } else {
      const t = merged[i];
      const players = [...(t.players || [])];
      for (const h of r.hitters) {
        const seed = mkH(h);
        const j = players.findIndex((p) => p.name === seed.name);
        if (j < 0) { players.push(seed); changed = true; }
        else {
          const p = players[j];
          if ((force || blank(p.woba)) && seed.woba && p.woba !== seed.woba) { players[j] = { ...p, woba: seed.woba, pa: seed.pa || p.pa }; changed = true; }
          else if (blank(p.woba) && seed.woba) { players[j] = { ...p, woba: seed.woba, pa: blank(p.pa) ? seed.pa : p.pa }; changed = true; }
        }
      }
      const rotation = [...(t.rotation || [])];
      for (const pp of r.pitchers) {
        const seed = mkP(pp);
        const j = rotation.findIndex((p) => p.name === seed.name);
        if (j < 0) { rotation.push(seed); changed = true; }
        else {
          const p = rotation[j];
          if ((force || blank(p.xwoba)) && seed.xwoba && (p.xwoba !== seed.xwoba || p.era !== seed.era)) { rotation[j] = { ...p, xwoba: seed.xwoba, bf: seed.bf || p.bf, era: seed.era || p.era || "" }; changed = true; }
          else if (blank(p.xwoba) && seed.xwoba) { rotation[j] = { ...p, xwoba: seed.xwoba, bf: blank(p.bf) ? seed.bf : p.bf, era: blank(p.era) ? seed.era : p.era }; changed = true; }
        }
      }
      let next = { ...t, players, rotation };
      if (force || blank(next.off)) {
        const { off, pa } = lineupToTeamOffense(players);
        if (off != null && (next.off !== off || next.pa !== String(pa))) { next.off = off; next.pa = String(pa); changed = true; }
      }
      if ((force || blank(next.pen)) && r.pen && next.pen !== r.pen) { next.pen = r.pen; changed = true; }
      if ((force || blank(next.penBf) || next.penBf === "800") && r.penBf && next.penBf !== r.penBf) { next.penBf = r.penBf; changed = true; }
      merged[i] = next;
    }
  }
  return { merged, changed };
}

const normName = (x) => (x || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/\./g, "").replace(/\b(jr|sr|ii|iii|iv)\b/g, "").replace(/[^a-z ]/g, " ").replace(/\s+/g, " ").trim();

// Match a schedule/full name ("Chicago Cubs") to a DB team ("Cubs")
function matchTeamDb(name, teams) {
  const n = normName(name);
  let best = null;
  for (const t of teams) {
    const tn = normName(t.name);
    if (!tn) continue;
    if (n === tn || n.includes(tn) || tn.includes(n)) { if (!best || tn.length > normName(best.name).length) best = t; }
  }
  return best;
}

// Flexible odds-line parser. Accepts lines like:
//   Cubs @ Reds | 9.5 | -110 | -105

// Team-name resolver covering nicknames, cities, and 2-3 letter codes so
// pasted boards from any site normalize to the DB's nicknames.
const TEAM_LOOKUP = (() => {

  return map;

function resolveTeamName(raw) {
  if (!raw) return null;
  let t = raw.replace(/\([^)]*\)/g, "").replace(/[^A-Za-z. '-]/g, " ").replace(/\s+/g, " ").trim();
  const low = t.toLowerCase();
  if (TEAM_LOOKUP[low]) return TEAM_LOOKUP[low];
  // Short codes (≤3 chars) must match a whole word — never a substring inside
  // a name like "tARIk". Longer aliases may match as contained phrases.
  const words = low.split(" ");
  let best = null, bestLen = 0;
  for (const alias in TEAM_LOOKUP) {
    let hit = false;
    if (alias.length <= 3) hit = words.includes(alias);
    else hit = low === alias || low.includes(alias) || low.endsWith(" " + alias);
    if (hit && alias.length > bestLen) { best = TEAM_LOOKUP[alias]; bestLen = alias.length; }
  }
  return best;
}

// PITCHER SHORTHAND — "skenes wheeler 8.5 -104 -122" means: away SP Skenes,
// home SP Wheeler, total 8.5, over -104, under -122. Teams are inferred from
// whichever rotation each pitcher belongs to. Keywords (vs, @, at, /, o, u)
// are tolerated and ignored. First pitcher = away, second = home.
function buildPitcherIndex(teams) {
  const idx = new Map(); // last name (normalized) -> [{team, name, bf}]
  for (const t of teams || []) {
    for (const r of t.rotation || []) {
      if (!r.name) continue;
      const parts = normName(r.name).split(" ");
      const last = parts[parts.length - 1];
      const full = parts.join(" ");
      for (const key of new Set([last, full])) {
        if (!idx.has(key)) idx.set(key, []);
        idx.get(key).push({ team: t.name, name: r.name, bf: parseFloat(r.bf) || 0 });
      }
    }
  }
  return idx;
}

function parseShorthand(text, teams) {
  const line = (text || "").trim();
  if (!line || line.includes("\n")) return null;
  const nums = (line.match(/[+-]?\d+(?:\.\d+)?/g) || []).map(Number);
  const total = nums.find((n) => n >= 4 && n <= 20);
  const prices = nums.filter((n) => Math.abs(n) >= 100 && Math.abs(n) <= 2000);
  const words = line
    .replace(/[+-]?\d+(?:\.\d+)?/g, " ")
    .replace(/\b(vs\.?|at|over|under)\b/gi, " ")
    .replace(/[@\/|,]/g, " ")
    .split(/\s+/)
    .filter((w) => /^[A-Za-z'.-]{3,}$/.test(w) && !/^[ou]$/i.test(w));
  if (words.length < 2) return null;
  const idx = buildPitcherIndex(teams);
  const pick = (key) => {
    const hits = idx.get(key.toLowerCase());
    if (!hits || !hits.length) return null;
    return [...hits].sort((a, b) => b.bf - a.bf)[0]; // most-used arm wins ties
  };
  // resolve tokens to pitchers: try two-word names first, then single words
  const found = [];
  for (let i = 0; i < words.length && found.length < 2; i++) {
    if (i + 1 < words.length) {
      const two = pick(words[i] + " " + words[i + 1]);
      if (two) { found.push(two); i++; continue; }
    }
    const one = pick(words[i]);
    if (one) found.push(one);
  }
  if (found.length < 2 || found[0].team === found[1].team) return null;
  return {
    away: found[0].team, home: found[1].team,
    awayP: found[0].name, homeP: found[1].name,
    line: total != null ? total : "",
    over: prices[0] != null ? prices[0] : -110,
    under: prices[1] != null ? prices[1] : -110,
  };
}

// SMART SLATE PARSER — takes a messy multi-line copy/paste from Covers, ESPN,
// DraftKings, a sportsbook app, etc. and extracts games with totals + prices.
// Strategy: find team names anywhere in the text, pair consecutive teams into
// games, then grab the nearest total (a number 6-13, often with O/U) and the
// two American prices attached to it. Pitchers in (parens) or "Name vs Name"
// lines are attached when present. MLs/spreads are ignored.
function parseSlateText(text) {
  const raw = (text || "").replace(/\r/g, "");
  // 1) fast path: already-formatted "A @ B | total | over | under" lines
  const direct = parseOddsLines(raw).filter((x) => !x.err && x.away && x.home);
  if (direct.length) return { games: direct.map((g) => ({ away: resolveTeamName(g.away) || g.away, home: resolveTeamName(g.home) || g.home, line: g.line, over: g.over, under: g.under, awayP: g.awayP, homeP: g.homeP })), mode: "lines" };

  // 2) token scan for loose boards
  const lines = raw.split("\n").map((l) => l.trim()).filter(Boolean);
  const teamHits = []; // {team, li}
  const pitchersAt = []; // {name, li}
  const cleanP = (nm) => nm.replace(/[\s\-(]*[LR]?\)?\s*$/, "").replace(/[\s\-]+$/, "").trim();
  lines.forEach((l, li) => {
    const team = resolveTeamName(l);
    if (team) {
      teamHits.push({ team, li });
      // some boards glue the SP onto the team row: "SF   Michael Lorenzen-R"
      const inline = l.match(/([A-Z][a-zA-Z'.-]+\s+[A-Z][a-zA-Z'.-]+)\s*[-(]?\s*[LR]\)?\s*$/);
      if (inline && !resolveTeamName(inline[1])) pitchersAt.push({ name: cleanP(inline[1]), li });
      return;
    }
    // pitcher on its own line: "Michael Lorenzen-R", "Tarik Skubal (L)", "vs German Marquez"
    const pm = l.match(/^(?:vs\.?\s|probable:?\s*)?([A-Z][a-zA-Z'.-]+\s+[A-Z][a-zA-Z'.-]+)\s*[-(]?\s*[LR]?\)?\s*$/);
    if (pm && !resolveTeamName(pm[1])) pitchersAt.push({ name: cleanP(pm[1]), li });
  });
  const pitcherFor = (afterLi, beforeLi) => pitchersAt.filter((p) => p.li >= afterLi && p.li <= beforeLi).map((p) => p.name);

  // Compact total token: "9o-115", "9½u-110", "8½o-124", "O 7.5", "Over 9.5 -120"
  const fracTotal = (str) => {
    const m = str.match(/(\d{1,2})\s*(½|\.5)?\s*([oOuU])\s*([+-]?\d{3})/);
    if (m) { let t = parseFloat(m[1]); if (m[2]) t += 0.5; return { total: t, side: m[3].toLowerCase(), price: parseInt(m[4], 10) }; }
    const m2 = str.match(/\b([oOuU])(?:ver|nder)?\s*(\d{1,2})\s*(½|\.5)?(?:\s+([+-]?\d{3}))?/);
    if (m2) { let t = parseFloat(m2[2]); if (m2[3]) t += 0.5; return { total: t, side: m2[1].toLowerCase(), price: m2[4] ? parseInt(m2[4], 10) : null }; }
    return null;
  };
  const findTotalNear = (fromLi, toLi) => {
    const seen = [];
    for (let i = fromLi; i <= Math.min(toLi, lines.length - 1); i++) {
      const f = fracTotal(lines[i]);
      if (f && f.total >= 6 && f.total <= 13) seen.push(f);
    }
    if (!seen.length) return null;
    const counts = {}; seen.forEach((f) => (counts[f.total] = (counts[f.total] || 0) + 1));
    const modal = +Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
    const at = seen.filter((f) => f.total === modal && f.price != null);
    const med = (arr) => (arr.length ? [...arr].sort((x, y) => x - y)[Math.floor(arr.length / 2)] : null);
    const o = med(at.filter((f) => f.side === "o").map((f) => f.price));
    const u = med(at.filter((f) => f.side === "u").map((f) => f.price));
    return { total: modal, over: o ?? (u != null ? -u : -110), under: u ?? (o != null ? -o : -110) };
  };

  const games = [];
  for (let k = 0; k + 1 < teamHits.length; k += 2) {
    const a = teamHits[k], b = teamHits[k + 1];
    if (a.team === b.team) { k -= 1; continue; }
    const nextTeamLi = teamHits[k + 2] ? teamHits[k + 2].li : lines.length;
    const tot = findTotalNear(a.li, nextTeamLi - 1);
    const ps = pitcherFor(a.li + 1, nextTeamLi - 1);
    games.push({ away: a.team, home: b.team, line: tot ? tot.total : "", over: tot ? tot.over : "", under: tot ? tot.under : "", awayP: ps[0] || "", homeP: ps[1] || "" });
  }
  return { games, mode: "scan" };
}

function parseOddsLines(text) {
  const out = [];
  for (const raw of (text || "").split("\n")) {
    const line = raw.trim();
    if (!line) continue;
    const m = line.match(/^(.+?)\s*(?:@|\bat\b)\s*(.+?)(?=[|\d])/i);
    if (!m) { out.push({ raw: line, err: "couldn't find 'Away @ Home'" }); continue; }
    const pitcher = (x) => { const pm = x.match(/\(([^)]+)\)/); return pm ? pm[1].trim() : ""; };
    const clean = (x) => x.replace(/\([^)]*\)/g, "").replace(/[|,]+$/, "").replace(/\s*(o\/u|ou|total|totals?)\s*$/i, "").trim();
    const awayP = pitcher(m[1]), homeP = pitcher(m[2]);
    const away = clean(m[1]);
    const home = clean(m[2]);
    const rest = line.slice(m[0].length);
    const nums = rest.match(/[+-]?\d+(?:\.\d+)?/g) || [];
    if (!nums.length) { out.push({ raw: line, err: "no total found" }); continue; }
    const total = parseFloat(nums[0]);
    if (isNaN(total) || total < 4 || total > 20) { out.push({ raw: line, err: `total ${nums[0]} out of range` }); continue; }
    const odds = nums.slice(1).map(Number).filter((x) => Math.abs(x) >= 100 && Math.abs(x) <= 2000);
    out.push({ raw: line, away, home, awayP, homeP, line: total, over: odds[0] ?? -110, under: odds[1] ?? -110 });
  }
  return out;
}

// Build a consensus line per game from a The Odds API response: the modal
// total across books, with median Over/Under prices among books quoting it.
function consensusFromOddsApi(events) {
  const out = [];
  for (const ev of events || []) {
    const quotes = [];
    for (const bk of ev.bookmakers || []) {
      const mkt = (bk.markets || []).find((m) => m.key === "totals");
      if (!mkt) continue;
      const over = (mkt.outcomes || []).find((o) => o.name === "Over");
      const under = (mkt.outcomes || []).find((o) => o.name === "Under");
      if (over && under && over.point != null) quotes.push({ point: over.point, over: over.price, under: under.price });
    }
    if (!quotes.length) continue;
    const counts = {};
    for (const q of quotes) counts[q.point] = (counts[q.point] || 0) + 1;
    const modal = +Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
    const at = quotes.filter((q) => q.point === modal);
    const med = (arr) => { const x = [...arr].sort((a, b) => a - b); return x[Math.floor(x.length / 2)]; };
    // Each event carries its own first pitch. The feed returns every upcoming
    // game with a line — tonight's AND tomorrow's — so a game must be filed
    // under ITS day, not the day you happened to pull.
    out.push({ away: ev.away_team, home: ev.home_team, line: modal, over: med(at.map((q) => q.over)), under: med(at.map((q) => q.under)), books: quotes.length, awayP: "", homeP: "",
      date: ev.commence_time ? etDayKey(new Date(ev.commence_time)) : null, start: ev.commence_time || null });
  }
  return out;
}

// GAME DETAIL — one game, the whole picture, on one screen.
// Opens from the board chart. Runs the SAME 20k-sim deep dive the Terminal
// runs (same builders, same guards — a starter who isn't confirmed still
// refuses to fake a number), and lays the market, the model, and both rosters'
// key inputs side by side so a game can be judged without bouncing between
// Home and the projection screen.

function CompareBar({ label, a, h, higherIsBetter, fmt }) {
  const av = parseFloat(a), hv = parseFloat(h);
  const both = !isNaN(av) && !isNaN(hv);
  const max = both ? Math.max(Math.abs(av), Math.abs(hv)) || 1 : 1;
  const w = (v) => Math.min(100, Math.abs(v) / max * 100);
  const aBetter = both && (higherIsBetter ? av > hv : av < hv);
  const hBetter = both && (higherIsBetter ? hv > av : hv < av);
  const F = fmt || ((x) => x);
  return (
    <div className="gd-cmp-row">
      <span className={"gd-cmp-val" + (aBetter ? " lead" : "")}>{isNaN(av) ? "—" : F(av)}</span>
      <div className="gd-cmp-mid">
        <div className="gd-cmp-track left"><div className={"gd-cmp-fill" + (aBetter ? " lead" : "")} style={{ width: (both ? w(av) : 0) + "%" }} /></div>
        <span className="gd-cmp-label">{label}</span>
        <div className="gd-cmp-track"><div className={"gd-cmp-fill" + (hBetter ? " lead" : "")} style={{ width: (both ? w(hv) : 0) + "%" }} /></div>
      </div>
      <span className={"gd-cmp-val" + (hBetter ? " lead" : "")}>{isNaN(hv) ? "—" : F(hv)}</span>
    </div>
  );
}

function GameDetail({ g, teams, dateKey, isToday, onClose }) {
  const [r, setR] = useState(null);
  const [busy, setBusy] = useState(true);
  const [why, setWhy] = useState("");
  const [streaks, setStreaks] = useState(null);

  useEffect(() => { (async () => {
    const log = await store.get("ingenuity:results:log", {});
    if (Object.keys(log).length) setStreaks({ away: teamOUStreak(log, g.away), home: teamOUStreak(log, g.home) });
  })(); }, []);

  const A = matchTeamDb(g.away, teams), H = matchTeamDb(g.home, teams);
  const park = H ? parkForTeam(H.name) : "Neutral";
  const started = g.inPlay || (g.start && new Date(g.start).getTime() <= Date.now());

  const findArm = (t, pName) => {
    if (!pName || !t?.rotation) return null;
    const pn = normName(pName);
    return t.rotation.find((x) => normName(x.name) === pn) || t.rotation.find((x) => pn.includes(normName(x.name).split(" ").pop())) || null;
  };
  const aArm = findArm(A, g.awayP), hArm = findArm(H, g.homeP);

  useEffect(() => {
    let dead = false;
    (async () => {
      if (!A || !H) { setWhy(`${!A ? g.away : g.home} isn't in the database — no honest projection possible.`); setBusy(false); return; }
      if (started) { setWhy("First pitch has passed. This model prices 9 innings — a game in progress is a different question, and the board keeps the last pregame line for the record."); setBusy(false); return; }
      if (!aArm?.xwoba || !hArm?.xwoba) {
        setWhy(!g.awayP || !g.homeP
          ? "A probable starter hasn't been posted yet. The arm is the single biggest input to a total — running the sim on a team-average pitcher would produce a confident number about a game that isn't the one being played."
          : "A listed starter isn't in the database with stats yet. Import his numbers (Savant CSV) and reopen.");
        setBusy(false); return;
      }
      // let the overlay paint before 20k sims block the thread
      await new Promise((res) => setTimeout(res, 60));
      if (dead) return;
      const num = (v) => (v === "" || v == null ? null : parseFloat(v));
      const side = (t, arm) => ({
        off: num(t.off) ?? CFG.LEAGUE_WOBA, xoff: num(t.xoff), pa: num(t.pa) ?? 600,
        recent: num(t.recent), recentPA: num(t.recentPA), recentBbk: num(t.recentBbk),
        sp: num(arm.xwoba) ?? 0.32, spBf: num(arm.bf) ?? 200, spIp: num(arm.ip) ?? 5, spEra: num(arm.era),
        pen: num(t.pen) ?? 0.318, penBf: num(t.penBf) ?? 800, penBarrel: num(t.penBarrel), penHardHit: num(t.penHardHit),
        oaa: num(t.oaa), framing: num(t.framing),
      });
      const a = side(A, aArm), h = side(H, hArm);
      const proj = projectGame({
        park, line: num(g.line) ?? 8.5, temp: g.wx ? g.wx.temp : null, windOut: g.wx ? g.wx.windOut : null,
        awayOff: a.off, awayXoff: a.xoff, awayPA: a.pa, awayRecent: a.recent, awayRecentPA: a.recentPA, awayRecentBbk: a.recentBbk,
        awaySP: a.sp, awaySPbf: a.spBf, awaySPip: a.spIp, awaySPera: a.spEra,
        awayPen: a.pen, awayPenBf: a.penBf, awayPenBarrel: a.penBarrel, awayPenHardHit: a.penHardHit,
        awayOAA: a.oaa, awayFraming: a.framing,
        homeOff: h.off, homeXoff: h.xoff, homePA: h.pa, homeRecent: h.recent, homeRecentPA: h.recentPA, homeRecentBbk: h.recentBbk,
        homeSP: h.sp, homeSPbf: h.spBf, homeSPip: h.spIp, homeSPera: h.spEra,
        homePen: h.pen, homePenBf: h.penBf, homePenBarrel: h.penBarrel, homePenHardHit: h.penHardHit,
        homeOAA: h.oaa, homeFraming: h.framing,
      });
      if (dead) return;
      setR({ ...proj, awayName: A.name, homeName: H.name });
      setBusy(false);
    })();
    return () => { dead = true; };
  }, []);

  const moved = g.openLine !== "" && g.openLine != null && g.line !== "" && parseFloat(g.openLine) !== parseFloat(g.line);

  return (
    <div className="gd-overlay" role="dialog" aria-label={`${g.away} at ${g.home} full breakdown`}>
      <div className="gd-sheet">
        <div className="gd-top">
          <button className="gd-back" onClick={onClose}>← Board</button>
          <span className="gd-date">{dateKey}{isToday ? " · today" : " · archived"}</span>
        </div>

        <h2 className="gd-title">{g.away} <em>@</em> {g.home}</h2>
        <p className="gd-sub">
          {g.awayP || "TBD"} vs {g.homeP || "TBD"} · {park}{g.start ? ` · first pitch ${new Date(g.start).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" })} ET` : ""}
          {started ? " · ● in play" : ""}
          {g.wx && (g.wx.roof
            ? " · ⌂ roof — indoor conditions"
            : ` · ${g.wx.temp}°F, wind ${Math.abs(g.wx.windOut)} mph ${g.wx.windOut > 1 ? "out" : g.wx.windOut < -1 ? "in" : "neutral"}`)}
        </p>

        <div className="gd-market">
          <div><em>Line</em><strong>{g.line || "—"}</strong></div>
          <div><em>Over</em><strong>{g.over || "—"}</strong></div>
          <div><em>Under</em><strong>{g.under || "—"}</strong></div>
          <div><em>Opened</em><strong className={moved ? (parseFloat(g.line) > parseFloat(g.openLine) ? "gd-up" : "gd-dn") : ""}>{g.openLine || "—"}{moved ? (parseFloat(g.line) > parseFloat(g.openLine) ? " ▲" : " ▼") : ""}</strong></div>
        </div>
        {moved && <p className="gd-move-note">The market has moved {Math.abs(parseFloat(g.line) - parseFloat(g.openLine)).toFixed(1)} runs since this board first saw a number{g.openTs ? ` (${g.openTs})` : ""} — that drift is information about where money went.</p>}

        {g.wx && (
          <div className="gd-wx">
            <div className="gd-wx-head">Game conditions · {park}</div>
            {g.wx.roof ? (
              <p className="gd-wx-roof">⌂ Roofed park — indoor conditions (72°, still air). Weather is a non-factor here; the park factor ({PARKS[park] ?? 1}) is the whole environment story.</p>
            ) : (
              <>
                <div className="gd-wx-grid">
                  <div><em>Temp</em><strong>{g.wx.temp}°F</strong><span>{g.wx.temp >= 85 ? "hot — ball carries" : g.wx.temp <= 55 ? "cold — ball dies" : "moderate"}</span></div>
                  <div><em>Wind</em><strong>{g.wx.spd != null ? `${g.wx.spd} mph` : "—"}</strong><span>{g.wx.dir != null ? `from the ${degToCompass(g.wx.dir)}` : ""}</span></div>
                  <div><em>To center</em><strong className={g.wx.windOut > 1 ? "gd-up" : g.wx.windOut < -1 ? "gd-dn" : ""}>{g.wx.windOut > 0 ? "+" : ""}{g.wx.windOut} mph</strong><span>{g.wx.windOut > 1 ? "blowing OUT ↗" : g.wx.windOut < -1 ? "blowing IN ↘" : "crosswind / calm"}</span></div>
                  <div><em>Run env</em><strong>{(((PARKS[park] ?? 1) * weatherFactor(g.wx.temp, g.wx.windOut) - 1) * 100).toFixed(1)}%</strong><span>park × weather vs neutral</span></div>
                </div>
                <p className="gd-wx-note">
                  For prop research: the to-center component is what matters for carry — fly balls, HR/XBH distance, and deep-outfield outs all move with it, while a pure crosswind mostly just bends foul lines. Raw speed and compass direction are shown so you can judge the parts of the park the component math can't see. The engine caps the total weather effect at ±6%, and this forecast was fetched at pull time — re-pull closer to first pitch for a fresher read.
                </p>
              </>
            )}
          </div>
        )}

        {streaks && (streaks.away.n > 0 || streaks.home.n > 0) && (
          <div className="gd-streak">
            <div className="gd-streak-head">Recent over/under form · from your graded results</div>
            {[{ t: g.away, s: streaks.away }, { t: g.home, s: streaks.home }].map(({ t, s }, i) => (
              <div className="gd-streak-row" key={i}>
                <span className="gd-streak-team">{t}</span>
                {s.n > 0 ? (
                  <>
                    <span className={"gd-streak-tag " + (s.side === "O" ? "ov" : s.side === "U" ? "un" : "")}>
                      {s.streak >= 2 ? `${s.streak} straight ${s.side === "O" ? "OVER" : s.side === "U" ? "UNDER" : "PUSH"}` : `last: ${s.side === "O" ? "over" : s.side === "U" ? "under" : "push"}`}
                    </span>
                    <span className="gd-streak-seq">{s.last.map((x) => x.ou).join(" ")}</span>
                  </>
                ) : <span className="gd-streak-tag">no graded games yet</span>}
              </div>
            ))}
            <p className="gd-streak-note">
              A streak is a fact, not a lean. "Hot unders keep going under" and "a series is due to flip" are opposite reads of the same run — both are stories.
              This is shown for research, is NOT in the projection, and grows only as your own graded results accumulate.
            </p>
          </div>
        )}

        {g.proj && (
          <div className="gd-frozen">
            Scanner's read at {g.proj.ts || "scan time"}: model {g.proj.model} vs line {g.proj.atLine} ({g.proj.edge > 0 ? "+" : ""}{g.proj.edge} pts). Below is the fresh full-depth run.
          </div>
        )}

        {busy && <div className="gd-busy">◆ Running the full 20,000-simulation deep dive…</div>}
        {!busy && why && <div className="gd-why">{why}</div>}
        {!busy && r && <Readout r={r} />}

        {A && H && (
          <div className="gd-compare">
            <div className="gd-cmp-head">
              <span>{A.name}</span><span className="gd-cmp-mid-head">Inputs, side by side</span><span>{H.name}</span>
            </div>
            <CompareBar label="wOBA" a={A.off} h={H.off} higherIsBetter fmt={(x) => x.toFixed(3)} />
            <CompareBar label="xwOBA" a={A.xoff} h={H.xoff} higherIsBetter fmt={(x) => x.toFixed(3)} />
            <CompareBar label="14-day wOBA" a={A.recent} h={H.recent} higherIsBetter fmt={(x) => x.toFixed(3)} />
            <CompareBar label="14d BB%−K%" a={A.recentBbk} h={H.recentBbk} higherIsBetter fmt={(x) => x.toFixed(1)} />
            <CompareBar label="SP xwOBA" a={aArm?.xwoba} h={hArm?.xwoba} fmt={(x) => x.toFixed(3)} />
            <CompareBar label="SP ERA" a={aArm?.era} h={hArm?.era} fmt={(x) => x.toFixed(2)} />
            <CompareBar label="Bullpen xwOBA" a={A.pen} h={H.pen} fmt={(x) => x.toFixed(3)} />
            <CompareBar label="Pen barrel% alwd" a={A.penBarrel} h={H.penBarrel} fmt={(x) => x.toFixed(1)} />
            <CompareBar label="Defense OAA" a={A.oaa} h={H.oaa} higherIsBetter fmt={(x) => (x > 0 ? "+" : "") + x.toFixed(0)} />
            <CompareBar label="Framing runs" a={A.framing} h={H.framing} higherIsBetter fmt={(x) => (x > 0 ? "+" : "") + x.toFixed(0)} />
            <p className="gd-cmp-note">Pitching rows: lower is better. Blank means that stat hasn't been imported for this team yet — the model falls back to league average there, so a blank is a soft spot in the read, not a zero.</p>
          </div>
        )}

        <p className="gd-foot">Same engine, same guards as the Terminal — this is the deep dive, just anchored to the game. Research, not advice; the pass is always available.</p>
      </div>
    </div>
  );
}

// ===========================================================================
// BACKUP — the ledger only stays honest if it survives. iOS gives no guarantee
// browser storage lasts (low disk, cleared history), so this exports everything
// you've built to a real file. API keys are deliberately NOT included: a backup
// gets shared, synced, and forgotten in ways a key never should be.
// ===========================================================================
const BACKUP_KEYS = [
  "ingenuity:teams", "ingenuity:ledger:games", "ingenuity:ledger:bets",
  "ingenuity:slate:day", "ingenuity:slate:archive", "ingenuity:history:bets",
  "ingenuity:brain:params", "ingenuity:brain:log", "ingenuity:brain:interpLog",
  "ingenuity:brain:slateScan", "ingenuity:brain:slateAccuracy", "ingenuity:botd", "ingenuity:results:log",
  "ingenuity:history:version", "ingenuity:seedVersion",
];

function Backup() {
  const [msg, setMsg] = useState("");
  const [inputKey, setInputKey] = useState(0);

  const doExport = async () => {
    const payload = { app: "ingenuity", exported: new Date().toISOString(), data: {} };
    for (const k of BACKUP_KEYS) {
      const v = await store.get(k, undefined);
      if (v !== undefined) payload.data[k] = v;
    }
    const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `ingenuity-backup-${etDayKey()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    const n = Object.keys(payload.data).length;
    setMsg(`Exported ${n} stores. Save the file to iCloud Drive (Files app) — that's the copy that survives.`);
  };

  const doRestore = async (file) => {
    if (!file) return;
    try {
      const text = await file.text();
      const payload = JSON.parse(text);
      if (payload.app !== "ingenuity" || !payload.data) throw new Error("not an Ingenuity backup file");
      let n = 0;
      for (const [k, v] of Object.entries(payload.data)) {
        if (BACKUP_KEYS.includes(k)) { await store.set(k, v); n++; }
      }
      setMsg(`Restored ${n} stores from ${payload.exported ? payload.exported.slice(0, 10) : "backup"}. Reload the app (close fully and reopen) to see it everywhere.`);
    } catch (e) {
      setMsg(`Restore failed — ${e.message}. Nothing was changed.`);
    }
    setInputKey((k) => k + 1);
  };

  return (
    <section className="bk">
      <div className="bk-head">
        <h2>Backup</h2>
        <button className="ing-run small" onClick={doExport}>Export everything</button>
      </div>
      <p className="bk-note">
        Your manual bets, slate archive, graded results, and team edits live in this browser's storage — and iOS can clear that
        (low disk space, clearing history). One tap exports it all to a file; keep it in iCloud Drive. API keys are never included.
        Restoring merges a backup back in.
      </p>
      <label className="bk-restore">
        Restore from backup file
        <input key={inputKey} type="file" accept=".json,application/json" onChange={(e) => doRestore(e.target.files[0])} />
      </label>
      {msg && <p className="ing-hint">{msg}</p>}
    </section>
  );
}

function Terminal({ onHome }) {
  const [tab, setTab] = useState("project");
  const [teams, setTeams] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);

  const [park, setPark] = useState("Neutral");
  const [line, setLine] = useState("8.5");
  const [temp, setTemp] = useState("");
  const [windOut, setWindOut] = useState("");
  const [overPrice, setOverPrice] = useState("");
  const [underPrice, setUnderPrice] = useState("");
  const [away, setAway] = useState({ ...EMPTY_TEAM });
  const [home, setHome] = useState({ ...EMPTY_TEAM });
  const [logMsg, setLogMsg] = useState("");
  const [slateApplied, setSlateApplied] = useState("");
  const [daySlate, setDaySlate] = useState(null); // today's board, for the one-tap game picker
  const [slateNote, setSlateNote] = useState("");

  useEffect(() => {
    (async () => {
      const t = await store.get("ingenuity:teams", []);
      // migrate old records to new schema, then fold in seeded rosters
      const migrated = t.map((x) => ({ ...EMPTY_TEAM, ...x, players: x.players || [], rotation: x.rotation || [] }));
      const seedVer = await store.get("ingenuity:seedVersion", 0);
      const force = seedVer !== CFG.SEED_VERSION; // stats refresh shipped
      const { merged, changed } = mergeSeedRosters(migrated, force);
      setTeams(merged);
      if (changed) await store.set("ingenuity:teams", merged);
      if (force) await store.set("ingenuity:seedVersion", CFG.SEED_VERSION);
      // today's board feeds the one-tap game picker
      const dayBoard = await store.get("ingenuity:slate:day", null);
      if (dayBoard && dayBoard.date === etDayKey()) setDaySlate(dayBoard);
      // restore last matchup setup so a session picks up where it left off
      const last = await store.get("ingenuity:lastMatchup", null);
      if (last) {
        if (last.park) setPark(last.park);
        if (last.line) setLine(last.line);
        if (last.temp != null) setTemp(last.temp);
        if (last.windOut != null) setWindOut(last.windOut);
        const find = (nm) => merged.find((x) => (x.name || "").toLowerCase() === (nm || "").toLowerCase());
        const a = find(last.away), h = find(last.home);
        if (a) setAway({ ...EMPTY_TEAM, ...a, starter: last.awayStarter || "" });
        if (h) setHome({ ...EMPTY_TEAM, ...h, starter: last.homeStarter || "" });
      }
      setLoaded(true);
    })();
  }, []);

  const saveTeams = useCallback(async (next) => {
    setTeams(next);
    await store.set("ingenuity:teams", next);
  }, []);

  // Today's Slate auto-apply: when both loaded teams match a slate game,
  // pull in the stored line, prices, and probable starters automatically.
  useEffect(() => {
    (async () => {
      if (!away.name || !home.name) return;
      const day = await store.get("ingenuity:slate:day", null);
      if (!day || day.date !== etDayKey()) return;
      const match = (slateName, dbName) => {
        const a = normName(slateName), b = normName(dbName);
        return a && b && (a.includes(b) || b.includes(a));
      };
      const g = (day.games || []).find((x) => match(x.away, away.name) && match(x.home, home.name));
      if (!g) return;
      const key = g.away + "|" + g.home;
      if (slateApplied === key) return;
      setSlateApplied(key);
      if (g.line !== "" && g.line != null) setLine(String(g.line));
      if (g.over !== "" && g.over != null) setOverPrice(String(g.over));
      if (g.under !== "" && g.under != null) setUnderPrice(String(g.under));
      const applySP = (teamObj, setter, pname) => {
        if (!pname || !teamObj.rotation) return null;
        const pn = normName(pname);
        const hit = teamObj.rotation.find((r) => normName(r.name) === pn) || teamObj.rotation.find((r) => pn.includes(normName(r.name).split(" ").pop()));
        if (hit) { setter((prev) => ({ ...prev, starter: hit.name, sp: hit.xwoba || prev.sp, spBf: hit.bf || prev.spBf, spIp: hit.ip || prev.spIp, spEra: hit.era || prev.spEra })); return hit.name; }
        return null;
      };
      const aSP = applySP(away, setAway, g.awayP);
      const hSP = applySP(home, setHome, g.homeP);
      const pk = parkForTeam(home.name);
      setPark(pk);
      let wxN = "";
      if (g.wx) {
        if (g.wx.roof) { setTemp("72"); setWindOut("0"); wxN = ", roof"; }
        else { if (g.wx.temp != null) setTemp(String(g.wx.temp)); if (g.wx.windOut != null) setWindOut(String(g.wx.windOut)); wxN = g.wx.temp != null ? `, ${g.wx.temp}°` : ""; }
      }
      setSlateNote(`Today's Slate applied — line ${g.line || "—"} (${g.over || "-110"}/${g.under || "-110"})${aSP || hSP ? `, starters ${aSP || g.awayP || "?"} vs ${hSP || g.homeP || "?"}` : ""}, park ${pk}${wxN}.`);
    })();
  }, [away.name, home.name]);

  const num = (v) => (v === "" || v == null ? null : parseFloat(v));

  const loadTeamInto = (slot, teamName) => {
    const t = teams.find((x) => x.name === teamName);
    if (!t) return;
    (slot === "away" ? setAway : setHome)({ ...EMPTY_TEAM, ...t });
  };

  // Auto-fill the whole projection from a pasted game line, e.g.
  // "Phillies (Zack Wheeler) @ Tigers (Tarik Skubal) | 7.5 | +102 | -122".
  // Resolves both teams from the DB, sets their probable starters (loading
  // that pitcher's xwOBA/BF/IP/ERA), and fills line + both book prices.
  // One-tap load from Today's Slate: both teams from the DB, the probable
  // starters (with their stats), the market line and both prices, and — the
  // piece the auto-apply used to miss — the home team's actual park.
  const loadSlateGame = (idx) => {
    const g = daySlate?.games?.[parseInt(idx)];
    if (!g) return;
    const A = matchTeamDb(g.away, teams), H = matchTeamDb(g.home, teams);
    if (!A || !H) { setSlateNote(`Couldn't match ${!A ? g.away : g.home} to the database — load teams manually for this one.`); return; }
    const build = (dbTeam, pName) => {
      const t = { ...EMPTY_TEAM, ...dbTeam };
      if (pName && dbTeam.rotation) {
        const pn = normName(pName);
        const hit = dbTeam.rotation.find((r) => normName(r.name) === pn) || dbTeam.rotation.find((r) => pn.includes(normName(r.name).split(" ").pop()));
        if (hit) { t.starter = hit.name; t.sp = hit.xwoba || t.sp; t.spBf = hit.bf || t.spBf; t.spIp = hit.ip || t.spIp; t.spEra = hit.era || t.spEra; }
      }
      return t;
    };
    setSlateApplied(g.away + "|" + g.home); // pre-mark so the auto-apply effect doesn't double-fire
    setAway(build(A, g.awayP));
    setHome(build(H, g.homeP));
    if (g.line !== "" && g.line != null) setLine(String(g.line));
    if (g.over !== "" && g.over != null) setOverPrice(String(g.over));
    if (g.under !== "" && g.under != null) setUnderPrice(String(g.under));
    const pk = parkForTeam(H.name);
    setPark(pk);
    // carry game-time weather across too, if the slate has it attached
    let wxNote = "";
    if (g.wx) {
      if (g.wx.roof) { setTemp("72"); setWindOut("0"); wxNote = ", roof (indoor)"; }
      else { setTemp(g.wx.temp != null ? String(g.wx.temp) : ""); setWindOut(g.wx.windOut != null ? String(g.wx.windOut) : ""); wxNote = g.wx.temp != null ? `, ${g.wx.temp}°/${g.wx.windOut > 0 ? "+" : ""}${g.wx.windOut} mph out` : ""; }
    } else {
      setTemp(""); setWindOut(""); // clear stale weather from a previous game
      wxNote = " — no weather on this game yet; pull or Refresh weather in Today's Slate to auto-fill it";
    }
    setSlateNote(`${g.away} @ ${g.home} loaded — line ${g.line || "—"} (${g.over || "-110"}/${g.under || "-110"}), ${g.awayP || "TBD"} vs ${g.homeP || "TBD"}, park ${pk}${wxNote}.${!g.awayP || !g.homeP ? " A starter is still TBD — the projection will fall back to a team-average arm, so treat it as a sketch until the probable posts." : ""}`);
  };

  const loadGameLine = (g) => {
    const A = matchTeamDb(g.away, teams), H = matchTeamDb(g.home, teams);
    if (!A || !H) return { ok: false, miss: !A ? g.away : g.home };
    const build = (dbTeam, pName) => {
      const t = { ...EMPTY_TEAM, ...dbTeam };
      if (pName && dbTeam.rotation) {
        const pn = normName(pName);
        const hit = dbTeam.rotation.find((r) => normName(r.name) === pn) || dbTeam.rotation.find((r) => pn.includes(normName(r.name).split(" ").pop()));
        if (hit) { t.starter = hit.name; t.sp = hit.xwoba || t.sp; t.spBf = hit.bf || t.spBf; t.spIp = hit.ip || t.spIp; t.spEra = hit.era || t.spEra; }
      }
      return t;
    };
    const aTeam = build(A, g.awayP), hTeam = build(H, g.homeP);
    setAway(aTeam); setHome(hTeam);
    if (g.line != null && !isNaN(g.line)) setLine(String(g.line));
    if (g.over != null && !isNaN(g.over)) setOverPrice(String(g.over));
    if (g.under != null && !isNaN(g.under)) setUnderPrice(String(g.under));
    return { ok: true, away: A.name, home: H.name, aStarter: aTeam.starter, hStarter: hTeam.starter };
  };

  // Pull the selected starter's latest saved stats at run time, so a starter
  // picked before stats were uploaded still calculates with real numbers.
  const resolveSP = (t) => {
    if (!t.starter) return t;
    const dbTeam = teams.find((x) => (x.name || "").toLowerCase() === (t.name || "").toLowerCase());
    const rot = (dbTeam?.rotation?.length ? dbTeam.rotation : t.rotation) || [];
    const p = rot.find((r) => r.name === t.starter);
    if (!p) return t;
    return { ...t, sp: p.xwoba || t.sp, spBf: p.bf || t.spBf, spIp: p.ip || t.spIp, spEra: p.era || t.spEra };
  };

  const runProjection = () => {
    setRunning(true);
    setLogMsg("");
    setTimeout(async () => {
      const A = resolveSP(away), H = resolveSP(home);
      const g = {
        park, line: num(line), temp: num(temp), windOut: num(windOut),
        awayOff: num(A.off) ?? CFG.LEAGUE_WOBA, awayXoff: num(A.xoff), awayPA: num(A.pa) ?? 600,
        awayRecent: num(A.recent), awayRecentPA: num(A.recentPA), awayRecentBbk: num(A.recentBbk),
        awaySP: num(A.sp) ?? 0.32, awaySPbf: num(A.spBf) ?? 200, awaySPip: num(A.spIp) ?? 5, awaySPera: num(A.spEra),
        awayPen: num(A.pen) ?? 0.318, awayPenBf: num(A.penBf) ?? 800, awayPenBarrel: num(A.penBarrel), awayPenHardHit: num(A.penHardHit),
        awayOAA: num(A.oaa), awayFraming: num(A.framing),
        homeOff: num(H.off) ?? CFG.LEAGUE_WOBA, homeXoff: num(H.xoff), homePA: num(H.pa) ?? 600,
        homeRecent: num(H.recent), homeRecentPA: num(H.recentPA), homeRecentBbk: num(H.recentBbk),
        homeSP: num(H.sp) ?? 0.32, homeSPbf: num(H.spBf) ?? 200, homeSPip: num(H.spIp) ?? 5, homeSPera: num(H.spEra),
        homePen: num(H.pen) ?? 0.318, homePenBf: num(H.penBf) ?? 800, homePenBarrel: num(H.penBarrel), homePenHardHit: num(H.penHardHit),
        homeOAA: num(H.oaa), homeFraming: num(H.framing),
      };
      setResult({
        ...projectGame(g),
        awayName: away.name || "Away", homeName: home.name || "Home",
        awayStarter: away.starter || null, homeStarter: home.starter || null,
        park, overPrice: num(overPrice), underPrice: num(underPrice),
      });
      await store.set("ingenuity:lastMatchup", {
        park, line, temp, windOut,
        away: away.name, home: home.name,
        awayStarter: away.starter || "", homeStarter: home.starter || "",
      });
      setRunning(false);
    }, 50);
  };

  const logToLedger = async (r) => {
    const games = await store.get("ingenuity:ledger:games", SEED_GAMES);
    const pW = r.pOver / (r.pOver + r.pUnder); // push-excluded
    const edge = pW - 0.5;
    const strength = Math.abs(edge);
    const side = edge > 0 ? "Over" : "Under";
    const lean = strength < 0.04
      ? "Coin flip"
      : `${side} ${(Math.max(pW, 1 - pW) * 100).toFixed(1)}%`;
    const g = {
      id: Date.now(),
      date: etDayKey(),
      matchup: `${r.awayName} @ ${r.homeName}`,
      park: r.park,
      model: Math.round(r.mean * 100) / 100,
      line: r.line,
      lean,
      leanSide: strength < 0.04 ? "none" : side.toLowerCase(),
      decision: strength < 0.07 ? "PASS" : "WATCH",
      betDetail: null, final: null,
      outcome: "Pending",
      note: `Logged from terminal. SP: ${r.awayStarter || "?"} v ${r.homeStarter || "?"}. Median ${r.median.toFixed(1)}, 80% range ${r.p10.toFixed(0)}–${r.p90.toFixed(0)}.`,
    };
    await store.set("ingenuity:ledger:games", [g, ...games]);
    setLogMsg(`Logged ${g.matchup} to the ledger as ${g.decision}.`);
  };

  return (
    <>
      <header className="ing-head">
        <div className="ing-brand">
          <button className="ing-home-btn" onClick={onHome} aria-label="Back to home">← Home</button>
          <div>
            <h1>TERMINAL</h1>
            <p>Run projection · v1.3 · research</p>
          </div>
        </div>
        <nav className="ing-nav">
          <button className={tab === "project" ? "on" : ""} onClick={() => setTab("project")}>Project</button>
          <button className={tab === "database" ? "on" : ""} onClick={() => setTab("database")}>Database</button>
          <button className={tab === "lineups" ? "on" : ""} onClick={() => setTab("lineups")}>Lineups</button>
        </nav>
      </header>

      {tab === "project" && (
        <main className="ing-main">
          <section className="ing-inputs">
            <SmartImport teams={teams} saveTeams={saveTeams} onGameLine={loadGameLine} />
            {daySlate && daySlate.games?.length > 0 && (
              <div className="ing-gamepick">
                <label>Load from Today's Slate — one tap fills teams, starters, line, prices, and park</label>
                <select value="" onChange={(e) => e.target.value !== "" && loadSlateGame(e.target.value)}>
                  <option value="">Pick a game… ({daySlate.games.length} on the board)</option>
                  {daySlate.games.map((g, i) => (
                    <option key={i} value={i}>
                      {g.away} @ {g.home}{g.line ? ` · ${g.line}` : ""}{g.awayP && g.homeP ? ` · ${g.awayP.split(" ").pop()} v ${g.homeP.split(" ").pop()}` : " · TBD arms"}
                    </option>
                  ))}
                </select>
              </div>
            )}
            <div className="ing-env">
              <div className="ing-field">
                <label>Park</label>
                <select value={park} onChange={(e) => setPark(e.target.value)}>
                  {Object.keys(PARKS).map((p) => <option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="ing-field">
                <label>Total line</label>
                <input value={line} onChange={(e) => setLine(e.target.value)} inputMode="decimal" />
              </div>
              <div className="ing-field">
                <label>Temp °F</label>
                <input value={temp} onChange={(e) => setTemp(e.target.value)} placeholder="—" inputMode="numeric" />
              </div>
              <div className="ing-field">
                <label>Wind out mph</label>
                <input value={windOut} onChange={(e) => setWindOut(e.target.value)} placeholder="—" inputMode="numeric" />
              </div>
            </div>
            <div className="ing-env prices">
              <div className="ing-field">
                <label>Book over price</label>
                <OddsInput value={overPrice} onChange={setOverPrice} />
              </div>
              <div className="ing-field">
                <label>Book under price</label>
                <OddsInput value={underPrice} onChange={setUnderPrice} />
              </div>
            </div>

            {slateNote && <p className="ing-slatenote">{slateNote}</p>}
            <div className="ing-teams">
              <TeamCard label="Away" team={away} setTeam={setAway} teams={teams} onLoad={(n) => loadTeamInto("away", n)} />
              <TeamCard label="Home" team={home} setTeam={setHome} teams={teams} onLoad={(n) => loadTeamInto("home", n)} />
            </div>

            <button className="ing-run" onClick={runProjection} disabled={running}>
              {running ? "Simulating 20,000 games…" : "Run projection"}
            </button>
          </section>

          <section className="ing-output">
            {!result && (
              <div className="ing-empty">
                <p className="ing-empty-mark">◆</p>
                <p>Set the matchup and run a projection.</p>
                <p className="ing-empty-sub">Load teams from your database or enter numbers directly. Blank fields fall back to league average.</p>
              </div>
            )}
            {result && <Readout r={result} onLog={logToLedger} logMsg={logMsg} />}
          </section>
        </main>
      )}

      {tab === "database" && (
        <>
          <div className="ing-db-import">
            <SmartImport teams={teams} saveTeams={saveTeams} onGameLine={loadGameLine} statsFocus />
          </div>
          <Database teams={teams} saveTeams={saveTeams} loaded={loaded} />
        </>
      )}
      {tab === "lineups" && <LineupFetcher teams={teams} saveTeams={saveTeams} />}

      <footer className="ing-foot">
        Research instrument. Projections are estimates from the inputs you provide — only as good as the data entered. Not betting advice.
      </footer>
    </>
  );
}

function Database({ teams, saveTeams, loaded }) {
  const [editing, setEditing] = useState({ ...EMPTY_TEAM });
  const [editIndex, setEditIndex] = useState(-1);
  const [openRoster, setOpenRoster] = useState(-1);

  const commitTeam = () => {
    if (!editing.name.trim()) return;
    const next = [...teams];
    if (editIndex >= 0) next[editIndex] = { ...editing };
    else {
      const existing = next.findIndex((t) => t.name.toLowerCase() === editing.name.trim().toLowerCase());
      if (existing >= 0) next[existing] = { ...editing };
      else next.push({ ...editing });
    }
    saveTeams(next);
    setEditing({ ...EMPTY_TEAM });
    setEditIndex(-1);
  };

  const setPlayer = (i, k, v) => {
    const players = editing.players.map((p, j) => (j === i ? { ...p, [k]: v } : p));
    setEditing({ ...editing, players });
  };
  const addPlayer = () => setEditing({ ...editing, players: [...editing.players, { name: "", woba: "", pa: "" }] });
  const dropPlayer = (i) => setEditing({ ...editing, players: editing.players.filter((_, j) => j !== i) });

  const setPitcher = (i, k, v) => {
    const rotation = editing.rotation.map((p, j) => (j === i ? { ...p, [k]: v } : p));
    setEditing({ ...editing, rotation });
  };
  const addPitcher = () => setEditing({ ...editing, rotation: [...editing.rotation, { name: "", xwoba: "", bf: "", ip: "" }] });
  const dropPitcher = (i) => setEditing({ ...editing, rotation: editing.rotation.filter((_, j) => j !== i) });

  const computeFromLineup = () => {
    const { off, pa } = lineupToTeamOffense(editing.players);
    if (off != null) setEditing({ ...editing, off, pa: String(pa) });
  };
  const useStarter = (p) => setEditing({ ...editing, sp: p.xwoba, spBf: p.bf, spIp: p.ip || editing.spIp, spEra: p.era || "" });

  const leagueOf = (name) => (AL_ROSTERS[name] ? "American League" : NL_ROSTERS[name] ? "National League" : "Custom teams");
  const filled = (arr, key) => (arr || []).filter((p) => p[key] !== "" && p[key] != null).length;
  const groups = ["American League", "National League", "Custom teams"]
    .map((g) => ({ g, items: teams.map((t, i) => ({ t, i })).filter(({ t }) => leagueOf(t.name) === g) }))
    .filter(({ items }) => items.length > 0);

  return (
    <main className="ing-db">
      {editIndex >= 0 && (
      <section className="ing-db-editor">
        <h2>Edit team — {editing.name}</h2>
        <p className="ing-hint">
          The lineup is the source of truth: hitters and their wOBA stay put between games (barring
          injuries/designations), starters rotate, the bullpen barely changes. Update only what moved.
        </p>
        <TeamForm team={editing} setTeam={setEditing} />

        <div className="ing-roster-block">
          <div className="ing-roster-head">
            <h3>Lineup (hitters)</h3>
            <div className="ing-roster-btns">
              <button className="ing-ghost tiny" onClick={addPlayer}>+ hitter</button>
              {editing.players.length > 0 && (
                <button className="ing-ghost tiny" onClick={computeFromLineup} title="PA-weighted average of hitter wOBA → team wOBA/PA fields">
                  compute team wOBA
                </button>
              )}
            </div>
          </div>
          {editing.players.map((p, i) => (
            <div className="ing-roster-row" key={i}>
              <input value={p.name} onChange={(e) => setPlayer(i, "name", e.target.value)} placeholder={`Hitter ${i + 1}`} />
              <input value={p.woba} onChange={(e) => setPlayer(i, "woba", e.target.value)} placeholder="wOBA" inputMode="decimal" />
              <input value={p.pa} onChange={(e) => setPlayer(i, "pa", e.target.value)} placeholder="PA" inputMode="numeric" />
              <button onClick={() => dropPlayer(i)} aria-label="Remove hitter">✕</button>
            </div>
          ))}
        </div>

        <div className="ing-roster-block">
          <div className="ing-roster-head">
            <h3>Pitching staff</h3>
            <button className="ing-ghost tiny" onClick={addPitcher}>+ pitcher</button>
          </div>
          {editing.rotation.map((p, i) => (
            <div className="ing-roster-row pit" key={i}>
              <input value={p.name} onChange={(e) => setPitcher(i, "name", e.target.value)} placeholder={`Pitcher ${i + 1}`} />
              <input value={p.xwoba} onChange={(e) => setPitcher(i, "xwoba", e.target.value)} placeholder="xwOBA" inputMode="decimal" />
              <input value={p.bf} onChange={(e) => setPitcher(i, "bf", e.target.value)} placeholder="BF" inputMode="numeric" />
              <input value={p.ip ?? ""} onChange={(e) => setPitcher(i, "ip", e.target.value)} placeholder="IP/st" inputMode="decimal" />
              <input value={p.era ?? ""} onChange={(e) => setPitcher(i, "era", e.target.value)} placeholder="ERA" inputMode="decimal" />
              <button className="use" onClick={() => useStarter(p)} title="Set as today's SP">SP</button>
              <button onClick={() => dropPitcher(i)} aria-label="Remove pitcher">✕</button>
            </div>
          ))}
          {editing.rotation.length > 0 && <p className="ing-microhint">xwOBA + BF are primary; ERA (skill-blended) drags the rating for pitchers worse (or better) than their contact quality; IP/st is typical innings per start. “SP” loads them all into the team's SP fields.</p>}
        </div>

        <div className="ing-db-actions">
          <button className="ing-run small" onClick={commitTeam}>Save changes</button>
          <button className="ing-ghost" onClick={() => { setEditing({ ...EMPTY_TEAM }); setEditIndex(-1); }}>Cancel</button>
        </div>
      </section>
      )}

      <section className="ing-db-list">
        <h2>Team directory <span className="ing-count">{teams.length}</span></h2>
        <p className="ing-hint">All 30 teams live here — tap one for its active roster grouped by role. The bar shows how much of the roster has stats loaded. ✎ to edit stats.</p>
        {!loaded && <p className="ing-hint">Loading…</p>}
        {loaded && teams.length === 0 && (
          <div className="ing-empty small">
            <p>Seeding all 30 teams…</p>
            <p className="ing-empty-sub">If this doesn't resolve, reopen the tab.</p>
          </div>
        )}
        {groups.map(({ g, items }) => (
          <div className="ing-dir-group" key={g}>
            <h3 className="ing-dir-league">{g}</h3>
            {items.map(({ t, i }) => {
              const hDone = filled(t.players, "woba"), hAll = (t.players || []).length;
              const pDone = filled(t.rotation, "xwoba"), pAll = (t.rotation || []).length;
              const total = hAll + pAll, done = hDone + pDone;
              const pct = total ? Math.round((done / total) * 100) : 0;
              const open = openRoster === i;
              return (
                <div className={`ing-dir-row ${open ? "open" : ""}`} key={i}>
                  <button className="ing-dir-main" onClick={() => setOpenRoster(open ? -1 : i)}>
                    <span className="ing-dir-name">{t.name}</span>
                    <span className="ing-dir-meta">{hAll} hitters · {pAll} pitchers</span>
                    <span className="ing-dir-fillwrap" title={`${done}/${total} players have stats`}>
                      <span className="ing-dir-fill" style={{ width: `${pct}%` }} />
                    </span>
                    <span className="ing-dir-pct">{pct}%</span>
                  </button>
                  <div className="ing-dir-btns">
                    <button onClick={() => { setEditing({ ...EMPTY_TEAM, ...t }); setEditIndex(i); }} aria-label={`Edit ${t.name}`}>✎</button>
                    <button onClick={() => { const n = teams.filter((_, j) => j !== i); saveTeams(n); if (open) setOpenRoster(-1); }} aria-label={`Delete ${t.name}`}>✕</button>
                  </div>
                  {open && (() => {
                    const isStarter = (p) => (parseFloat(p.bf) || 0) >= 250 || (parseFloat(p.ip) || 0) >= 3.5;
                    const byBf = (a, b) => (parseFloat(b.bf) || 0) - (parseFloat(a.bf) || 0);
                    const rotation = (t.rotation || []).filter(isStarter).sort(byBf);
                    const bullpen = (t.rotation || []).filter((p) => !isStarter(p)).sort(byBf);
                    const lineup = (t.players || []).slice(0, 9);
                    const bench = (t.players || []).slice(9);
                    return (
                    <div className="ing-dir-detail">
                      <div className="ing-dir-teamstats">
                        <span><em>Team wOBA</em>{t.off || "—"}</span>
                        <span><em>14d</em>{t.recent || "—"}</span>
                        <span><em>Bullpen</em>{t.pen || "—"}</span>
                        <span><em>Pen BF</em>{t.penBf || "—"}</span>
                      </div>
                      <h4>Starting lineup <i className="ing-groupnote">batting order 1–9</i></h4>
                      <div className="ing-roster-preview">
                        {lineup.map((p, j) => <span key={j}><b className="ord">{j + 1}</b> {p.name || "?"} <em>{p.woba || "—"}</em></span>)}
                      </div>
                      {bench.length > 0 && (<>
                        <h4>Bench</h4>
                        <div className="ing-roster-preview">
                          {bench.map((p, j) => <span key={j}>{p.name || "?"} <em>{p.woba || "—"}</em></span>)}
                        </div>
                      </>)}
                      <h4>Rotation <i className="ing-groupnote">starters · by workload</i></h4>
                      <div className="ing-roster-preview">
                        {rotation.map((p, j) => (
                          <span key={j} className="pit">⚾ {p.name || "?"} <em>{p.xwoba || "—"}</em>{p.era ? <i className="ip">{p.era} era</i> : null}{p.ip ? <i className="ip">{p.ip} ip</i> : null}</span>
                        ))}
                        {!rotation.length && <span className="pit">no starters have workload stats yet</span>}
                      </div>
                      <h4>Bullpen <i className="ing-groupnote">relievers · feeds the pen composite</i></h4>
                      <div className="ing-roster-preview">
                        {bullpen.map((p, j) => (
                          <span key={j} className="pit">⚾ {p.name || "?"} <em>{p.xwoba || "—"}</em>{p.era ? <i className="ip">{p.era} era</i> : null}</span>
                        ))}
                        {!bullpen.length && <span className="pit">no relievers listed</span>}
                      </div>
                    </div>
                    );
                  })()}
                </div>
              );
            })}
          </div>
        ))}
      </section>
    </main>
  );
}
